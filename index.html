<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WIOS</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WIOS">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap">
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* clean light + teamwork blue. names kept (gold->blue) so all rules inherit */
  --bg:#F4F7FB;--panel:#FFFFFF;--panel2:#F0F4F9;--border:#E1E8F0;--border2:#CCD8E6;
  --text:#1A2A3A;--muted:#6B7C8F;--muted2:#9AAABB;
  --gold:#2E6FD6;--gold-soft:rgba(46,111,214,.10);--gold-line:rgba(46,111,214,.40);
  --red:#E0574F;--green:#27A567;--blue:#2E6FD6;--purple:#7A5CD0;
  --tap:44px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#E7EDF4;overscroll-behavior-y:none;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;}
#shell{max-width:480px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;}
@media(min-width:520px){#shell{border-left:1px solid #DCE4EE;border-right:1px solid #DCE4EE;}}
input,select,textarea,button{font-family:inherit;font-size:15px;color:var(--text);}
input,select,textarea{background:var(--panel);border:1px solid var(--border2);border-radius:10px;
  padding:12px;width:100%;outline:none;min-height:var(--tap);}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
textarea{resize:none;}
button{cursor:pointer;border:none;background:none;padding:0;}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px;}

/* header */
.hdr{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;box-shadow:0 1px 3px rgba(26,42,58,.04);
  display:flex;align-items:center;gap:8px;}
.wordmark{font-family:'Playfair Display',Georgia,serif;font-size:22px;letter-spacing:.06em;color:var(--gold);
  font-weight:700;line-height:1.1;}
.hdr .sub{font-size:9.5px;color:var(--muted2);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;}
.iconbtn{width:var(--tap);height:var(--tap);border-radius:12px;background:var(--panel);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;position:relative;}
.iconbtn:active{background:var(--panel2);}
.iconbtn svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.iconbtn.bell{color:var(--gold);}
.belldot{position:absolute;top:5px;right:5px;min-width:16px;height:16px;border-radius:8px;background:var(--red);
  color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--panel);}
.main{padding:14px 14px 120px;}

/* tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40;
  background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);
  display:flex;padding:7px 4px calc(env(safe-area-inset-bottom) + 7px);box-shadow:0 -1px 8px rgba(26,42,58,.06);}
.tabbar button{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 1px 4px;color:var(--muted2);font-size:10px;font-weight:600;letter-spacing:.01em;
  border-radius:12px;min-height:var(--tap);}
.tabbar button.on{color:var(--gold);}
.gwrap{position:relative;display:flex;align-items:center;justify-content:center;height:24px;width:24px;}
.gwrap svg{width:23px;height:23px;stroke:currentColor;stroke-width:1.9;fill:none;
  stroke-linecap:round;stroke-linejoin:round;}
.tabbar button.on .gwrap svg{stroke-width:2.2;}
.gwrap .bdg{position:absolute;top:-6px;left:calc(50% + 3px);min-width:17px;height:17px;border-radius:9px;
  background:var(--red);color:#FFFFFF;font-size:10px;font-weight:700;display:flex;align-items:center;
  justify-content:center;padding:0 4px;border:2px solid #FFFFFF;}

/* segmented control */
.seg{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:12px;}
.seg button{flex:1;min-width:0;padding:10px 2px;border-radius:9px;color:var(--muted);font-size:11.5px;
  font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:40px;}
.seg button.on{background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2);}

/* cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:9px;
  box-shadow:0 1px 2px rgba(26,42,58,.04);}
.card.turn{border-color:var(--gold-line);background:linear-gradient(180deg,rgba(46,111,214,.07),var(--panel));}
.card.tapme:active{border-color:var(--border2);}
.row{display:flex;align-items:center;gap:10px;}
.grow{flex:1;min-width:0;}
.tt{font-weight:600;font-size:15px;line-height:1.35;overflow-wrap:anywhere;}
.tt.done{color:var(--muted);text-decoration:line-through;}
.meta{font-size:12px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;line-height:1.4;}
.chip{font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 7px;border-radius:6px;
  text-transform:uppercase;white-space:nowrap;}
.chip.urgent{background:rgba(224,82,82,.16);color:var(--red);}
.chip.back{background:var(--gold-soft);color:var(--gold);}
.chip.sys{background:rgba(155,120,212,.16);color:var(--purple);}
.chip.role{background:var(--panel2);color:var(--muted);box-shadow:inset 0 0 0 1px var(--border);}
.chip.ok{background:rgba(95,184,122,.16);color:var(--green);}
.chip.wait{background:rgba(91,143,212,.14);color:var(--blue);}
.chip.off{background:rgba(138,132,128,.14);color:var(--muted);}

/* the ball: whose turn it is */
.ball{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(46,111,214,.6);
  animation:pulse 1.7s ease-in-out infinite;flex:none;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.6}}

.sect{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  margin:20px 2px 9px;display:flex;align-items:center;gap:8px;}
.sect .n{color:var(--gold);}

/* buttons */
.btn{border-radius:11px;padding:12px 14px;font-weight:600;font-size:14px;text-align:center;
  min-height:var(--tap);display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-gold{background:var(--gold);color:#FFFFFF;box-shadow:0 1px 3px rgba(46,111,214,.3);}
.btn-gold:active{background:#2559AE;}
.btn-line{background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2);}
.btn-ghost{color:var(--muted);background:transparent;box-shadow:inset 0 0 0 1px var(--border);}
.btn-red{background:rgba(224,82,82,.12);color:var(--red);box-shadow:inset 0 0 0 1px rgba(224,82,82,.3);}
.btn-sm{padding:10px 12px;font-size:13px;border-radius:10px;min-height:42px;}
.btn:disabled{opacity:.4;}
.btn .lbl2{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.qadd{display:flex;gap:8px;margin-bottom:14px;}
.qadd .btn{flex:none;width:52px;padding:0;font-size:20px;}

/* sheets */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(26,42,58,.45);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:20px;}
.sheet{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:20px 18px;box-shadow:0 20px 60px rgba(26,42,58,.25);
  animation:pop .2s ease-out;max-height:88dvh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.sheet h3{margin:0 0 4px;font-size:17px;overflow-wrap:anywhere;}
.sheet .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.opt{display:flex;align-items:center;gap:11px;width:100%;padding:13px 12px;border-radius:11px;
  background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);margin-bottom:8px;
  font-weight:600;font-size:14px;text-align:left;color:var(--text);min-height:var(--tap);}
.opt:active{box-shadow:inset 0 0 0 1px var(--border2);}
.opt .g{width:22px;text-align:center;flex:none;font-size:15px;}
.opt .ic{width:22px;flex:none;color:var(--muted);}
.opt.danger{color:var(--red);}
.opt.danger .ic{color:var(--red);}
.opt .grow{overflow-wrap:anywhere;}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pbtn{padding:12px 8px;border-radius:11px;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);
  font-weight:600;font-size:13.5px;color:var(--text);min-height:var(--tap);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbtn.on{box-shadow:inset 0 0 0 1.5px var(--gold);color:var(--gold);background:var(--gold-soft);}

/* coop detail */
.detail{position:fixed;inset:0;z-index:55;background:var(--bg);max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;}
.dhdr{padding:calc(env(safe-area-inset-top) + 10px) 12px 11px;border-bottom:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-start;}
.thread{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:82%;padding:9px 12px;border-radius:13px;font-size:14px;line-height:1.45;overflow-wrap:anywhere;}
.msg.mine{align-self:flex-end;background:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold-line);border-bottom-right-radius:4px;}
.msg.theirs{align-self:flex-start;background:var(--panel);box-shadow:inset 0 0 0 1px var(--border);border-bottom-left-radius:4px;}
.msg .who{font-size:10.5px;font-weight:700;color:var(--gold);margin-bottom:3px;letter-spacing:.04em;}
.msg .when{font-size:10px;color:var(--muted2);margin-top:4px;text-align:right;}
.passline{align-self:center;text-align:center;font-size:12px;color:var(--muted);background:var(--panel);
  box-shadow:inset 0 0 0 1px var(--border);border-radius:16px;padding:8px 14px;max-width:94%;overflow-wrap:anywhere;}
.passline b{color:var(--gold);font-weight:700;}
.sysline{align-self:center;font-size:11.5px;color:var(--muted2);text-align:center;max-width:94%;overflow-wrap:anywhere;}
.composer{border-top:1px solid var(--border);padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);
  display:flex;gap:8px;background:var(--bg);}
.composer .btn{flex:none;padding:0 16px;}
.holderbar{display:flex;gap:8px;padding:10px 12px 0;background:var(--bg);}
.holderbar .btn{flex:1;min-width:0;}
.court{display:flex;gap:14px;padding:12px 14px;border-bottom:1px solid var(--border);overflow-x:auto;}
.player{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:54px;flex:none;}
.player .av{width:38px;height:38px;border-radius:50%;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--muted);}
.player.acc .av{color:var(--text);box-shadow:inset 0 0 0 1px var(--gold-line);}
.player .nm{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap;}
.player .slot{height:11px;display:flex;align-items:center;}

/* checklists: goals + daily */
.crow{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 6px;background:var(--panel);
  box-shadow:inset 0 0 0 1px var(--border);border-radius:13px;margin-bottom:8px;position:relative;min-height:56px;}
.ctap{width:var(--tap);height:var(--tap);flex:none;display:flex;align-items:center;justify-content:center;}
.gcheck{width:27px;height:27px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .18s;}
.gcheck.on{background:var(--gold);box-shadow:inset 0 0 0 2px var(--gold);color:#FFFFFF;}
.xbtn{width:36px;height:36px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:17px;border-radius:9px;}
.xbtn:active{background:var(--panel2);}
.spark{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--gold);pointer-events:none;}

.pct{height:5px;border-radius:3px;background:var(--panel2);overflow:hidden;margin-top:6px;}
.pct i{display:block;height:100%;background:var(--gold);border-radius:3px;transition:width .4s;}

.daychips{display:flex;gap:5px;margin-top:8px;}
.daychips button{flex:1;min-width:0;padding:0;height:42px;border-radius:9px;background:var(--panel2);
  box-shadow:inset 0 0 0 1px var(--border);font-size:12px;font-weight:600;color:var(--muted);}
.daychips button.on{box-shadow:inset 0 0 0 1.5px var(--gold);color:var(--gold);background:var(--gold-soft);}

.streak{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;flex:none;}
.empty{text-align:center;color:var(--muted2);font-size:13.5px;padding:30px 20px;line-height:1.6;}
.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 2px 7px;}
.banner{display:flex;align-items:center;gap:10px;width:100%;background:var(--gold-soft);
  box-shadow:inset 0 0 0 1px var(--gold-line);border-radius:13px;padding:13px 14px;margin-bottom:12px;
  font-weight:600;font-size:13.5px;color:var(--gold);text-align:left;min-height:var(--tap);}
.err{color:var(--red);font-size:13px;line-height:1.5;overflow-wrap:anywhere;}
.note{color:var(--muted);font-size:12.5px;line-height:1.6;overflow-wrap:anywhere;}

.auth{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px;gap:10px;}
.spin{animation:rot 1s linear infinite;display:inline-block;}
@keyframes rot{to{transform:rotate(360deg)}}

/* team view */
.kv{display:flex;gap:8px;margin-top:10px;}
.kv div{flex:1;min-width:0;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);
  border-radius:10px;padding:9px 4px;text-align:center;}
.kv .v{font-size:18px;font-weight:700;line-height:1.1;}
.kv .k{font-size:9px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:3px;white-space:nowrap;}
.mini{font-size:13px;color:var(--muted);padding:8px 2px;border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center;line-height:1.45;overflow-wrap:anywhere;}
.mini:last-child{border-bottom:none;}
.mini .fx{flex:none;}
.bars{margin-top:10px;}
.bars .b{font-size:11px;color:var(--muted);}
.bars .b + .b{margin-top:7px;}

/* ask tab */
.askwrap{position:fixed;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  top:calc(env(safe-area-inset-top) + 60px);
  bottom:calc(env(safe-area-inset-bottom) + 58px);
  display:flex;flex-direction:column;padding:12px 14px 0;background:var(--bg);z-index:5;}
.askscroll{flex:1;overflow-y:auto;padding:4px 2px 8px;display:flex;flex-direction:column;gap:12px;}
.askintro{margin:auto;text-align:center;padding:20px 10px;}
.askglyph{font-size:32px;color:var(--gold);margin-bottom:10px;}
.asktitle{font-size:17px;font-weight:700;margin-bottom:8px;}
.asksugs{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.asksug{text-align:left;padding:12px 14px;border-radius:12px;background:var(--panel);
  box-shadow:inset 0 0 0 1px var(--border);color:var(--text);font-size:13.5px;font-weight:500;min-height:var(--tap);}
.asksug:active{box-shadow:inset 0 0 0 1px var(--border2);}
.askmsg{max-width:88%;}
.askmsg.me{align-self:flex-end;background:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold-line);
  border-radius:14px 14px 4px 14px;padding:10px 13px;}
.askmsg.ai{align-self:flex-start;width:100%;max-width:100%;}
.aitag{font-size:10.5px;font-weight:700;color:var(--gold);letter-spacing:.06em;margin-bottom:5px;}
.askbody{font-size:14.5px;line-height:1.55;white-space:pre-wrap;overflow-wrap:anywhere;}
.askmsg.me .askbody{white-space:pre-wrap;}
.askbar{display:flex;gap:8px;padding:10px 0 10px;border-top:1px solid var(--border);align-items:flex-end;background:var(--bg);}
.askbar textarea{flex:1;max-height:120px;min-height:var(--tap);line-height:1.4;padding:11px 12px;}
.dots{display:inline-flex;gap:4px;align-items:center;height:20px;}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.3s infinite;}
.dots i:nth-child(2){animation-delay:.2s;}
.dots i:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

/* task sorting + age */
.sortbar{display:flex;align-items:center;gap:8px;margin:0 2px 10px;}
.movecol{display:flex;flex-direction:column;gap:4px;flex:none;margin-right:2px;}
.movebtn{width:34px;height:26px;border-radius:7px;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border2);
  color:var(--gold);font-size:11px;display:flex;align-items:center;justify-content:center;}
.movebtn:active{background:var(--gold-soft);}
.movebtn:disabled{opacity:.3;color:var(--muted2);}
.age{font-size:11px;color:var(--muted);font-weight:600;}
.age.old{color:var(--red);}

/* notifications */
.notifrow{display:flex;gap:10px;align-items:center;width:100%;text-align:left;padding:12px 12px;
  border-radius:12px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--border);margin-bottom:8px;color:var(--text);}
.notifrow.unread{background:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold-line);}
.notifrow:active{box-shadow:inset 0 0 0 1px var(--border2);}

/* task cards */
.card.task{transition:box-shadow .15s, opacity .15s;}
.card.task.dragging{opacity:.4;}
.card.task.dragover{box-shadow:0 0 0 2px var(--gold);}
.draghandle{flex:none;color:var(--muted2);font-size:18px;cursor:grab;padding:0 4px;touch-action:none;}
/* generic inline icon */
.ic{display:inline-flex;align-items:center;justify-content:center;}
.ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* mark-done button on cards: a real, tappable green circle */
.quickcheck{width:44px;height:44px;flex:none;display:flex;align-items:center;justify-content:center;margin:-6px 0 -6px -6px;}
.quickcheck .qc{width:26px;height:26px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--border2);
  display:flex;align-items:center;justify-content:center;color:transparent;transition:all .15s;}
.quickcheck .qc svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.quickcheck:active .qc{box-shadow:inset 0 0 0 2px var(--green);background:var(--green);color:#fff;}
/* trash button on cards: visible red-tinted target */
.trash{width:40px;height:40px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--red);border-radius:10px;box-shadow:inset 0 0 0 1px var(--line);margin:-4px -6px -4px 4px;background:var(--panel);}
.trash svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.trash:active{background:#FCEBEA;box-shadow:inset 0 0 0 1px var(--red);}
.notemark{color:var(--muted2);display:inline-flex;}
.notemark svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;}
.chip.sub{background:var(--gold-soft);color:var(--gold);}
.subrow{display:flex;align-items:center;gap:8px;padding:6px 4px;}
.subdone{color:var(--muted);text-decoration:line-through;}
.gcheck.sm{width:22px;height:22px;font-size:12px;}

/* loading splash */

const pad = n => String(n).padStart(2,'0');

function mondayOf(d){ const x=new Date(d); const s=(x.getDay()+6)%7; x.setDate(x.getDate()-s); x.setHours(0,0,0,0); return x; }
function periodKey(type,d){ d=d||new Date();
  if(type==='week') return isoDate(mondayOf(d));
  if(type==='month') return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
  if(type==='semester') return `${d.getFullYear()}-H${d.getMonth()<6?1:2}`;
  return String(d.getFullYear());
}
function prevPeriodKey(type,d){ d=d||new Date();
  if(type==='week'){ const m=mondayOf(d); m.setDate(m.getDate()-7); return isoDate(m); }
  if(type==='month') return periodKey('month', new Date(d.getFullYear(), d.getMonth()-1, 1));
  if(type==='semester') return periodKey('semester', new Date(d.getFullYear(), d.getMonth()-6, 1));
  return String(d.getFullYear()-1);
}
function periodLabel(type,key){
  if(!key) return '';
  if(type==='week'){ const s=new Date(key+'T12:00:00'); if(isNaN(s)) return key;
    const e=new Date(s); e.setDate(e.getDate()+6);
    return `${MON[s.getMonth()]} ${s.getDate()} - ${MON[e.getMonth()]} ${e.getDate()}`; }
  if(type==='month'){ const [y,m]=key.split('-'); return `${MON[+m-1]} ${y}`; }
  if(type==='semester'){ const [y,h]=key.split('-'); return h==='H1'?`${y} Jan - Jun`:`${y} Jul - Dec`; }
  return key;
}
function fmtShort(ts){ if(!ts)return''; const d=new Date(ts);
  return `${MON[d.getMonth()]} ${d.getDate()}, ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`; }
function fmtDay(ts){ if(!ts)return''; const d=new Date(ts); return `${MON[d.getMonth()]} ${d.getDate()}`; }
function daysAgo(ts){ if(!ts)return 0; return Math.max(0, Math.floor((Date.now()-new Date(ts))/86400000)); }
function dueSoon(ts){ if(!ts) return false; const ms=new Date(ts)-Date.now(); return ms<=86400000; } // within 24h or overdue
function ageLabel(ts){ const d=daysAgo(ts);
  if(d===0) return 'added today';
  if(d===1) return 'day 2';           // on its 2nd day
  return `day ${d+1}`;                // day 3, day 4, ... shows how long it has been carried

function lastDayOfMonth(y,m){ return new Date(y,m,0).getDate(); }
function isDueOn(rec,d){
  if(rec.freq==='daily') return true;
  if(rec.freq==='weekly') return (rec.days||[]).includes(d.getDay());
  if(rec.freq==='monthly'){ const dom=Math.min(rec.day_of_month||1, lastDayOfMonth(d.getFullYear(), d.getMonth()+1));
    return d.getDate()===dom; }

const urlB64ToU8 = s => { const p='='.repeat((4-s.length%4)%4); const b=(s+p).replace(/-/g,'+').replace(/_/g,'/');

function burst(el){
  if(!el || !el.animate) return;
  for(let i=0;i<9;i++){
    const s=document.createElement('span'); s.className='spark';

/* ── login ───────────────────────────────────────────────── */
const LOGIN_DOMAIN = 'uglydonutsncorndogs.com';
function toEmail(idOrEmail){
  const v=String(idOrEmail||'').trim().toLowerCase();
  if(!v) return '';
  return v.includes('@') ? v : `${v}@${LOGIN_DOMAIN}`;
}
function Login(){
  const [uid,setUid]=useState(''); const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const [mode,setMode]=useState('in');   // 'in' | 'forgot'
  const [sent,setSent]=useState(false);
  async function go(){
    if(busy||!uid.trim()||!pw) return;
    setBusy(true); setErr('');
    const {error}=await sb.auth.signInWithPassword({email:toEmail(uid), password:pw});
    if(error){
      const m=(error.message||'').toLowerCase();
      if(m.includes('invalid login')||m.includes('credentials'))
        setErr('That ID or password did not work. Check and try again.');
      else
        setErr(error.message||'Could not sign in.');   // show the real reason for anything else
    }
    setBusy(false);
  }
  async function recover(){
    if(busy||!uid.trim()) return;
    setBusy(true); setErr(''); setSent(false);
    const {error}=await sb.auth.resetPasswordForEmail(toEmail(uid), {redirectTo: window.location.origin});
    if(error) setErr(error.message);
    else setSent(true);
    setBusy(false);
  }
  return (
    <div className="auth">
      <div style={{textAlign:'center',marginBottom:22}}>
        <div className="wordmark" style={{fontSize:40}}>WIOS</div>
        <div style={{fontSize:10.5,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',marginTop:8}}>
          Ugly Donuts &amp; Corn Dogs
        </div>
      </div>
      {mode==='in'?(
        <>
          <input placeholder="ID (e.g. john.kim)" type="text" autoCapitalize="none" autoCorrect="off"
            spellCheck="false" autoComplete="username" value={uid}
            onChange={e=>setUid(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
          <input placeholder="Password" type="password" autoComplete="current-password" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
          {err&&<div className="err">{err}</div>}
          <button className="btn btn-gold" disabled={busy||!uid.trim()||!pw} onClick={go}>
            {busy?'Signing in...':'Sign in'}
          </button>
          <button className="btn btn-ghost" onClick={()=>{setMode('forgot');setErr('');setSent(false);}}>
            Forgot password
          </button>
          <div className="note" style={{textAlign:'center',marginTop:6}}>
            Your ID is the part before the @ in your email.
          </div>
        </>
      ):(
        <>
          <div className="note" style={{marginBottom:4}}>
            Enter your ID and we will email you a reset link.
          </div>
          <input placeholder="ID (e.g. john.kim)" type="text" autoCapitalize="none" autoCorrect="off"
            spellCheck="false" value={uid} onChange={e=>setUid(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&recover()}/>
          {err&&<div className="err">{err}</div>}
          {sent&&<div className="note" style={{color:'var(--green)'}}>
            If that account exists, a reset link is on its way to {toEmail(uid)}. Check your email.
          </div>}
          <button className="btn btn-gold" disabled={busy||!uid.trim()} onClick={recover}>
            {busy?'Sending...':'Send reset link'}
          </button>
          <button className="btn btn-ghost" onClick={()=>{setMode('in');setErr('');}}>
            Back to sign in
          </button>
        </>
      )}
    </div>
  );
}

    });
    return {req,mine,theirs,closed};
  },[coops,members,me.id]);

  // this-week goals for the strip
  const weekGoals=useMemo(()=>{
    const key=periodKey('week');
    return (goals||[]).filter(g=>g.period_type==='week'&&g.period_key===key&&g.status!=='deleted'&&g.status!=='kept');
  },[goals]);
  const weekDone=weekGoals.filter(g=>g.status==='completed').length;

  const lists=useMemo(()=>{
    const by={active:[],waiting:[],scheduled:[],done:[]};
    tasks.forEach(t=>{ (by[t.status]||by.active).push(t); });
    by.active.sort((a,b)=>{
      const ao=a.sort_order, bo=b.sort_order;
      const aHas=ao!==null&&ao!==undefined, bHas=bo!==null&&bo!==undefined;
      if(aHas&&bHas) return ao-bo;
      if(aHas) return -1;
      if(bHas) return 1;
      return (b.urgent-a.urgent)||(b.reminded-a.reminded)||(new Date(b.created_at)-new Date(a.created_at));
    });
    by.waiting.sort((a,b)=>new Date(a.remind_at||0)-new Date(b.remind_at||0));
    by.scheduled.sort((a,b)=>new Date(a.scheduled_at||0)-new Date(b.scheduled_at||0));
    by.done.sort((a,b)=>new Date(b.completed_at||0)-new Date(a.completed_at||0));
    by.done=by.done.slice(0,40);
    return by;
  },[tasks]);

  async function addQuick(){
    const title=quick.trim(); if(!title) return;
    setQuick('');
    await sb.from('wios_tasks').insert({owner_id:me.id, title, status:'active'});
    reload();
  }
  async function createTask(){
    const title=newTaskTitle.trim(); if(!title||busy) return;
    setBusy(true);
    try{
      await sb.from('wios_tasks').insert({owner_id:me.id, title, status:'active', urgent:newTaskUrgent,
        due_at: newTaskDue? new Date(newTaskDue).toISOString() : null});
      setShowNewTask(false); setNewTaskTitle(''); setNewTaskUrgent(false); setNewTaskDue('');
      reload();
    }catch(e){ alert(e.message||'Could not add this task.'); }
    setBusy(false);
  }

  // Drag to reorder within the active list. On drop, rewrite sort_order for all.
  async function commitDrag(){
    const from=dragId, over=dragOver;
    setDragId(null); setDragOver(null);
    if(!from||!over||from===over) return;
    const arr=lists.active.slice();
    const fi=arr.findIndex(t=>t.id===from), oi=arr.findIndex(t=>t.id===over);
    if(fi<0||oi<0) return;
    const [moved]=arr.splice(fi,1);
    arr.splice(oi,0,moved);
    await Promise.all(arr.map((t,idx)=>
      sb.from('wios_tasks').update({sort_order:idx}).eq('id',t.id)));
    reload();
  }
  async function clearManualOrder(){
    await Promise.all(lists.active.map(t=>
      sb.from('wios_tasks').update({sort_order:null}).eq('id',t.id)));
    setSortMode(false);
    reload();
  }
  async function delTask(t){
    if(!confirm('Delete this task?')) return;
    await sb.from('wios_tasks').delete().eq('id',t.id);
    reload();
  }
  async function patch(t, fields){
    await sb.from('wios_tasks').update(fields).eq('id',t.id);
    setSel(null); setMode('main'); reload();
  }
  const markDone   = t => patch(t,{status:'done', completed_at:nowIso(), reminded:false, urgent:false});
  const toWaiting  = (t,hours) => patch(t,{status:'waiting',
    remind_at:new Date(Date.now()+hours*3600000).toISOString(),
    waiting_since:t.waiting_since||nowIso(), reminded:false, urgent:false});
  const toScheduled = t => schedAt && patch(t,{status:'scheduled',
    scheduled_at:new Date(schedAt).toISOString(), reminded:false});

  async function sendTask(t){
    if(!sendTo || busy) return;
    setBusy(true);
    try{
      const {data:coop, error}=await sb.from('wios_coops').insert({
        title:t.title, notes:t.notes, creator_id:me.id, holder_id:null,
        pending_id:sendTo, last_holder_id:me.id, urgent:t.urgent
      }).select().single();
      if(error) throw error;
      await sb.from('wios_coop_members').insert([
        {coop_id:coop.id, user_id:me.id, status:'accepted', joined_at:nowIso()},
        {coop_id:coop.id, user_id:sendTo, status:'pending', invited_by:me.id, invite_message:sendMsg||null},
      ]);
      await sb.from('wios_coop_messages').insert({coop_id:coop.id, user_id:me.id, kind:'pass',
        pass_to:sendTo, body:sendMsg||null});
      await sb.from('wios_tasks').delete().eq('id',t.id);
      notifyUsers([sendTo], `Task request from ${me.role} ${first(me.name)}`, t.title, coop.id);
      setSel(null); setMode('main'); setSendTo(null); setSendMsg('');
      reload();
    }catch(e){ alert(e.message||'Could not send this task.'); }
    setBusy(false);
  }

  function openSheet(t){
    setSel(t); setMode('main'); setSendTo(null); setSendMsg('');
    setDNotes(t.notes||'');
    setDSubs(Array.isArray(t.subtasks)?t.subtasks:[]);
    setNewSub('');
    const d=new Date(Date.now()+86400000);
    setSchedAt(`${isoDate(d)}T09:00`);
  }
  async function saveNotes(){
    await sb.from('wios_tasks').update({notes:dNotes||null}).eq('id',sel.id);
    reload();
  }
  async function persistSubs(next){
    setDSubs(next);
    await sb.from('wios_tasks').update({subtasks:next}).eq('id',sel.id);
    reload();
  }
  function addSub(){
    const text=newSub.trim(); if(!text) return;
    setNewSub('');
    persistSubs([...dSubs,{id:Math.random().toString(36).slice(2,9),text,done:false}]);
  }
  function toggleSub(id){
    persistSubs(dSubs.map(s=>s.id===id?{...s,done:!s.done}:s));
  }
  function delSub(id){
    persistSubs(dSubs.filter(s=>s.id!==id));
  }

  // ── coop actions (merged into the tasks view) ──
  async function acceptCoop(c){
    if(busy) return; setBusy(true);
    try{
      await sb.from('wios_coop_members').update({status:'accepted',joined_at:nowIso()})
        .eq('coop_id',c.id).eq('user_id',me.id);
      if(c.pending_id===me.id)
        await sb.from('wios_coops').update({holder_id:me.id,pending_id:null}).eq('id',c.id);
      await sb.from('wios_coop_messages').insert({coop_id:c.id,user_id:me.id,kind:'system',
        body:`${cLabel(me.id)} accepted`});
      const others=[...new Set(members.filter(m=>m.coop_id===c.id&&m.status==='accepted')
        .map(m=>m.user_id).concat([c.creator_id]))].filter(x=>x!==me.id);
      notifyUsers(others, `${cLabel(me.id)} accepted`, c.title, c.id);
      await reload(); setOpenCoopId(c.id);
    }catch(e){ alert(e.message||'Could not accept.'); }
    setBusy(false);
  }
  async function sendDecline(){
    const c=declining; if(!c||busy) return; setBusy(true);
    try{
      const msg=declineMsg.trim();
      await sb.from('wios_coop_members').update({status:'declined'}).eq('coop_id',c.id).eq('user_id',me.id);
      await sb.from('wios_coop_messages').insert({coop_id:c.id,user_id:me.id,kind:'system',
        body:`${cLabel(me.id)} responded${msg?`: ${msg}`:''}`});
      if(c.pending_id===me.id)
        await sb.from('wios_coops').update({pending_id:null, holder_id:c.last_holder_id||c.creator_id}).eq('id',c.id);
      const m=myM(c.id);
      notifyUsers([(m&&m.invited_by)||c.creator_id], `${cLabel(me.id)} responded`,
        `${c.title}${msg?`: ${msg}`:''}`, c.id);
      setDeclining(null); setDeclineMsg('');
      reload();
    }catch(e){ alert(e.message||'Could not send.'); }
    setBusy(false);
  }
  async function deleteCoopCard(c){
    if(busy) return;
    if(!confirm('Delete this coop for everyone? This cannot be undone.')) return;
    setBusy(true);
    try{
      await sb.from('wios_coop_messages').delete().eq('coop_id',c.id);
      await sb.from('wios_coop_members').delete().eq('coop_id',c.id);
      await sb.from('wios_coops').delete().eq('id',c.id);
      reload();
    }catch(e){ alert(e.message||'Could not delete.'); }
    setBusy(false);
  }

  function CoopCard({c, request}){
    const m=myM(c.id);
    const mineTurn=c.holder_id===me.id&&c.status==='active';
    const fromCreator = m && (m.invited_by===c.creator_id);
    return (
      <div className={'card coopcard'+(mineTurn?' turn':'')} onClick={()=>!request&&setOpenCoopId(c.id)}>
        <div className="row">
          {mineTurn&&<span className="ball"/>}
          <span className="coopmark" aria-label="Coop">{ICON.coop}</span>
          <div className="grow">
            <div className="tt">{c.title}</div>
            <div className="meta">
              {c.urgent&&c.status==='active'&&<span className="chip urgent">Urgent</span>}
              {c.status==='closed'?<span className="chip ok">Done {fmtDay(c.closed_at)}</span>
                : c.pending_id?<span className="chip wait">Sent to {cLabel(c.pending_id)}</span>
                : mineTurn?<span className="chip back">Your turn</span>
                : c.holder_id?<span className="chip wait">With {cLabel(c.holder_id)}</span>:null}
              <span>from {cLabel(c.creator_id)}</span>
            </div>
            {request&&m&&m.invite_message&&(
              <div className="note" style={{marginTop:8,fontStyle:'italic'}}>"{m.invite_message}"</div>
            )}
          </div>
          {!request&&c.creator_id===me.id&&(
            <button className="trash" onClick={e=>{e.stopPropagation();deleteCoopCard(c);}} aria-label="Delete coop">{ICON.trash}</button>
          )}
        </div>
        {request&&(
          <div className="row" style={{marginTop:12,gap:8}}>
            <button className="btn btn-gold btn-sm" style={{flex:fromCreator?'':1,width:fromCreator?'100%':'auto'}}
              disabled={busy} onClick={e=>{e.stopPropagation();acceptCoop(c);}}>Accept</button>
            {!fromCreator&&(
              <button className="btn btn-line btn-sm" style={{flex:1}} disabled={busy}
                onClick={e=>{e.stopPropagation();setDeclining(c);setDeclineMsg('');}}>Respond</button>
            )}
          </div>
        )}
      </div>
    );
  }

  const segItems=[
    {k:'active',l:`Active${(lists.active.length+coopGroups.mine.length)?` ${lists.active.length+coopGroups.mine.length}`:''}`},
    {k:'waiting',l:`Waiting${(lists.waiting.length+coopGroups.theirs.length)?` ${lists.waiting.length+coopGroups.theirs.length}`:''}`},
    {k:'scheduled',l:'Later'},
    {k:'done',l:'Done'},
  ];

  return (
    <div>
      {weekGoals.length>0&&(
        <button className="goalstrip" onClick={()=>gotoGoals('week')}>
          <span className="gschip">{ICON.goals}</span>
          <div className="grow">
            <div className="gshead">This week ({weekDone}/{weekGoals.length})</div>
            <div className="gsbody">{weekGoals.map(g=>g.title).join('  ·  ')}</div>
          </div>
          <span style={{color:'var(--muted2)',flex:'none'}}>›</span>
        </button>
      )}

      <div className="addrow">
        <button className="btn addbtn" onClick={()=>{ setNewTaskTitle(''); setShowNewTask(true); }}>
          {ICON.tasks}<span>Task</span>
        </button>
        <button className="btn addbtn" onClick={()=>{ setSendTo(null); setSendMsg(''); setShowNewCoop(true); }}>
          {ICON.coop}<span>Coop</span>
        </button>
      </div>

      <Seg items={segItems} value={seg} onChange={v=>{setSeg(v); if(v!=='active') setSortMode(false);}}/>

      {seg==='active'&&coopGroups.req.length>0&&(
        <>
          <div className="sect">Requests <span className="n">{coopGroups.req.length}</span></div>
          {coopGroups.req.map(c=><CoopCard key={c.id} c={c} request/>)}
        </>
      )}

      {seg==='active'&&lists.active.length>1&&(
        <div className="sortbar">
          {sortMode?(
            <>
              <span className="note" style={{flex:1}}>Drag the handle to reorder. Top is highest priority.</span>
              <button className="btn btn-ghost btn-sm" style={{flex:'none',padding:'0 12px'}} onClick={clearManualOrder}>Reset</button>
              <button className="btn btn-gold btn-sm" style={{flex:'none',padding:'0 14px'}} onClick={()=>setSortMode(false)}>Done</button>
            </>
          ):(
            <>
              <span className="note" style={{flex:1}}>Sorted by urgency, then newest.</span>
              <button className="btn btn-line btn-sm" style={{flex:'none',padding:'0 14px'}} onClick={()=>setSortMode(true)}>
                Reorder
              </button>
            </>
          )}
        </div>
      )}

      {seg==='active'&&!sortMode&&coopGroups.mine.map(c=><CoopCard key={c.id} c={c}/>)}
      {seg==='waiting'&&coopGroups.theirs.map(c=><CoopCard key={c.id} c={c}/>)}
      {seg==='done'&&coopGroups.closed.map(c=><CoopCard key={c.id} c={c}/>)}

      {lists[seg].length===0&&coopGroups.mine.length===0&&coopGroups.theirs.length===0&&
       coopGroups.closed.length===0&&coopGroups.req.length===0&&(
        <div className="empty">
          {seg==='active'&&'Nothing here yet. Tap Task or Coop to add one.'}
          {seg==='waiting'&&'Nothing is parked with someone else.'}
          {seg==='scheduled'&&'Nothing is set aside for later.'}
          {seg==='done'&&'Completed work lands here.'}
        </div>
      )}

      {lists[seg].map((t,idx)=>{
        const subs=Array.isArray(t.subtasks)?t.subtasks:[];
        const subDone=subs.filter(s=>s.done).length;
        const dragging=dragId===t.id;
        return (
        <div key={t.id}
          className={'card task'+(dragging?' dragging':'')+(dragOver===t.id&&dragId!==t.id?' dragover':'')}
          draggable={sortMode&&seg==='active'}
          onDragStart={()=>setDragId(t.id)}
          onDragEnd={commitDrag}
          onDragOver={e=>{ if(sortMode){ e.preventDefault(); setDragOver(t.id); } }}
          onClick={()=>!sortMode&&openSheet(t)}>
          <div className="row">
            {sortMode&&seg==='active'&&<span className="draghandle" aria-label="Drag">⠿</span>}
            {!sortMode&&(seg==='active'||seg==='waiting'||seg==='scheduled')&&(
              <button className="quickcheck" onClick={e=>{e.stopPropagation();markDone(t);}} aria-label="Mark done">
                <span className="qc">{ICON.check}</span>
              </button>
            )}
            <div className="grow">
              <div className={'tt'+(t.status==='done'?' done':'')}>{t.title}</div>
              <div className="meta">
                {t.urgent&&<span className="chip urgent">Urgent</span>}
                {t.reminded&&t.status==='active'&&<span className="chip back">Followup</span>}
                {t.is_system&&<span className="chip sys">{t.system_kind==='recurring'?'Recurring':'Goals'}</span>}
                {subs.length>0&&<span className="chip sub">{subDone}/{subs.length}</span>}
                {t.notes&&<span className="notemark" aria-label="Has notes">{ICON.note}</span>}
                {t.status==='active'&&<span className={'age'+(daysAgo(t.created_at)>=7?' old':'')}>
                  {ageLabel(t.created_at)}</span>}
                {t.status==='waiting'&&
                  <span>{daysAgo(t.waiting_since||t.created_at)}d waiting, back {inWords(t.remind_at)}</span>}
                {t.status==='scheduled'&&<span>Starts {fmtShort(t.scheduled_at)}</span>}
                {t.due_at&&t.status==='active'&&<span className={'chip due'+(dueSoon(t.due_at)?' urgent':'')}>Due {fmtShort(t.due_at)}</span>}
                {t.status==='done'&&<span>Done {fmtDay(t.completed_at)}</span>}
              </div>
            </div>
            {!sortMode&&(
              <button className="trash" onClick={e=>{e.stopPropagation();delTask(t);}} aria-label="Delete">{ICON.trash}</button>
            )}
          </div>
        </div>
      );})}

      {sel&&(
        <Sheet onClose={()=>setSel(null)}>
          <h3>{sel.title}</h3>
          <div className="sub">
            {sel.status==='waiting'?`Waiting ${daysAgo(sel.waiting_since||sel.created_at)}d, comes back ${inWords(sel.remind_at)}`:
             sel.status==='scheduled'?`Set aside until ${fmtShort(sel.scheduled_at)}`:
             sel.is_system?'Goal check-in':'What next?'}
          </div>

          {mode==='main'&&(
            <div>
              {sendTo&&(
                <div className="handoffbar">
                  <Ic name="handoff" className="gold"/>
                  <div className="grow">
                    <div style={{fontWeight:600,fontSize:14}}>Hand off to {(()=>{const p=people.find(x=>x.id===sendTo);return p?`${p.role} ${first(p.name)}`:'teammate';})()}</div>
                    {sendMsg&&<div className="note" style={{marginTop:2}}>"{sendMsg}"</div>}
                  </div>
                  <button className="xbtn" onClick={()=>{setSendTo(null);setSendMsg('');}} aria-label="Cancel handoff">×</button>
                </div>
              )}
              {sendTo&&(
                <button className="btn btn-gold" style={{width:'100%',marginBottom:14}} disabled={busy} onClick={()=>sendTask(sel)}>
                  {busy?'Sending...':'Send request'}
                </button>
              )}
              <div className="lbl">Subtasks {dSubs.length>0&&<span style={{color:'var(--gold)'}}>{dSubs.filter(s=>s.done).length}/{dSubs.length}</span>}</div>
              {dSubs.map(s=>(
                <div key={s.id} className="subrow">
                  <button className="ctap" onClick={()=>toggleSub(s.id)} aria-label="Toggle subtask">
                    <span className={'gcheck sm'+(s.done?' on':'')}>✓</span>
                  </button>
                  <span className={'grow'+(s.done?' subdone':'')} style={{fontSize:14}}>{s.text}</span>
                  <button className="xbtn" onClick={()=>delSub(s.id)} aria-label="Remove subtask">×</button>
                </div>
              ))}
              <div className="qadd" style={{marginTop:dSubs.length?8:0,marginBottom:14}}>
                <input placeholder="Add a subtask, e.g. Front door" value={newSub}
                  onChange={e=>setNewSub(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSub()}/>
                <button className="btn btn-line" onClick={addSub} aria-label="Add subtask"
                  style={{flex:'none',width:52,padding:0,fontSize:20}}>+</button>
              </div>

              <div className="lbl">Notes</div>
              <textarea rows="3" placeholder="Anything worth writing down..." value={dNotes}
                onChange={e=>setDNotes(e.target.value)} onBlur={saveNotes}/>
              <div style={{height:14}}/>

              {sel.is_system&&sel.system_kind==='goal_prompt'&&sel.system_ref&&(
                <button className="opt" onClick={()=>{ const tp=sel.system_ref.split(':')[0]; setSel(null); gotoGoals(tp); }}>
                  <Ic name="goals" className="gold"/><span className="grow">Open Goals</span>
                </button>
              )}
              {sel.status!=='done'&&(
                <button className="opt" onClick={()=>markDone(sel)}>
                  <Ic name="check" className="green"/><span className="grow">Mark done</span>
                </button>
              )}
              {sel.status==='done'&&(
                <button className="opt" onClick={()=>patch(sel,{status:'active',completed_at:null})}>
                  <Ic name="undo" className="muted"/><span className="grow">Move back to Active</span>
                </button>
              )}
              {sel.status!=='done'&&(
                <button className="opt" onClick={()=>patch(sel,{urgent:!sel.urgent})}>
                  <Ic name={sel.urgent?'starFill':'star'} className="gold"/>
                  <span className="grow">{sel.urgent?'Remove urgent':'Mark urgent, pin to top'}</span>
                </button>
              )}
              {sel.status!=='done'&&!sel.is_system&&<>
                <button className="opt" onClick={()=>setMode('waiting')}>
                  <Ic name="clock" className="muted"/><span className="grow">Waiting on someone, remind me later</span>
                </button>
                <button className="opt" onClick={()=>setMode('schedule')}>
                  <Ic name="calendar" className="muted"/><span className="grow">Set aside until a date</span>
                </button>
                <button className="opt" onClick={()=>setMode('send')}>
                  <Ic name="handoff" className="gold"/><span className="grow">Bring in a teammate, turn into a coop</span>
                </button>
              </>}
              <button className="opt danger"
                onClick={async()=>{ if(!confirm('Delete this task?'))return;
                  await sb.from('wios_tasks').delete().eq('id',sel.id); setSel(null); reload(); }}>
                <Ic name="trash" className="red"/><span className="grow">Delete</span>
              </button>
            </div>
          )}

          {mode==='waiting'&&(
            <div>
              <div className="lbl">Bring it back in</div>
              <div className="pgrid">
                {[['3 hours',3],['6 hours',6],['1 day',24],['2 days',48],['3 days',72],['1 week',168]].map(([l,h])=>(
                  <button key={l} className="pbtn" onClick={()=>toWaiting(sel,h)}>{l}</button>
                ))}
              </div>
              <div className="lbl">Or pick your own</div>
              <div className="row">
                <input type="number" min="1" value={customN} onChange={e=>setCustomN(+e.target.value||1)}
                  style={{width:84,flex:'none'}}/>
                <select value={customU} onChange={e=>setCustomU(e.target.value)} style={{flex:1}}>
                  <option value="hours">hours</option><option value="days">days</option>
                </select>
                <button className="btn btn-gold btn-sm" style={{flex:'none',padding:'0 18px'}}
                  onClick={()=>toWaiting(sel, customU==='hours'?customN:customN*24)}>Set</button>
              </div>
              <div className="note" style={{marginTop:12}}>
                It moves to Waiting and counts the days. When the time is up it comes back to Active with a notification.
              </div>
            </div>
          )}

          {mode==='schedule'&&(
            <div>
              <div className="lbl">Bring it back on</div>
              <input type="datetime-local" value={schedAt} onChange={e=>setSchedAt(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} onClick={()=>toScheduled(sel)}>Set aside</button>
            </div>
          )}

          {mode==='send'&&(
            <div>
              <div className="lbl">Hand off to</div>
              <PersonGrid people={people} value={sendTo} onChange={setSendTo} exclude={me.id}/>
              <textarea rows="2" placeholder="What do you need from them?" value={sendMsg}
                onChange={e=>setSendMsg(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} disabled={!sendTo} onClick={()=>setMode('main')}>
                Add teammate
              </button>
              <div className="note" style={{marginTop:10}}>
                Pick who takes it next. You will confirm and send from the task screen.
              </div>
            </div>
          )}
        </Sheet>
      )}

      {showNewTask&&(
        <Sheet onClose={()=>setShowNewTask(false)}>
          <h3>New task</h3>
          <div className="sub">Something for you to do. It goes in your Active list.</div>
          <input autoFocus placeholder="What needs doing?" value={newTaskTitle}
            onChange={e=>setNewTaskTitle(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!newTaskDue) createTask(); }}/>
          <button className={'opt'+(newTaskUrgent?' on':'')} style={{marginTop:10}} onClick={()=>setNewTaskUrgent(!newTaskUrgent)}>
            <Ic name={newTaskUrgent?'starFill':'star'} className={newTaskUrgent?'gold':'muted'}/>
            <span className="grow">{newTaskUrgent?'Urgent, pinned to top':'Mark urgent'}</span>
          </button>
          <div className="lbl">Finish before (optional)</div>
          <input type="datetime-local" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)}/>
          {newTaskDue&&<div className="note" style={{marginTop:6}}>A reminder is pushed 24 hours before this time.</div>}
          <div style={{height:12}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={!newTaskTitle.trim()||busy} onClick={createTask}>
            {busy?'Adding...':'Add task'}
          </button>
        </Sheet>
      )}

      {showNewCoop&&(
        <NewCoopSheet me={me} people={people} onClose={()=>setShowNewCoop(false)} reload={reload}/>
      )}

      {declining&&(
        <Sheet onClose={()=>setDeclining(null)}>
          <h3>Respond</h3>
          <div className="sub">Tell them why this is not needed, or suggest another way. It goes back to whoever sent it.</div>
          <textarea rows="3" placeholder="Your message" value={declineMsg} onChange={e=>setDeclineMsg(e.target.value)}/>
          <div style={{height:12}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={busy} onClick={sendDecline}>
            {busy?'Sending...':'Send response'}
          </button>
        </Sheet>
      )}

      {openCoopId&&<CoopDetail me={me} people={people}
        coop={coops.find(c=>c.id===openCoopId)} members={members.filter(m=>m.coop_id===openCoopId)}
        onClose={()=>setOpenCoopId(null)} reload={reload}/>}
    </div>
  );
}

/* ── new coop sheet (shared by tasks view) ───────────────── */
function NewCoopSheet({me, people, onClose, reload}){
  const [nTitle,setNTitle]=useState(''); const [nTo,setNTo]=useState(null);
  const [nMsg,setNMsg]=useState(''); const [nUrgent,setNUrgent]=useState(false);
  const [busy,setBusy]=useState(false);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  async function createCoop(){
    const title=nTitle.trim(); if(!title||!nTo||busy) return;
    setBusy(true);
    try{
      const {data:coop,error}=await sb.from('wios_coops').insert({
        title, creator_id:me.id, holder_id:null, pending_id:nTo, last_holder_id:me.id, urgent:nUrgent
      }).select().single();
      if(error) throw error;
      await sb.from('wios_coop_members').insert([
        {coop_id:coop.id,user_id:me.id,status:'accepted',joined_at:nowIso()},
        {coop_id:coop.id,user_id:nTo,status:'pending',invited_by:me.id,invite_message:nMsg||null},
      ]);
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'pass',
        pass_to:nTo,body:nMsg||null});
      notifyUsers([nTo], `Task request from ${label(me.id)}`, title, coop.id);
      onClose(); reload();
    }catch(e){ alert(e.message||'Could not create.'); }
    setBusy(false);
  }
  return (
    <Sheet onClose={onClose}>
      <h3>New coop task</h3>
      <div className="sub">It starts as a request. Once they accept, you hand it back and forth until someone closes it.</div>
      <input placeholder="What needs doing?" value={nTitle} onChange={e=>setNTitle(e.target.value)}/>
      <div className="lbl">Send to</div>
      <PersonGrid people={people} value={nTo} onChange={setNTo} exclude={me.id}/>
      <textarea rows="2" placeholder="Message (optional)" value={nMsg} onChange={e=>setNMsg(e.target.value)}/>
      <button className="opt" style={{marginTop:10}} onClick={()=>setNUrgent(!nUrgent)}>
        <Ic name={nUrgent?'starFill':'star'} className="gold"/>
        <span className="grow">{nUrgent?'Urgent':'Mark urgent'}</span>
      </button>
      <div style={{height:6}}/>
      <button className="btn btn-gold" style={{width:'100%'}} disabled={!nTitle.trim()||!nTo||busy} onClick={createCoop}>
        {busy?'Sending...':'Send request'}
      </button>
    </Sheet>
  );
}

function CoopDetail({me, people, coop, members, onClose, reload}){
  const [msgs,setMsgs]=useState([]); const [text,setText]=useState('');
  const [passing,setPassing]=useState(false); const [passTo,setPassTo]=useState(null); const [passMsg,setPassMsg]=useState('');
  const [passRemind,setPassRemind]=useState(0);   // hours; 0 = no reminder
  const [busy,setBusy]=useState(false);
  const endRef=useRef(null);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };

  async function loadMsgs(){
    if(!coop) return;
    const {data}=await sb.from('wios_coop_messages').select('*').eq('coop_id',coop.id).order('created_at');
    const next=data||[];
    setMsgs(prev=>{
      if(next.length!==prev.length){
        setTimeout(()=>endRef.current&&endRef.current.scrollIntoView({block:'end'}),60);
      }
      return next;
    });
  }
  useEffect(()=>{
    if(!coop) return;
    loadMsgs();
    const iv=setInterval(loadMsgs,5000);
    const onVis=()=>{ if(document.visibilityState==='visible') loadMsgs(); };
    document.addEventListener('visibilitychange',onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange',onVis); };
  },[coop&&coop.id]);

  if(!coop) return null;
  const iAmHolder=coop.holder_id===me.id&&coop.status==='active';
  const acceptedIds=members.filter(m=>m.status==='accepted').map(m=>m.user_id);
  const everyone=[...new Set(acceptedIds.concat([coop.creator_id]))];
  const invited=coop.pending_id&&!everyone.includes(coop.pending_id)?coop.pending_id:null;

  async function comment(){
    const body=text.trim(); if(!body||busy) return;
    setText('');
    await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'comment',body});
    notifyUsers(everyone.filter(x=>x!==me.id), coop.title, `${label(me.id)}: ${body}`, coop.id);
    loadMsgs();
  }
  async function doPass(){
    if(!passTo||busy) return; setBusy(true);
    try{
      const target=members.find(m=>m.user_id===passTo);
      const msg=passMsg.trim();
      const remindAt = passRemind>0 ? new Date(Date.now()+passRemind*3600000).toISOString() : null;
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'pass',
        pass_to:passTo,body:msg||null});
      if(target&&target.status==='accepted'){
        await sb.from('wios_coops').update({holder_id:passTo,pending_id:null,last_holder_id:me.id,
          remind_at:remindAt,reminded:false}).eq('id',coop.id);
        notifyUsers([passTo], `Your turn: ${coop.title}`, msg||`Passed by ${label(me.id)}`, coop.id);
      }else{
        if(!target){
          await sb.from('wios_coop_members').insert({coop_id:coop.id,user_id:passTo,status:'pending',
            invited_by:me.id,invite_message:msg||null});
        }else{
          await sb.from('wios_coop_members').update({status:'pending',invited_by:me.id,invite_message:msg||null})
            .eq('coop_id',coop.id).eq('user_id',passTo);
        }
        await sb.from('wios_coops').update({holder_id:null,pending_id:passTo,last_holder_id:me.id,
          remind_at:remindAt,reminded:false}).eq('id',coop.id);
        notifyUsers([passTo], `Task request from ${label(me.id)}`, coop.title, coop.id);
      }
      setPassing(false); setPassTo(null); setPassMsg(''); setPassRemind(0);
      await reload(); loadMsgs();
    }catch(e){ alert(e.message||'Could not pass this on.'); }
    setBusy(false);
  }
  async function closeCoop(){
    if(busy||!confirm('Close this for everyone?')) return;
    setBusy(true);
    try{
      await sb.from('wios_coops').update({status:'closed',closed_at:nowIso(),closed_by:me.id}).eq('id',coop.id);
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'system',
        body:`Completed and closed by ${label(me.id)}`});
      notifyUsers(everyone.filter(x=>x!==me.id), `Completed: ${coop.title}`, `Closed by ${label(me.id)}`, coop.id);
      await reload(); onClose();
    }catch(e){ alert(e.message||'Could not close.'); setBusy(false); }
  }
  async function deleteCoop(){
    if(busy) return;
    if(!confirm('Delete this coop for everyone? This cannot be undone.')) return;
    setBusy(true);
    try{
      await sb.from('wios_coop_messages').delete().eq('coop_id',coop.id);
      await sb.from('wios_coop_members').delete().eq('coop_id',coop.id);
      await sb.from('wios_coops').delete().eq('id',coop.id);
      await reload(); onClose();
    }catch(e){ alert(e.message||'Could not delete.'); setBusy(false); }
  }

  return (
    <div className="detail">
      <div className="dhdr">
        <button className="iconbtn" onClick={onClose} aria-label="Back">←</button>
        <div className="grow">
          <div className="tt">{coop.title}</div>
          <div className="meta">
            {coop.status==='closed'?<span className="chip ok">Completed</span>:
             coop.pending_id?<span className="chip wait">Sent to {label(coop.pending_id)}</span>:
             iAmHolder?<span className="chip back">Your turn</span>:
             <span className="chip wait">With {label(coop.holder_id)}</span>}
            <span>from {label(coop.creator_id)}</span>
          </div>
        </div>
        {coop.creator_id===me.id&&(
          <button className="iconbtn" onClick={deleteCoop} disabled={busy} aria-label="Delete coop"
            style={{color:'var(--red)'}}>{ICON.trash}</button>
        )}
      </div>

      <div className="court">
        {everyone.map(id=>{
          const p=people.find(x=>x.id===id); if(!p) return null;
          const m=members.find(x=>x.user_id===id);
          const acc=id===coop.creator_id||(m&&m.status==='accepted');
          return (
            <div key={id} className={'player'+(acc?' acc':'')}>
              <div className="av">{p.role}</div>
              <div className="nm">{first(p.name)}</div>
              <div className="slot">{coop.holder_id===id&&coop.status==='active'&&<span className="ball"/>}</div>
            </div>
          );
        })}
        {invited&&(()=>{
          const p=people.find(x=>x.id===invited); if(!p) return null;
          return (
            <div key={invited} className="player">
              <div className="av">{p.role}</div>
              <div className="nm">{first(p.name)} ?</div>
              <div className="slot"/>
            </div>
          );
        })()}
      </div>

      <div className="thread">
        {msgs.map(m=>{
          if(m.kind==='system') return <div key={m.id} className="sysline">{m.body}</div>;
          if(m.kind==='pass') return (
            <div key={m.id} className="passline">
              <b>{label(m.user_id)}</b> → <b>{label(m.pass_to)}</b>
              {m.body&&<div style={{marginTop:4,color:'var(--text)'}}>{m.body}</div>}
              <div style={{fontSize:10,color:'var(--muted2)',marginTop:4}}>{fmtShort(m.created_at)}</div>
            </div>
          );
          const mine=m.user_id===me.id;
          return (
            <div key={m.id} className={'msg '+(mine?'mine':'theirs')}>
              {!mine&&<div className="who">{label(m.user_id)}</div>}
              {m.body}
              <div className="when">{fmtShort(m.created_at)}</div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>

      {iAmHolder&&(
        <div className="holderbar">
          <button className="btn btn-line" disabled={busy} onClick={()=>setPassing(true)}>
            <span className="lbl2">Pass to...</span>
          </button>
          <button className="btn btn-gold" disabled={busy} onClick={closeCoop}>
            <span className="lbl2">Complete &amp; close</span>
          </button>
        </div>
      )}
      {coop.status==='active'&&(
        <div className="composer">
          <input placeholder="Comment..." value={text} onChange={e=>setText(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&comment()}/>
          <button className="btn btn-gold btn-sm" onClick={comment}>Send</button>
        </div>
      )}

      {passing&&(
        <Sheet onClose={()=>setPassing(false)}>
          <h3>Pass to</h3>
          <div className="sub">Your part is done. Hand the ball to whoever is next.</div>
          <PersonGrid people={people} value={passTo} onChange={setPassTo} exclude={me.id}/>
          <textarea rows="2" placeholder="What should they do next?" value={passMsg}
            onChange={e=>setPassMsg(e.target.value)}/>
          <div className="lbl">Remind them if no response</div>
          <div className="pgrid">
            {[['No reminder',0],['In 3 hours',3],['Tomorrow',24],['In 2 days',48]].map(([l,h])=>(
              <button key={l} className={'pbtn'+(passRemind===h?' on':'')} onClick={()=>setPassRemind(h)}>{l}</button>
            ))}
          </div>
          <div style={{height:8}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={!passTo||busy} onClick={doPass}>
            {busy?'Passing...':'Pass'}
          </button>
        </Sheet>
      )}
    </div>
  );
}

/* ── goals ───────────────────────────────────────────────── */
function GoalsTab({me, goals, gps, reload, goalType, setGoalType, tasks}){
  const [text,setText]=useState('');
  const [openHist,setOpenHist]=useState(null);
  const type=goalType;
  const key=periodKey(type), prevKey=prevPeriodKey(type);
  const mine=useMemo(()=>goals.filter(g=>g.period_type===type),[goals,type]);
  const cur=mine.filter(g=>g.period_key===key&&g.status!=='deleted'&&g.status!=='kept')
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const prevOpen=mine.filter(g=>g.period_key===prevKey&&g.status==='open');
  const prevAll=mine.filter(g=>g.period_key===prevKey&&g.status!=='deleted');
  const prevGp=gps.find(x=>x.period_type===type&&x.period_key===prevKey);
  const showReview=prevOpen.length>0&&!(prevGp&&prevGp.review_done);
  const doneN=cur.filter(g=>g.status==='completed').length;
  const donePct=cur.length?Math.round(doneN/cur.length*100):0;

  const historyKeys=useMemo(()=>{
    const ks=[...new Set(mine.filter(g=>g.period_key!==key&&g.status!=='deleted').map(g=>g.period_key))];
    return ks.sort().reverse();
  },[mine,key]);

  async function completePromptTask(){
    const ref=`${type}:${key}`;
    const t=tasks.find(x=>x.system_ref===ref&&x.status==='active');
    if(t) await sb.from('wios_tasks').update({status:'done',completed_at:nowIso(),urgent:false}).eq('id',t.id);
  }
  async function addGoal(){
    const title=text.trim(); if(!title) return;
    setText('');
    await sb.from('wios_goals').insert({owner_id:me.id,period_type:type,period_key:key,title,status:'open'});
    await completePromptTask();
    reload();
  }
  async function toggle(g,e){
    const row=e.currentTarget.closest('.crow');
    if(g.status==='open'){
      burst(row);
      await sb.from('wios_goals').update({status:'completed',completed_at:nowIso()}).eq('id',g.id);
    }else{
      await sb.from('wios_goals').update({status:'open',completed_at:null}).eq('id',g.id);
    }
    reload();
  }
  async function markReviewDone(){
    await sb.from('wios_goal_periods').upsert(
      {user_id:me.id,period_type:type,period_key:prevKey,prompted:true,review_done:true},
      {onConflict:'user_id,period_type,period_key'});
    reload();
  }
  const lastOne = () => prevOpen.length<=1;
  async function reviewComplete(g){
    await sb.from('wios_goals').update({status:'completed',completed_at:nowIso()}).eq('id',g.id);
    if(lastOne()) await markReviewDone(); else reload();
  }
  async function reviewKeep(g){
    await sb.from('wios_goals').update({status:'kept'}).eq('id',g.id);
    await sb.from('wios_goals').insert({owner_id:me.id,period_type:type,period_key:key,
      title:g.title,status:'open',kept_from:prevKey});
    await completePromptTask();
    if(lastOne()) await markReviewDone(); else reload();
  }
  async function reviewDelete(g){
    await sb.from('wios_goals').update({status:'deleted'}).eq('id',g.id);
    if(lastOne()) await markReviewDone(); else reload();
  }
  async function removeGoal(g){
    if(!confirm('Remove this goal?')) return;
    await sb.from('wios_goals').update({status:'deleted'}).eq('id',g.id);
    reload();
  }

  const icon=s=>s==='completed'?'✓':s==='kept'?'→':'○';
  const iconColor=s=>s==='completed'?'var(--green)':s==='kept'?'var(--gold)':'var(--muted2)';

  return (
    <div>
      <Seg items={PERIOD_TYPES.map(t=>({k:t,l:PLABEL[t]}))} value={type} onChange={setGoalType}/>

      {showReview&&(
        <div className="card" style={{borderColor:'var(--gold-line)'}}>
          <div className="tt" style={{color:'var(--gold)'}}>Close out {periodLabel(type,prevKey)}</div>
          <div className="sub" style={{marginTop:5,marginBottom:6}}>
            Keep moves a goal into this {PWORD[type]}. Then set the new ones below.
          </div>
          {prevOpen.map(g=>(
            <div key={g.id} style={{paddingTop:11,marginTop:5,borderTop:'1px solid var(--border)'}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:9,overflowWrap:'anywhere'}}>{g.title}</div>
              <div className="row" style={{gap:7}}>
                <button className="btn btn-gold btn-sm" style={{flex:1,minWidth:0}} onClick={()=>reviewComplete(g)}>
                  <span className="lbl2">✓ Completed</span>
                </button>
                <button className="btn btn-line btn-sm" style={{flex:1,minWidth:0}} onClick={()=>reviewKeep(g)}>
                  <span className="lbl2">→ Keep</span>
                </button>
                <button className="btn btn-ghost btn-sm" style={{flex:'none',width:44,padding:0}}
                  onClick={()=>reviewDelete(g)} aria-label="Drop this goal">{ICON.trash}</button>
              </div>
            </div>
          ))}
          <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:12}} onClick={markReviewDone}>
            Done reviewing
          </button>
        </div>
      )}

      <div className="sect">This {PWORD[type]}, {periodLabel(type,key)}</div>
      {cur.length>0&&(
        <div style={{margin:'0 2px 12px'}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>{doneN} of {cur.length} completed</div>
          <div className="pct"><i style={{width:donePct+'%'}}/></div>
        </div>
      )}
      {cur.map(g=>(
        <div key={g.id} className="crow">
          <button className="ctap" onClick={e=>toggle(g,e)} aria-label="Toggle goal">
            <span className={'gcheck'+(g.status==='completed'?' on':'')}>✓</span>
          </button>
          <div className="grow">
            <div className={'tt'+(g.status==='completed'?' done':'')} style={{fontSize:14}}>{g.title}</div>
            {g.kept_from&&<div style={{fontSize:11,color:'var(--muted2)',marginTop:3}}>
              kept from {periodLabel(type,g.kept_from)}</div>}
          </div>
          <button className="xbtn" onClick={()=>removeGoal(g)} aria-label="Remove goal">×</button>
        </div>
      ))}
      <div className="qadd" style={{marginTop:4}}>
        <input placeholder={`Add a ${PWORD[type]} goal...`} value={text}
          onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addGoal()}/>
        <button className="btn btn-gold" onClick={addGoal} aria-label="Add goal">+</button>
      </div>

      {type!=='week'&&prevAll.length>0&&!showReview&&(()=>{
        const hit=prevAll.filter(g=>g.status==='completed');
        const miss=prevAll.filter(g=>g.status!=='completed');
        return (
          <div>
            <div className="sect">Last {PWORD[type]}, {periodLabel(type,prevKey)}</div>
            <div className="card">
              <div style={{fontSize:12,fontWeight:700,color:'var(--green)',marginBottom:2}}>
                Achieved {hit.length}
              </div>
              {hit.length===0&&<div className="mini" style={{color:'var(--muted2)'}}>None</div>}
              {hit.map(g=><div key={g.id} className="mini">{g.title}</div>)}
              {miss.length>0&&<>
                <div style={{fontSize:12,fontWeight:700,color:'var(--red)',margin:'14px 0 2px'}}>
                  Not achieved {miss.length}
                </div>
                {miss.map(g=>(
                  <div key={g.id} className="mini">
                    <span className="grow">{g.title}</span>
                    {g.status==='kept'&&<span className="chip back fx">Kept</span>}
                  </div>
                ))}
              </>}
            </div>
          </div>
        );
      })()}

      {historyKeys.length>0&&<div className="sect">History</div>}
      {historyKeys.map(k=>{
        const items=mine.filter(g=>g.period_key===k&&g.status!=='deleted');
        const done=items.filter(g=>g.status==='completed').length;
        const open=openHist===k;
        return (
          <div key={k} className="card tapme" onClick={()=>setOpenHist(open?null:k)}>
            <div className="row">
              <div className="grow">
                <div className="tt" style={{fontSize:14}}>{periodLabel(type,k)}</div>
                <div className="meta">{done} of {items.length} completed</div>
              </div>
              <span style={{color:'var(--muted2)',flex:'none'}}>{open?'▾':'▸'}</span>
            </div>
            {open&&(
              <div style={{marginTop:8}}>
                {items.map(g=>(
                  <div key={g.id} className="mini">
                    <span className="fx" style={{color:iconColor(g.status),fontWeight:700}}>{icon(g.status)}</span>
                    <span className="grow">{g.title}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ── daily ───────────────────────────────────────────────── */
function DailyTab({me, recs, reload}){
  const [edit,setEdit]=useState(null);
  const today=new Date(); const todayIso=isoDate(today);
  const due=recs.filter(r=>r.active&&isDueOn(r,today))
    .sort((a,b)=>(a.time_hhmm||'').localeCompare(b.time_hhmm||''));
  const left=due.filter(r=>r.last_done_date!==todayIso).length;
  const timeOpts=useMemo(()=>{ const o=[]; for(let h=0;h<24;h++){o.push(`${pad(h)}:00`);o.push(`${pad(h)}:30`);} return o; },[]);

  async function toggleDone(r,e){
    const row=e.currentTarget.closest('.crow');
    if(r.last_done_date===todayIso){
      await sb.from('wios_recurring_logs').delete().eq('rec_id',r.id).eq('done_date',todayIso);
      await sb.from('wios_recurrings').update({
        streak:Math.max(0,(r.streak||0)-1), last_done_date:prevDueDate(r,today)
      }).eq('id',r.id);
    }else{
      burst(row);
      const prev=prevDueDate(r,today);
      const s=(r.last_done_date&&r.last_done_date===prev)?(r.streak||0)+1:1;
      await sb.from('wios_recurring_logs').upsert({rec_id:r.id,done_date:todayIso},{onConflict:'rec_id,done_date'});
      await sb.from('wios_recurrings').update({
        streak:s, best_streak:Math.max(r.best_streak||0,s), last_done_date:todayIso
      }).eq('id',r.id);
    }
    reload();
  }

  return (
    <div>
      <div className="sect">Today {due.length>0&&<span className="n">{left} left</span>}</div>
      {due.length===0&&<div className="empty" style={{padding:'14px'}}>Nothing recurring is due today.</div>}
      {due.map(r=>{
        const done=r.last_done_date===todayIso;
        return (
          <div key={r.id} className="crow">
            <button className="ctap" onClick={e=>toggleDone(r,e)} aria-label="Toggle reminder">
              <span className={'gcheck'+(done?' on':'')}>✓</span>
            </button>
            <div className="grow">
              <div className={'tt'+(done?' done':'')} style={{fontSize:14}}>{r.title}</div>
              <div className="meta">{timeLabel(r.time_hhmm)}, {freqLabel(r)}</div>
            </div>
            {r.streak>0&&<span className="streak">🔥 {r.streak}</span>}
          </div>
        );
      })}

      <div className="sect">All reminders</div>
      {recs.length===0&&(
        <div className="empty" style={{padding:'14px'}}>
          Set up the things that must not slip, like the morning Instagram post.
        </div>
      )}
      {recs.map(r=>(
        <div key={r.id} className="card tapme" onClick={()=>setEdit(r)}>
          <div className="row">
            <div className="grow">
              <div className="tt" style={{fontSize:14,color:r.active?'var(--text)':'var(--muted2)'}}>{r.title}</div>
              <div className="meta">
                {!r.active&&<span className="chip off">Paused</span>}
                <span>{freqLabel(r)}, {timeLabel(r.time_hhmm)}</span>
                {r.best_streak>0&&<span>best 🔥 {r.best_streak}</span>}
              </div>
            </div>
            {r.streak>0&&r.active&&<span className="streak">🔥 {r.streak}</span>}
          </div>
        </div>
      ))}
      <button className="btn btn-line" style={{width:'100%',marginTop:6}} onClick={()=>setEdit('new')}>
        + New reminder
      </button>
      {edit&&<RecurringEditSheet edit={edit} me={me} timeOpts={timeOpts}
        onClose={()=>setEdit(null)} reload={reload}/>}
    </div>
  );
}

/* Lifted out of DailyTab so it is a stable component identity. When it was
   nested, every poll-driven re-render remounted it and reset the form, which
   made the popup flicker open/closed. */
function RecurringEditSheet({edit, me, timeOpts, onClose, reload}){
  const isNew=edit==='new';
  const [f,setF]=useState(isNew
    ?{title:'',freq:'daily',days:[1,2,3,4,5],day_of_month:1,time_hhmm:'09:00',active:true}
    :{...edit, days:edit.days||[], day_of_month:edit.day_of_month||1});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const bad = !(f.title||'').trim() || (f.freq==='weekly' && !f.days.length);

  async function save(){
    if(bad||saving) return; setSaving(true);
    const row={owner_id:me.id, title:f.title.trim(), freq:f.freq,
      days: f.freq==='weekly'?f.days.slice().sort():null,
      day_of_month: f.freq==='monthly'?Math.min(31,Math.max(1,+f.day_of_month||1)):null,
      time_hhmm:f.time_hhmm, active:f.active};
    try{
      if(isNew) await sb.from('wios_recurrings').insert(row);
      else await sb.from('wios_recurrings').update(row).eq('id',edit.id);
      onClose(); reload();
    }catch(e){ alert(e.message||'Could not save.'); setSaving(false); }
  }
  async function remove(){
    if(!confirm('Delete this reminder? The streak goes with it.')) return;
    await sb.from('wios_recurrings').delete().eq('id',edit.id);
    onClose(); reload();
  }
  return (
    <Sheet onClose={onClose}>
      <h3>{isNew?'New reminder':'Edit reminder'}</h3>
      <div className="sub">A notification arrives at this time on every due day, until you check it off.</div>
      <input placeholder="e.g. Post on Instagram" value={f.title} onChange={e=>set('title',e.target.value)}/>
      <div className="lbl">Repeats</div>
      <div className="seg" style={{marginBottom:0}}>
        {['daily','weekly','monthly'].map(fr=>(
          <button key={fr} className={f.freq===fr?'on':''} onClick={()=>set('freq',fr)}>
            {fr[0].toUpperCase()+fr.slice(1)}
          </button>
        ))}
      </div>
      {f.freq==='weekly'&&<>
        <div className="daychips">
          {DOW.map((d,i)=>(
            <button key={d} className={f.days.includes(i)?'on':''}
              onClick={()=>set('days', f.days.includes(i)?f.days.filter(x=>x!==i):[...f.days,i])}>{d[0]}</button>
          ))}
        </div>
        {!f.days.length&&<div className="err" style={{marginTop:8}}>Pick at least one day.</div>}
      </>}
      {f.freq==='monthly'&&<>
        <div className="row" style={{marginTop:10}}>
          <span className="note" style={{flex:1}}>Day of the month</span>
          <input type="number" min="1" max="31" value={f.day_of_month} style={{width:88,flex:'none'}}
            onChange={e=>set('day_of_month',e.target.value)}/>
        </div>
        <div className="note" style={{marginTop:6}}>
          A day past the end of a short month falls on that month's last day.
        </div>
      </>}
      <div className="lbl">Remind at</div>
      <select value={f.time_hhmm} onChange={e=>set('time_hhmm',e.target.value)}>
        {timeOpts.map(t=><option key={t} value={t}>{timeLabel(t)}</option>)}
      </select>
      {!isNew&&(
        <button className="opt" style={{marginTop:14}} onClick={()=>set('active',!f.active)}>
          <Ic name={f.active?'pause':'play'} className="muted"/>
          <span className="grow">{f.active?'Pause this reminder':'Resume this reminder'}</span>
        </button>
      )}
      <div style={{height:10}}/>
      <button className="btn btn-gold" style={{width:'100%'}} disabled={bad||saving} onClick={save}>
        {saving?'Saving...':'Save'}
      </button>
      {!isNew&&<button className="btn btn-red" style={{width:'100%',marginTop:8}} onClick={remove}>Delete</button>}
    </Sheet>
  );
}

/* ── team (admin) ────────────────────────────────────────── */
function TeamTab({me, people, coops, members}){
  const [data,setData]=useState(null);
  const [open,setOpen]=useState(null);
  useEffect(()=>{ (async()=>{
    const [t,g,r]=await Promise.all([
      sb.from('wios_tasks').select('*'),
      sb.from('wios_goals').select('*'),
      sb.from('wios_recurrings').select('*'),
    ]);
    setData({tasks:t.data||[], goals:g.data||[], recs:r.data||[]});
  })(); },[]);
  if(!data) return <div className="empty">Loading the team...</div>;

  const wk=periodKey('week'), mo=periodKey('month');
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };

  const now=Date.now();
  const weekAgo=now-7*86400000, monthAgo=now-30*86400000;

  function stats(p){
    const t=data.tasks.filter(x=>x.owner_id===p.id);
    const done=t.filter(x=>x.status==='done'&&x.completed_at);
    const doneWeek=done.filter(x=>new Date(x.completed_at).getTime()>=weekAgo).length;
