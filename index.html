  }

  const allCount=lists.all.length+coopGroups.mine.length+coopGroups.theirs.length+reqGroups.todo.length+reqGroups.sent.length;
  const segItems=[
    {k:'all',l:`All (7d)${allCount?` ${allCount}`:''}`, w:1.5},
    {k:'active',l:`Active${(lists.active.length+coopGroups.mine.length+reqGroups.todo.length)?` ${lists.active.length+coopGroups.mine.length+reqGroups.todo.length}`:''}`, w:1.2},
    {k:'waiting',l:`Waiting${(lists.waiting.length+coopGroups.theirs.length)?` ${lists.waiting.length+coopGroups.theirs.length}`:''}`, w:1.2},
    {k:'scheduled',l:'Later', w:0.9},
    {k:'done',l:'Done', w:0.75},
  ];
  // Finger-following swipe: while dragging horizontally the current panel moves under the
  // finger (with edge resistance); on release it either springs back or slides the rest of
  // the way out and switches tab, so it reads like scrolling across pages, not a hard cut.
  const swipe=useRef({x:0,y:0,on:false,dragging:false,w:0});
  const slideRef=useRef(null);
  function segIndex(){ return segItems.findIndex(s=>s.k===seg); }
  function setTX(px, anim){
    const el=slideRef.current; if(!el) return;
    el.style.transition = anim ? 'transform .2s cubic-bezier(.22,.61,.36,1), opacity .2s' : 'none';
    el.style.transform = `translateX(${px}px)`;
    el.style.opacity = String(Math.max(0.4, 1 - Math.abs(px)/ (swipe.current.w||360) ));
  }
  function changeSeg(nextKey){
    if(nextKey===seg) return;
    const from=segItems.findIndex(s=>s.k===seg), to=segItems.findIndex(s=>s.k===nextKey);
    setSlideDir(to>from?1:-1);
    setSeg(nextKey);
  }
  function onTouchStart(e){
    if(dragId) return;                              // a reorder drag is in progress
    if(e.target.closest && e.target.closest('.draghandle')) return;
    const t=e.touches[0];
    swipe.current={x:t.clientX,y:t.clientY,on:true,dragging:false,w:slideRef.current?slideRef.current.offsetWidth:360};
  }
  function onTouchMove(e){
    const s=swipe.current; if(!s.on) return;
    const t=e.touches[0];
    const dx=t.clientX-s.x, dy=t.clientY-s.y;
    if(!s.dragging){
      if(Math.abs(dx)<8) return;                    // wait until intent is clear
      if(Math.abs(dx)<Math.abs(dy)){ s.on=false; return; }   // vertical -> let it scroll
      s.dragging=true;
    }
    const idx=segIndex();
    // resistance at the ends (nothing to reveal past the first/last tab)
    const atEnd = (dx<0 && idx===segItems.length-1) || (dx>0 && idx===0);
    setTX(atEnd ? dx*0.28 : dx, false);
  }
  function onTouchEnd(e){
    const s=swipe.current; if(!s.on){ return; } s.on=false;
    if(!s.dragging){ return; }
    const t=e.changedTouches[0];
    const dx=t.clientX-s.x;
    const idx=segIndex();
    const threshold=Math.min(90, s.w*0.28);
    const goNext = dx<-threshold && idx<segItems.length-1;
    const goPrev = dx>threshold && idx>0;
    if(goNext||goPrev){
      // slide the current panel the rest of the way out, then swap (new one animates in)
      setTX(dx<0 ? -s.w : s.w, true);
      setTimeout(()=>changeSeg(segItems[goNext?idx+1:idx-1].k), 150);
    } else {
      setTX(0, true);                               // spring back
    }
  }

  return (

        <button className="btn addbtn ab-coop" onClick={()=>{ setSendTo([]); setSendMsg(''); setShowNewCoop(true); }}>

      </div>

      <Seg items={segItems} value={seg} onChange={v=>changeSeg(v)}/>

      <div className="swipearea" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      <div key={seg} ref={slideRef} className={'slidewrap '+(slideDir>0?'fromR':slideDir<0?'fromL':'')}>

      {(seg==='active'||seg==='all')&&(coopGroups.req.length>0||reqGroups.incoming.length>0)&&(

      {(seg==='active'||seg==='all')&&coopGroups.mine.map(c=><CoopCard key={c.id} c={c}/>)}
      {(seg==='active'||seg==='all')&&reqGroups.todo.map(r=><RequestCard key={r.id} r={r}/>)}
      {(seg==='active'||seg==='all')&&reqGroups.sent.map(r=><RequestCard key={r.id} r={r} sent/>)}
      {(seg==='active'||seg==='all')&&roleGroups.active.map(p=><RoleCard key={p.id} p={p}/>)}
      {(seg==='waiting'||seg==='all')&&coopGroups.theirs.map(c=><CoopCard key={c.id} c={c}/>)}
      {(seg==='waiting'||seg==='all')&&roleGroups.waiting.map(p=><RoleCard key={p.id} p={p}/>)}
      {seg==='done'&&coopGroups.closed.map(c=><CoopCard key={c.id} c={c}/>)}
      {seg==='done'&&reqGroups.done.map(r=><RequestCard key={r.id} r={r} sent={r.creator_id===me.id}/>)}
      {seg==='done'&&roleGroups.done.map(p=><RoleCard key={p.id} p={p}/>)}

      {lists[seg].length===0&&coopGroups.mine.length===0&&coopGroups.theirs.length===0&&
       coopGroups.closed.length===0&&coopGroups.req.length===0&&
       !((seg==='active'||seg==='all')&&(reqGroups.incoming.length||reqGroups.todo.length||reqGroups.sent.length||roleGroups.active.length))&&

        <div className="empty">
          {seg==='all'&&'Nothing on your plate. Tap Task, Coop, or Request to add one.'}

        </div>

      {(seg==='active'&&order ? order.map(id=>lists.active.find(t=>t.id===id)).filter(Boolean) : lists[seg]).map((t,idx)=>{
        const subs=Array.isArray(t.subtasks)?t.subtasks:[];

              </div>

      </div>

                  <Ic name="handoff" className="gold"/>

              {sel.is_system&&sel.system_kind==='goal_prompt'&&sel.system_ref&&(

                <button className="opt" onClick={()=>{

                <Ic name="trash" className="red"/><span className="grow">Delete</span>

            </div>
          )}

          {mode==='waiting'&&(
            <div>
              <div className="lbl">Bring it back in</div>
              <div className="pgrid">
                {[['3 hours',3],['6 hours',6],['1 day',24],['2 days',48],['3 days',72],['1 week',168]].map(([l,h])=>(
                  <button key={l} className="pbtn" onClick={()=>toWaiting(sel,h)}>{l}</button>
                ))}
              </div>
              <div className="lbl">Or pick your own</div>
              <div className="row">
                <input type="number" min="1" value={customN} onChange={e=>setCustomN(+e.target.value||1)}
                  style={{width:84,flex:'none'}}/>
                <select value={customU} onChange={e=>setCustomU(e.target.value)} style={{flex:1}}>
                  <option value="hours">hours</option><option value="days">days</option>
                </select>
                <button className="btn btn-gold btn-sm" style={{flex:'none',padding:'0 18px'}}
                  onClick={()=>toWaiting(sel, customU==='hours'?customN:customN*24)}>Set</button>
              </div>
              <div className="note" style={{marginTop:12}}>
                It moves to Waiting and counts the days. When the time is up it comes back to Active with a notification.
              </div>
            </div>
          )}

          {mode==='schedule'&&(
            <div>
              <div className="lbl">Bring it back on</div>
              <input type="datetime-local" value={schedAt} onChange={e=>setSchedAt(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} onClick={()=>toScheduled(sel)}>Set aside</button>
            </div>
          )}

          {mode==='alarm'&&(
            <div>
              <div className="lbl">Remind me at</div>
              <input type="datetime-local" value={alarmEdit} onChange={e=>setAlarmEdit(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} disabled={busy}
                onClick={()=>setAlarm(sel, alarmEdit)}>{sel.alarm_at&&!sel.alarm_fired?'Update reminder':'Set reminder'}</button>
              {sel.alarm_at&&!sel.alarm_fired&&(
                <button className="btn btn-line btn-sm" style={{width:'100%',marginTop:8}} disabled={busy}
                  onClick={()=>clearAlarm(sel)}>Turn off reminder</button>
              )}
              <div className="note" style={{marginTop:12}}>
                You get a push at that time. You can come back here any time to change it or turn it off.
              </div>
            </div>
          )}

            <div>
              <div className="lbl">Add teammates {sendTo.length>0&&<span style={{color:'var(--gold)'}}>{sendTo.length} selected</span>}</div>
              <PersonGrid people={people} value={sendTo} exclude={me.id} multi
                onChange={id=>setSendTo(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id])}/>
              <textarea rows="2" placeholder="What do you need from them?" value={sendMsg}
                onChange={e=>setSendMsg(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} disabled={!sendTo.length} onClick={()=>setMode('main')}>
                Add {sendTo.length>1?`${sendTo.length} teammates`:'teammate'}
              </button>
              <div className="note" style={{marginTop:10}}>
                You keep the task first. Confirm on the next screen, then pass it when it is their turn.
              </div>
            </div>
          )}
        </Sheet>
      )}

      {showNewTask&&(
        <Sheet onClose={()=>setShowNewTask(false)}>
          <h3>New task</h3>
          <div className="sub">Something for you to do. It goes in your Active list.</div>
          <input placeholder="What needs doing?" value={newTaskTitle}
            onChange={e=>setNewTaskTitle(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!newTaskDue) createTask(); }}/>
          <button className={'opt'+(newTaskUrgent?' on':'')} style={{marginTop:10}} onClick={()=>setNewTaskUrgent(!newTaskUrgent)}>
            <Ic name={newTaskUrgent?'starFill':'star'} className={newTaskUrgent?'gold':'muted'}/>
            <span className="grow">{newTaskUrgent?'Urgent, pinned to top':'Mark urgent'}</span>
          </button>
          <button className={'opt'+(newTaskLater?' on':'')} style={{marginTop:8}} onClick={()=>setNewTaskLater(!newTaskLater)}>
            <Ic name="calendar" className={newTaskLater?'gold':'muted'}/>
            <span className="grow">{newTaskLater?'Set it for later':'Set it for later (hide until a date)'}</span>
          </button>
          {newTaskLater&&<>
            <div className="lbl">Comes back to Active on</div>
            <input type="datetime-local" value={newTaskLaterAt} onChange={e=>setNewTaskLaterAt(e.target.value)}/>
          </>}
          <button className={'opt'+(newTaskRemind?' on':'')} style={{marginTop:8}} onClick={()=>setNewTaskRemind(!newTaskRemind)}>
            <Ic name="bell" className={newTaskRemind?'gold':'muted'}/>
            <span className="grow">{newTaskRemind?'Remind me':'Remind me'}</span>
          </button>
          {newTaskRemind&&<div className="remindbox">
            {!newTaskOtherDay&&(
              <div className="remindrow">
                <span className="remindday">Today</span>
                <input type="time" value={newTaskRemindTime} onChange={e=>setNewTaskRemindTime(e.target.value)}/>
              </div>
            )}
            {newTaskOtherDay&&<>
              <div className="lbl">Pick a day</div>
              <input type="date" value={newTaskRemindDate} min={isoDate(new Date())}
                onChange={e=>setNewTaskRemindDate(e.target.value)}/>
              <div className="lbl">At what time</div>
              <input type="time" value={newTaskRemindTime} onChange={e=>setNewTaskRemindTime(e.target.value)}/>
            </>}
            <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:8}}
              onClick={()=>{ setNewTaskOtherDay(!newTaskOtherDay); if(newTaskOtherDay) setNewTaskRemindDate(''); }}>
              {newTaskOtherDay?'Use today instead':'Pick another day'}
            </button>
          </div>}
          <div className="lbl">Finish before (optional)</div>
          <input type="datetime-local" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)}/>

      )}

        <NewRequestSheet me={me} people={people} onClose={()=>setShowNewRequest(false)} reload={reload}/>
      )}

      {openReqId&&(()=>{
        const r=(requests||[]).find(x=>x.id===openReqId);
        if(!r){ return null; }
        return <RequestDetail me={me} people={people} r={r} targets={reqTargetsOf(r.id)}
          onClose={()=>setOpenReqId(null)}
          onAccept={()=>acceptRequest(r)} onDecline={()=>declineRequest(r)}
          onComplete={()=>completeRequest(r)} onClose2={()=>{closeRequest(r);setOpenReqId(null);}}
          onDelete={()=>{deleteRequest(r);setOpenReqId(null);}} busy={busy}/>;

      {showNewRole&&(
        <NewRoleSheet me={me} people={people} onClose={()=>setShowNewRole(false)} reload={reload}/>
      )}

      {openRoleId&&(()=>{
        const p=(roleProjects||[]).find(x=>x.id===openRoleId);
        if(!p){ return null; }
        return <RoleDetail me={me} people={people} p={p}
          mems={roleMembersOf(p.id)} items={roleItemsOf(p.id)} busy={busy}
          onClose={()=>setOpenRoleId(null)}
          onToggle={toggleRoleItem} onAdd={addRoleItem} onApprove={approveRoleItem}
          onDeleteItem={deleteRoleItem} onMarkMine={()=>markRoleMine(p)}
          onReopenMine={()=>reopenRoleMine(p)}
          onAck={()=>{acknowledgeRole(p);setOpenRoleId(null);}}
          onDelete={()=>{deleteRole(p);setOpenRoleId(null);}}/>;
      })()}

      {declining&&(
        <Sheet onClose={()=>setDeclining(null)}>
          <h3>Respond</h3>
          <div className="sub">Tell them why this is not needed, or suggest another way. It goes back to whoever sent it.</div>
          <textarea rows="3" placeholder="Your message" value={declineMsg} onChange={e=>setDeclineMsg(e.target.value)}/>
          <div style={{height:12}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={busy} onClick={sendDecline}>
            {busy?'Sending...':'Send response'}
          </button>
        </Sheet>
      )}

      {openCoopId&&<CoopDetail me={me} people={people}
        coop={coops.find(c=>c.id===openCoopId)} members={members.filter(m=>m.coop_id===openCoopId)}
        onClose={()=>setOpenCoopId(null)} reload={reload}/>}
    </div>
  );
}

/* ── new coop sheet (shared by tasks view) ───────────────── */
function NewCoopSheet({me, people, onClose, reload}){
  const [nTitle,setNTitle]=useState(''); const [nTo,setNTo]=useState([]);
  const [nMsg,setNMsg]=useState(''); const [nUrgent,setNUrgent]=useState(false);
  const [busy,setBusy]=useState(false);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  const toggle=id=>setNTo(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);
  async function createCoop(){
    const title=nTitle.trim(); if(!title||!nTo.length||busy) return;
    setBusy(true);
    try{
      // Creator keeps the baton: the coop opens in the creator's Active.
      // Invited teammates are pending until they join; then it waits for a pass.
      const {data:coop,error}=await sb.from('wios_coops').insert({
        title, creator_id:me.id, holder_id:me.id, pending_id:null, last_holder_id:me.id, urgent:nUrgent
      }).select().single();
      if(error) throw error;
      const rows=[{coop_id:coop.id,user_id:me.id,status:'accepted',joined_at:nowIso()}];
      nTo.forEach(uid=>rows.push({coop_id:coop.id,user_id:uid,status:'pending',invited_by:me.id,invite_message:nMsg||null}));
      await sb.from('wios_coop_members').insert(rows);
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'system',
        body:`${label(me.id)} started this with ${nTo.map(label).join(', ')}`});
      notifyUsers(nTo, `${label(me.id)} added you to a coop`, title, coop.id);
      onClose(); reload();
    }catch(e){ alert(e.message||'Could not create.'); }
    setBusy(false);
  }
  return (
    <Sheet onClose={onClose}>
      <h3>New coop task</h3>
      <div className="sub">A shared task. You keep it first, then pass it to a teammate when it is their turn. Add anyone who should be part of it.</div>
      <input placeholder="What needs doing?" value={nTitle} onChange={e=>setNTitle(e.target.value)}/>
      <div className="lbl">Add teammates {nTo.length>0&&<span style={{color:'var(--gold)'}}>{nTo.length} selected</span>}</div>
      <PersonGrid people={people} value={nTo} onChange={toggle} exclude={me.id} multi/>
      <textarea rows="2" placeholder="Message (optional)" value={nMsg} onChange={e=>setNMsg(e.target.value)}/>
      <button className={'opt'+(nUrgent?' on':'')} style={{marginTop:10}} onClick={()=>setNUrgent(!nUrgent)}>
        <Ic name={nUrgent?'starFill':'star'} className="gold"/>
        <span className="grow">{nUrgent?'Urgent':'Mark urgent'}</span>
      </button>
      <div style={{height:6}}/>
      <button className="btn btn-gold" style={{width:'100%'}} disabled={!nTitle.trim()||!nTo.length||busy} onClick={createCoop}>
        {busy?'Creating...':'Create coop'}
      </button>
    </Sheet>
  );
}

function NewRequestSheet({me, people, onClose, reload}){
  const [title,setTitle]=useState(''); const [msg,setMsg]=useState('');
  const [to,setTo]=useState([]); const [urgent,setUrgent]=useState(false);
  const [busy,setBusy]=useState(false);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  const toggle=id=>setTo(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);
  async function create(){
    const t=title.trim(); if(!t||!to.length||busy) return;
    setBusy(true);
    try{
      const {data:req,error}=await sb.from('wios_requests').insert({
        creator_id:me.id, title:t, message:msg||null, urgent, status:'open'
      }).select().single();
      if(error) throw error;
      const rows=to.map(uid=>({request_id:req.id, user_id:uid, status:'pending'}));
      await sb.from('wios_request_targets').insert(rows);
      notifyUsers(to, `${label(me.id)} asked you`, t, null);
      onClose(); reload();
    }catch(e){ alert(e.message||'Could not send.'); }
    setBusy(false);
  }
  return (
    <Sheet onClose={onClose}>
      <h3>New request</h3>
      <div className="sub">Ask one or more people to do something. Each person accepts, does it, then marks it done. You get a push as each one finishes.</div>
      <input placeholder="What are you asking for?" value={title} onChange={e=>setTitle(e.target.value)}/>
      <textarea rows="2" placeholder="Details (optional)" value={msg} onChange={e=>setMsg(e.target.value)}/>
      <div className="lbl">Ask who {to.length>0&&<span style={{color:'var(--gold)'}}>{to.length} selected</span>}</div>
      <PersonGrid people={people} value={to} onChange={toggle} exclude={me.id} multi/>
      <button className={'opt'+(urgent?' on':'')} style={{marginTop:10}} onClick={()=>setUrgent(!urgent)}>
        <Ic name={urgent?'starFill':'star'} className="gold"/>
        <span className="grow">{urgent?'Urgent':'Mark urgent'}</span>
      </button>
      <div style={{height:6}}/>
      <button className="btn btn-gold" style={{width:'100%'}} disabled={!title.trim()||!to.length||busy} onClick={create}>
        {busy?'Sending...':`Send request${to.length>1?` to ${to.length}`:''}`}
      </button>
    </Sheet>
  );
}

function RequestDetail({me, people, r, targets, onClose, onAccept, onDecline, onComplete, onClose2, onDelete, busy}){
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  const iSent=r.creator_id===me.id;
  const myT=targets.find(t=>t.user_id===me.id);
  const active=targets.filter(t=>t.status!=='declined');
  const doneN=targets.filter(t=>t.status==='completed').length;
  const allDone=active.length>0&&active.every(t=>t.status==='completed');
  const stTxt=s=>s==='completed'?'Done':s==='accepted'?'Accepted':s==='declined'?'Declined':'Waiting';
  const stCls=s=>s==='completed'?'ok':s==='accepted'?'back':s==='declined'?'off':'wait';
  return (
    <div className="detail">
      <div className="dhdr">
        <button className="iconbtn" onClick={onClose} aria-label="Back">{ICON.back}</button>
        <div className="grow">
          <div className="tt">{r.title}</div>
          <div className="meta">
            <span className="coopmark" aria-label="Request" style={{width:16,height:16}}>{ICON.request}</span>
            <span>Request from {label(r.creator_id)}</span>
            {r.status==='done'&&<span className="chip ok">Closed</span>}
          </div>
        </div>
        {iSent&&(
          <button className="iconbtn" onClick={onDelete} disabled={busy} aria-label="Delete request" style={{color:'var(--red)'}}>{ICON.trash}</button>
        )}
      </div>

      <div className="dbody">
        {r.message&&<div className="reqmsg">"{r.message}"</div>}

        <div className="lbl">Who was asked <span style={{color:'var(--gold)'}}>{doneN}/{active.length} done</span></div>
        {targets.map(t=>(
          <div key={t.user_id} className="reqrow">
            <span className="grow">{label(t.user_id)}</span>
            <span className={'chip '+stCls(t.status)}>{stTxt(t.status)}</span>
          </div>
        ))}

        {/* recipient actions */}
        {!iSent&&myT&&myT.status==='pending'&&(
          <div className="row" style={{gap:8,marginTop:14}}>
            <button className="btn btn-gold" style={{flex:1}} disabled={busy} onClick={onAccept}>Accept</button>
            <button className="btn btn-line" style={{flex:1}} disabled={busy} onClick={onDecline}>Decline</button>
          </div>
        )}
        {!iSent&&myT&&myT.status==='accepted'&&(
          <button className="btn btn-gold" style={{width:'100%',marginTop:14}} disabled={busy} onClick={onComplete}>
            Mark completed
          </button>
        )}
        {!iSent&&myT&&myT.status==='completed'&&(
          <div className="note" style={{marginTop:14}}>You finished this. Waiting on the others.</div>
        )}

        {/* asker actions */}
        {iSent&&r.status!=='done'&&(
          <button className="btn btn-gold" style={{width:'100%',marginTop:14}} disabled={busy} onClick={onClose2}>
            {allDone?'Everyone is done, close it':`Close it now (${doneN}/${active.length} done)`}
          </button>
        )}
      </div>
    </div>
  );
}

function NewRoleSheet({me, people, onClose, reload}){
  const [title,setTitle]=useState(''); const [desc,setDesc]=useState('');
  const [team,setTeam]=useState([]); const [due,setDue]=useState(''); const [busy,setBusy]=useState(false);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  const toggle=id=>setTeam(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);
  async function create(){
    const t=title.trim(); if(!t||busy) return;
    if(!due){ alert('Set a due date for the project.'); return; }
    setBusy(true);
    try{
      const {data:proj,error}=await sb.from('wios_role_projects').insert({
        creator_id:me.id, title:t, description:desc||null, due_at:new Date(due).toISOString(), status:'active'
      }).select().single();
      if(error) throw error;
      const ids=Array.from(new Set([me.id, ...team]));
      await sb.from('wios_role_members').insert(ids.map(uid=>({project_id:proj.id, user_id:uid, status:'working'})));
      notifyUsers(team, `${label(me.id)} started a project`, t, null);
      onClose(); reload();
    }catch(e){ alert(e.message||'Could not create.'); }
    setBusy(false);
  }
  return (
    <Sheet onClose={onClose}>
      <h3>New role project</h3>
      <div className="sub">A shared project where each person owns a role. Everyone works at the same time on their own tasks. When all are done, it comes back to Active for each person to mark Done.</div>
      <input placeholder="Project name (e.g. Spring exhibition)" value={title} onChange={e=>setTitle(e.target.value)}/>
      <textarea rows="2" placeholder="What is this project? (optional)" value={desc} onChange={e=>setDesc(e.target.value)}/>
      <div className="lbl">Project due date <span style={{color:'var(--gold)'}}>required</span></div>
      <input type="datetime-local" value={due} onChange={e=>setDue(e.target.value)}/>
      <div className="lbl">Who is on it {team.length>0&&<span style={{color:'var(--gold)'}}>{team.length} picked</span>}</div>
      <PersonGrid people={people} value={team} onChange={toggle} exclude={me.id} multi/>
      <div className="note" style={{marginTop:8}}>You are included automatically. Everyone can add tasks to their own role, or to someone else's (that person approves it).</div>
      <div style={{height:8}}/>
      <button className="btn btn-gold" style={{width:'100%'}} disabled={!title.trim()||!due||busy} onClick={create}>
        {busy?'Creating...':'Create project'}
      </button>
    </Sheet>
  );
}

function RoleDetail({me, people, p, mems, items, busy, onClose, onToggle, onAdd, onApprove, onDeleteItem, onMarkMine, onReopenMine, onAck, onDelete}){
  const label=id=>{ const pr=people.find(x=>x.id===id); return pr?`${pr.role} ${first(pr.name)}`:'someone'; };
  const roleLabel=id=>{ const pr=people.find(x=>x.id===id); return pr?pr.role:'?'; };
  const myMem=mems.find(m=>m.user_id===me.id);
  const iCreated=p.creator_id===me.id;
  const everyoneDone=mems.length>0&&mems.every(m=>m.status==='completed'||m.status==='acknowledged');
  const iAcknowledged=myMem&&myMem.status==='acknowledged';
  const [addFor,setAddFor]=useState(null);
  const [aTitle,setATitle]=useState('');
  // participant tabs: me first, then everyone else. Default view is my own role.
  const ordered=[...mems].sort((a,b)=>(a.user_id===me.id?-1:b.user_id===me.id?1:0));
  const [viewId,setViewId]=useState(myMem?me.id:(mems[0]&&mems[0].user_id));
  const viewMem=mems.find(m=>m.user_id===viewId)||mems[0];
  function submitAdd(){
    if(!aTitle.trim()){ alert('Type a task.'); return; }
    onAdd(p.id, addFor, aTitle);
    setATitle(''); setAddFor(null);
  }
  const memItems=id=>items.filter(it=>it.assignee_id===id).sort((a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0));
  return (
    <div className="detail">
      <div className="dhdr">
        <button className="iconbtn" onClick={onClose} aria-label="Back">{ICON.back}</button>
        <div className="grow">
          <div className="tt">{p.title}</div>
          <div className="meta">
            <span className="coopmark" aria-label="Role project" style={{width:16,height:16}}>{ICON.roles}</span>
            <span>Role project</span>
            {p.due_at&&<span className={'chip due'+(dueSoon(p.due_at)?' urgent':'')}>Due {fmtShort(p.due_at)}</span>}
          </div>
        </div>
        {iCreated&&(
          <button className="iconbtn" onClick={onDelete} disabled={busy} aria-label="Delete" style={{color:'var(--red)'}}>{ICON.trash}</button>
        )}
      </div>

      <div className="dbody">
        {p.description&&<div className="reqmsg">"{p.description}"</div>}
        {everyoneDone&&!iAcknowledged&&(
          <div className="rolebanner">Everyone finished their part. Check the work, then mark it Done for yourself.</div>
        )}

        {/* participant tabs */}
        <div className="roletabs">
          {ordered.map(m=>{
            const done=m.status==='completed'||m.status==='acknowledged';
            const its=memItems(m.user_id).filter(it=>it.approved);
            const pend=items.some(it=>it.assignee_id===m.user_id&&!it.approved);
            return (
              <button key={m.user_id} className={'roletab'+(viewId===m.user_id?' on':'')} onClick={()=>setViewId(m.user_id)}>
                <span className="rtrole">{roleLabel(m.user_id)}</span>
                {done&&<span className="rtdot ok">✓</span>}
                {!done&&pend&&<span className="rtdot new">!</span>}
              </button>
            );
          })}
        </div>

        {viewMem&&(()=>{
          const m=viewMem;
          const its=memItems(m.user_id);
          const mine=m.user_id===me.id;
          const approved=its.filter(it=>it.approved);
          const doneN=approved.filter(it=>it.done).length;
          const memDone=m.status==='completed'||m.status==='acknowledged';
          return (
            <div className="rolecol">
              <div className="rolehd">
                <span className="chip role">{roleLabel(m.user_id)}</span>
                <span className="grow">{first((people.find(x=>x.id===m.user_id)||{}).name||'')}{mine?' (you)':''}</span>
                {memDone
                  ? <span className="chip ok">{m.status==='acknowledged'?'Done':'Finished'}</span>
                  : <span className="chip sub">{doneN}/{approved.length}</span>}
              </div>
              {its.length===0&&<div className="note" style={{padding:'2px 0 6px'}}>No tasks yet.</div>}
              {its.map(it=>{
                const canCheck = mine && it.approved && !iAcknowledged;
                const needsApproval = mine && !it.approved;
                return (
                  <div key={it.id} className="roleitem">
                    <button className={'gcheck'+(it.done?' on':'')} disabled={!canCheck||busy}
                      onClick={()=>canCheck&&onToggle(it)} aria-label="Toggle">✓</button>
                    <div className="grow">
                      <div className={it.done?'ovdone':''} style={{fontSize:14}}>{it.title}</div>
                      <div className="meta">
                        {needsApproval&&<span className="chip urgent">{label(it.added_by)} added</span>}
                        {!mine&&it.added_by===me.id&&!it.approved&&<span className="chip sub">waiting approval</span>}
                      </div>
                    </div>
                    {needsApproval&&(
                      <button className="miniapprove" disabled={busy} onClick={()=>onApprove(it)} aria-label="Approve">Approve</button>
                    )}
                    {(mine||it.added_by===me.id||iCreated)&&(
                      <button className="xbtn" disabled={busy} onClick={()=>onDeleteItem(it)} aria-label="Remove">×</button>
                    )}
                  </div>
                );
              })}
              {!iAcknowledged&&(
                addFor===m.user_id?(
                  <div className="roleadd">
                    <input placeholder="Task title" value={aTitle} onChange={e=>setATitle(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&submitAdd()}/>
                    <div className="row" style={{gap:8,marginTop:8}}>
                      <button className="btn btn-line btn-sm" style={{flex:1}} onClick={()=>{setAddFor(null);setATitle('');}}>Cancel</button>
                      <button className="btn btn-gold btn-sm" style={{flex:1}} disabled={busy} onClick={submitAdd}>Add</button>
                    </div>
                  </div>
                ):(
                  <button className="roleaddbtn" onClick={()=>{setAddFor(m.user_id);setATitle('');}}>
                    + Add a task{mine?'':` for ${first((people.find(x=>x.id===m.user_id)||{}).name||'them')}`}
                  </button>
                )
              )}
            </div>
          );
        })()}

        {/* my completion + done controls */}
        {!iAcknowledged&&myMem&&myMem.status!=='completed'&&!everyoneDone&&(
          <button className="btn btn-gold" style={{width:'100%',marginTop:14}} disabled={busy} onClick={onMarkMine}>
            Mark my part completed
          </button>
        )}
        {!iAcknowledged&&myMem&&myMem.status==='completed'&&!everyoneDone&&(
          <>
            <div className="note" style={{textAlign:'center',marginTop:14}}>Your part is done. Waiting on the others.</div>
            <button className="btn btn-line btn-sm" style={{width:'100%',marginTop:8}} disabled={busy} onClick={onReopenMine}>Reopen my part</button>
          </>
        )}
        {!iAcknowledged&&everyoneDone&&(
          <button className="btn btn-gold" style={{width:'100%',marginTop:14}} disabled={busy} onClick={onAck}>
            Mark Done for me
          </button>
        )}
        {iAcknowledged&&(
          <div className="note" style={{textAlign:'center',marginTop:14}}>You marked this Done.</div>
        )}
      </div>
    </div>
  );
}

function CoopDetail({me, people, coop, members, onClose, reload}){
  const [msgs,setMsgs]=useState([]); const [text,setText]=useState('');
  const [passing,setPassing]=useState(false); const [passTo,setPassTo]=useState(null); const [passMsg,setPassMsg]=useState('');
  const [passRemind,setPassRemind]=useState(0);   // hours; 0 = no reminder
  const [adding,setAdding]=useState(false); const [addPick,setAddPick]=useState([]); const [addMsg,setAddMsg]=useState('');
  const [busy,setBusy]=useState(false);
  const endRef=useRef(null);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };

  async function loadMsgs(){
    if(!coop) return;
    const {data}=await sb.from('wios_coop_messages').select('*').eq('coop_id',coop.id).order('created_at');
    const next=data||[];
    setMsgs(prev=>{
      if(next.length!==prev.length){
        setTimeout(()=>endRef.current&&endRef.current.scrollIntoView({block:'end'}),60);
      }
      return next;
    });
  }
  useEffect(()=>{
    if(!coop) return;
    loadMsgs();
    const iv=setInterval(loadMsgs,5000);
    const onVis=()=>{ if(document.visibilityState==='visible') loadMsgs(); };
    document.addEventListener('visibilitychange',onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange',onVis); };
  },[coop&&coop.id]);

  if(!coop) return null;
  const iAmHolder=coop.holder_id===me.id&&coop.status==='active';
  const acceptedIds=members.filter(m=>m.status==='accepted').map(m=>m.user_id);
  const pendingIds=members.filter(m=>m.status==='pending').map(m=>m.user_id);
  // everyone accepted (they can hold the ball). Creator is always in.
  const everyone=[...new Set(acceptedIds.concat([coop.creator_id]))];
  // everyone on the coop at all, accepted or still invited, for display and pass targets
  const roster=[...new Set(everyone.concat(pendingIds).concat(coop.pending_id?[coop.pending_id]:[]))];

  async function comment(){
    const body=text.trim(); if(!body||busy) return;
    setText('');
    await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'comment',body});
    notifyUsers(everyone.filter(x=>x!==me.id), coop.title, `${label(me.id)}: ${body}`, coop.id);
    loadMsgs();
    // a comment is not a pass. If you hold the ball, ask right away who to hand it to.
    if(iAmHolder) setPassing(true);
  }
  async function doPass(){
    if(!passTo||busy) return; setBusy(true);
    try{
      const target=members.find(m=>m.user_id===passTo);
      const msg=passMsg.trim();
      const remindAt = passRemind>0 ? new Date(Date.now()+passRemind*3600000).toISOString() : null;
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'pass',
        pass_to:passTo,body:msg||null});
      if(target&&target.status==='accepted'){
        await sb.from('wios_coops').update({holder_id:passTo,pending_id:null,last_holder_id:me.id,
          remind_at:remindAt,reminded:false}).eq('id',coop.id);
        notifyUsers([passTo], `Your turn: ${coop.title}`, msg||`Passed by ${label(me.id)}`, coop.id);
      }else{
        if(!target){
          await sb.from('wios_coop_members').insert({coop_id:coop.id,user_id:passTo,status:'pending',
            invited_by:me.id,invite_message:msg||null});
        }else{
          await sb.from('wios_coop_members').update({status:'pending',invited_by:me.id,invite_message:msg||null})
            .eq('coop_id',coop.id).eq('user_id',passTo);
        }
        await sb.from('wios_coops').update({holder_id:null,pending_id:passTo,last_holder_id:me.id,
          remind_at:remindAt,reminded:false}).eq('id',coop.id);
        notifyUsers([passTo], `Task request from ${label(me.id)}`, coop.title, coop.id);
      }
      setPassing(false); setPassTo(null); setPassMsg(''); setPassRemind(0);
      await reload(); loadMsgs();
    }catch(e){ alert(e.message||'Could not pass this on.'); }
    setBusy(false);
  }
  async function addMembers(){
    if(!addPick.length||busy) return; setBusy(true);
    try{
      // some of the picked people may have an old row (e.g. declined earlier). Upsert by
      // inserting the ones with no row and re-inviting the ones that already have one.
      for(const uid of addPick){
        const existing=members.find(m=>m.user_id===uid);
        if(existing){
          await sb.from('wios_coop_members').update({status:'pending',invited_by:me.id,invite_message:addMsg||null})
            .eq('coop_id',coop.id).eq('user_id',uid);
        }else{
          await sb.from('wios_coop_members').insert({coop_id:coop.id,user_id:uid,status:'pending',
            invited_by:me.id,invite_message:addMsg||null});
        }
      }
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'system',
        body:`${label(me.id)} invited ${addPick.map(label).join(', ')}`});
      notifyUsers(addPick, `Added to a coop: ${coop.title}`, addMsg||`by ${label(me.id)}`, coop.id);
      setAdding(false); setAddPick([]); setAddMsg('');
      await reload(); loadMsgs();
    }catch(e){ alert(e.message||'Could not add.'); }
    setBusy(false);
  }
  async function closeCoop(){
    if(busy||!confirm('Close this for everyone?')) return;
    setBusy(true);
    try{
      await sb.from('wios_coops').update({status:'closed',closed_at:nowIso(),closed_by:me.id}).eq('id',coop.id);
      await sb.from('wios_coop_messages').insert({coop_id:coop.id,user_id:me.id,kind:'system',
        body:`Completed and closed by ${label(me.id)}`});
      notifyUsers(everyone.filter(x=>x!==me.id), `Completed: ${coop.title}`, `Closed by ${label(me.id)}`, coop.id);
      await reload(); onClose();
    }catch(e){ alert(e.message||'Could not close.'); setBusy(false); }
  }
  async function deleteCoop(){
    if(busy) return;
    if(!confirm('Delete this coop for everyone? This cannot be undone.')) return;
    setBusy(true);
    try{
      await sb.from('wios_coop_messages').delete().eq('coop_id',coop.id);
      await sb.from('wios_coop_members').delete().eq('coop_id',coop.id);
      await sb.from('wios_coops').delete().eq('id',coop.id);
      await reload(); onClose();
    }catch(e){ alert(e.message||'Could not delete.'); setBusy(false); }
  }

  return (
    <div className="detail">
      <div className="dhdr">
        <button className="iconbtn" onClick={onClose} aria-label="Back">←</button>
        <div className="grow">
          <div className="tt">{coop.title}</div>
          <div className="meta">
            {coop.status==='closed'?<span className="chip ok">Completed</span>:
             coop.pending_id?<span className="chip wait">Sent to {label(coop.pending_id)}</span>:
             iAmHolder?<span className="chip back">Your turn</span>:
             <span className="chip wait">With {label(coop.holder_id)}</span>}
            <span>from {label(coop.creator_id)}</span>
          </div>
        </div>
        {coop.creator_id===me.id&&(
          <button className="iconbtn" onClick={deleteCoop} disabled={busy} aria-label="Delete coop"
            style={{color:'var(--red)'}}>{ICON.trash}</button>
        )}
      </div>

      <div className="court">
        {roster.map(id=>{
          const p=people.find(x=>x.id===id); if(!p) return null;
          const m=members.find(x=>x.user_id===id);
          const acc=id===coop.creator_id||(m&&m.status==='accepted');
          const pend=!acc&&(m&&m.status==='pending'||id===coop.pending_id);
          return (
            <div key={id} className={'player'+(acc?' acc':'')+(pend?' pend':'')}>
              <div className="av">{p.role}</div>
              <div className="nm">{first(p.name)}</div>
              {pend
                ? <div className="pendtag">Waiting to accept</div>
                : <div className="slot">{coop.holder_id===id&&coop.status==='active'&&<span className="ball"/>}</div>}
            </div>
          );
        })}
        {coop.status==='active'&&(
          <button className="playeradd" onClick={()=>setAdding(true)} aria-label="Add someone">
            <div className="av addplus">+</div>
            <div className="nm">Add</div>
            <div className="slot"/>
          </button>
        )}
      </div>

      <div className="thread">
        {msgs.map(m=>{
          if(m.kind==='system') return <div key={m.id} className="sysline">{m.body}</div>;
          if(m.kind==='pass') return (
            <div key={m.id} className="passline">
              <b>{label(m.user_id)}</b> → <b>{label(m.pass_to)}</b>
              {m.body&&<div style={{marginTop:4,color:'var(--text)'}}>{m.body}</div>}
              <div style={{fontSize:10,color:'var(--muted2)',marginTop:4}}>{fmtShort(m.created_at)}</div>
            </div>
          );
          const mine=m.user_id===me.id;
          return (
            <div key={m.id} className={'msg '+(mine?'mine':'theirs')}>
              {!mine&&<div className="who">{label(m.user_id)}</div>}
              {m.body}
              <div className="when">{fmtShort(m.created_at)}</div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>

      {iAmHolder&&(
        <div className="holderbar">
          <button className="btn btn-pass" disabled={busy} onClick={()=>setPassing(true)}>
            <span className="lbl2">Pass to...</span>
          </button>
          <button className="btn btn-gold" disabled={busy} onClick={closeCoop}>
            <span className="lbl2">Complete &amp; close</span>
          </button>
        </div>
      )}
      {coop.status==='active'&&(
        <div className="composer">
          <input placeholder="Comment..." value={text} onChange={e=>setText(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&comment()}/>
          <button className="btn btn-gold btn-sm" onClick={comment}>Send</button>
        </div>
      )}

      {passing&&(
        <Sheet onClose={()=>setPassing(false)}>
          <h3>Pass to</h3>
          <div className="sub">Your part is done. Hand the ball to whoever is next.</div>
          <PersonGrid people={people.filter(p=>roster.includes(p.id))} value={passTo} onChange={setPassTo} exclude={me.id}/>
          <textarea rows="2" placeholder="What should they do next?" value={passMsg}
            onChange={e=>setPassMsg(e.target.value)}/>
          <div className="lbl">Remind you if no response</div>
          <div className="pgrid">
            {[['No reminder',0],['In 3 hours',3],['Tomorrow',24],['In 2 days',48]].map(([l,h])=>(
              <button key={l} className={'pbtn'+(passRemind===h?' on':'')} onClick={()=>setPassRemind(h)}>{l}</button>
            ))}
          </div>
          <div style={{height:8}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={!passTo||busy} onClick={doPass}>
            {busy?'Passing...':'Pass'}
          </button>
        </Sheet>
      )}

      {adding&&(
        <Sheet onClose={()=>{setAdding(false);setAddPick([]);setAddMsg('');}}>
          <h3>Add to this coop</h3>
          <div className="sub">Bring more people in. They get an invite and join once they accept.</div>
          <PersonGrid people={people.filter(p=>!roster.includes(p.id))} value={addPick}
            onChange={id=>setAddPick(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id])}
            exclude={me.id} multi/>
          <textarea rows="2" placeholder="A note for them (optional)" value={addMsg}
            onChange={e=>setAddMsg(e.target.value)}/>
          <div style={{height:8}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={!addPick.length||busy} onClick={addMembers}>
            {busy?'Adding...':`Add ${addPick.length||''}`.trim()}
          </button>
          {people.filter(p=>!roster.includes(p.id)&&p.id!==me.id).length===0&&(
            <div className="note" style={{textAlign:'center',marginTop:10}}>Everyone is already on this coop.</div>
          )}
        </Sheet>
      )}
    </div>
  );
}

/* ── goals ───────────────────────────────────────────────── */
function GoalWizard({me, reload, startFrom='year', initialParentId=null, onDismiss}){
  // Guided setup from a given period down to weekly. Each step lets you add one or more
  // goals for that period; the next period links under the first goal of this one (you can
  // re-link any of them later in Overview). Used on Jan 1, each semester and each month.
  const ORDER=['year','semester','month','week'];
  const steps=ORDER.slice(ORDER.indexOf(startFrom));
  const [i,setI]=useState(0);
  const [text,setText]=useState('');
  const [added,setAdded]=useState([]);          // goals added at the current step: [{id,title}]
  const [parentId,setParentId]=useState(initialParentId);   // link target for this step's goals
  const [firstChildParent,setFirstChildParent]=useState(null); // first goal id -> parent for next step
  const [prevTitle,setPrevTitle]=useState('');
  const [busy,setBusy]=useState(false);
  const t=steps[i];
  const prompt={
    year:'What is your goal for this year?',
    semester:prevTitle?`What will you do this half of the year to reach "${prevTitle}"?`:'What is your goal for this half of the year?',
    month:prevTitle?`What will you do this month to reach "${prevTitle}"?`:'What is your goal for this month?',
    week:prevTitle?`What will you do this week to reach "${prevTitle}"?`:'What is your goal for this week?',
  };
  async function addOne(){
    const title=text.trim(); if(!title||busy) return;
    setBusy(true);
    try{
      const {data,error}=await sb.from('wios_goals').insert({
        owner_id:me.id, period_type:t, period_key:periodKey(t),
        title, status:'open', parent_id:parentId
      }).select().single();
      if(error) throw error;
      setAdded(a=>[...a,{id:data.id,title}]);
      if(firstChildParent===null) setFirstChildParent(data.id);   // first goal of this step
      setText('');
    }catch(e){ alert(e.message||'Could not save.'); }
    setBusy(false);
  }
  async function next(){
    // commit any text still in the box, then move on
    if(text.trim()){ await addOne(); }
    if(added.length===0 && !text.trim()){ return; }   // nothing added yet
    if(i>=steps.length-1){ onDismiss&&onDismiss(); reload(); return; }
    // the next period links under the first goal added here
    setParentId(firstChildParent);
    setPrevTitle(added[0]?added[0].title:text.trim());
    setFirstChildParent(null); setAdded([]); setText(''); setI(i+1);
  }
  async function skip(){
    if(text.trim()) await addOne();
    if(busy) return; onDismiss&&onDismiss(); reload();
  }
  const canAdvance = added.length>0 || text.trim().length>0;
  return (
    <div className="wiz">
      <div className="wizdots">
        {steps.map((s,idx)=>(
          <span key={s} className={'wizdot'+(idx<i?' done':idx===i?' on':'')}/>
        ))}
      </div>
      <div className="wizstep">{PLABEL[t]} goal</div>
      <div className="wizq">{prompt[t]}</div>
      {added.map(g=>(
        <div key={g.id} className="wizadded"><span className="wizcheck">{ICON.check}</span>{g.title}</div>
      ))}
      <textarea rows="2" placeholder={added.length?'Add another (optional)':'Type your goal'} value={text}
        onChange={e=>setText(e.target.value)}/>
      <button className="btn btn-line btn-sm" style={{width:'100%',marginTop:6}} disabled={!text.trim()||busy} onClick={addOne}>
        + Add {added.length?'another':'this goal'}
      </button>
      <button className="btn btn-gold" style={{width:'100%',marginTop:8}} disabled={!canAdvance||busy} onClick={next}>
        {i>=steps.length-1?(busy?'Saving...':'Finish'):'Next'}
      </button>
      <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:8}} onClick={skip}>
        {i>0?'Stop here for now':'Not now'}
      </button>
      <div className="note" style={{textAlign:'center',marginTop:12}}>
        You can edit, add, or re-link any goal later.
      </div>
    </div>
  );
}

function GoalOverview({me, goals, reload, setGoalType}){
  // Show the current goals for every period, top-down (year -> semester -> month -> week),
  // with child goals nested under the parent they were linked to.
  const [linking,setLinking]=useState(null);
  const [busy,setBusy]=useState(false);
  const order=['year','semester','month','week'];
  const parentType={week:'month',month:'semester',semester:'year',year:null};

  const cur=useMemo(()=>{
    const by={};
    order.forEach(t=>{
      const key=periodKey(t);
      by[t]=goals.filter(g=>g.period_type===t&&g.period_key===key&&g.status!=='deleted'&&g.status!=='kept')
        .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    });
    return by;
  },[goals]);

  const curKey=useMemo(()=>{ const k={}; order.forEach(t=>k[t]=periodKey(t)); return k; },[]);
  // a child only shows in the overview if it belongs to the CURRENT period of its own type,
  // so last period's linked goals do not keep hanging under a bigger goal forever.
  const childrenOf=(pid)=>goals.filter(g=>g.parent_id===pid&&g.status!=='deleted'&&g.status!=='kept'
    &&g.period_key===curKey[g.period_type]);
  const parentCandidates=(type)=>{ const pt=parentType[type]; return pt?(cur[pt]||[]):[]; };
  async function setParent(g,pid){
    if(busy) return; setBusy(true);
    try{ await sb.from('wios_goals').update({parent_id:pid}).eq('id',g.id); setLinking(null); reload(); }
    catch(e){ alert(e.message||'Could not link.'); }
    setBusy(false);
  }
  const anyGoals=order.some(t=>(cur[t]||[]).length>0);

  // Decide whether to run the setup wizard, and from which period.
  // Broadest current period that has no goal set drives it: no year goal -> full
  // year->week on Jan 1; no semester goal -> semester->week each half; no month goal
  // -> month->week each month. Weekly-only gaps are not forced (add those inline).
  const [dismissedKeys,setDismissedKeys]=useState(()=>new Set());
  const wizard=useMemo(()=>{
    for(const t of ['year','semester','month']){
      const dkey=t+':'+curKey[t];
      if((cur[t]||[]).length===0 && !dismissedKeys.has(dkey)){
        const pt=parentType[t];
        const parent = pt && (cur[pt]||[]).length===1 ? cur[pt][0].id : null;
        return {startFrom:t, parentId:parent, dismissKey:dkey};
      }
    }
    return null;
  },[cur,curKey,dismissedKeys]);
  function dismissWizard(){
    // only used when the user taps "Not now" / "Stop here". Session-only: if they later
    // delete the goal that filled a period, the wizard offers that period again.
    if(wizard) setDismissedKeys(s=>{ const n=new Set(s); n.add(wizard.dismissKey); return n; });
  }
  const showWizard = wizard!==null;

  function GoalLine({g, depth}){
    const kids=childrenOf(g.id);
    const done=g.status==='completed';
    return (
      <div style={{marginLeft:depth*14}}>
        <div className="ovrow">
          <span className={'ovdot'+(done?' done':'')}>{done?ICON.check:''}</span>
          <span className={'grow'+(done?' ovdone':'')}>{g.title}</span>
          <button className="ovlink" onClick={()=>setLinking(linking===g.id?null:g.id)} aria-label="Link to a bigger goal">
            {ICON.goals}
          </button>
        </div>
        {linking===g.id&&(
          <div className="ovpick">
            <div className="note" style={{marginBottom:6}}>
              Link this {PWORD[g.period_type]} goal under a bigger goal:
            </div>
            {parentCandidates(g.period_type).length===0&&(
              <div className="note">No {parentType[g.period_type]} goals yet. Add one first.</div>
            )}
            {parentCandidates(g.period_type).map(p=>(
              <button key={p.id} className={'ovopt'+(g.parent_id===p.id?' on':'')} disabled={busy}
                onClick={()=>setParent(g, g.parent_id===p.id?null:p.id)}>
                {g.parent_id===p.id?'✓ ':''}{p.title}
              </button>
            ))}
            {g.parent_id&&(
              <button className="ovopt" disabled={busy} onClick={()=>setParent(g,null)}>Unlink</button>
            )}
          </div>
        )}
        {kids.map(k=><GoalLine key={k.id} g={k} depth={depth+1}/>)}
      </div>
    );
  }

  return (
    <div>
      <div className="sub" style={{marginBottom:14}}>
        Your direction, top down. Link each smaller goal to a bigger one so you can see how this week rolls up to the year.
      </div>
      {showWizard&&(
        <div style={{marginBottom:18}}>
          <GoalWizard me={me} reload={reload} startFrom={wizard.startFrom}
            initialParentId={wizard.parentId} onDismiss={dismissWizard}/>
        </div>
      )}
      {!showWizard&&!anyGoals&&(
        <div className="empty" style={{padding:'20px 14px'}}>
          No goals yet. Open a period below and add your first one.
        </div>
      )}
      {order.map(t=>{
        const list=cur[t]||[];
        // while the wizard is up, skip the empty period sections it is about to fill,
        // so we do not show "Nothing set yet" right next to the wizard asking for it
        if(showWizard && list.length===0) return null;
        // a goal is a root here if it has no parent, OR its parent is not in the
        // current visible set (e.g. it was linked to a past period). That keeps every
        // current goal on screen instead of vanishing under a stale link.
        const visibleIds=new Set(order.flatMap(p=>(cur[p]||[]).map(g=>g.id)));
        const roots = t==='year' ? list
          : list.filter(g=>!g.parent_id||!visibleIds.has(g.parent_id));
        return (
          <div key={t} className="ovsect">
            <button className="ovhead" onClick={()=>setGoalType(t)}>
              <span className="ovheadname">{PLABEL[t]}</span>
              <span className="ovheadkey">{periodLabel(t,periodKey(t))}</span>
              <span className="ovheadcta">Open ›</span>
            </button>
            {list.length===0
              ? <div className="note" style={{padding:'2px 2px 8px'}}>Nothing set for this {PWORD[t]} yet.</div>
              : roots.map(g=><GoalLine key={g.id} g={g} depth={0}/>)
            }
          </div>
        );
      })}
    </div>
  );
}

function GoalsTab({me, goals, gps, reload, goalType, setGoalType, tasks}){
  const [text,setText]=useState('');
  const [openHist,setOpenHist]=useState(null);
  const type=goalType;
  const key=periodKey(type), prevKey=prevPeriodKey(type);
  const mine=useMemo(()=>goals.filter(g=>g.period_type===type),[goals,type]);
  const cur=mine.filter(g=>g.period_key===key&&g.status!=='deleted'&&g.status!=='kept')
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const prevOpen=mine.filter(g=>g.period_key===prevKey&&g.status==='open');
  const prevAll=mine.filter(g=>g.period_key===prevKey&&g.status!=='deleted');
  const prevGp=gps.find(x=>x.period_type===type&&x.period_key===prevKey);
  const showReview=prevOpen.length>0&&!(prevGp&&prevGp.review_done);
  const doneN=cur.filter(g=>g.status==='completed').length;
  const donePct=cur.length?Math.round(doneN/cur.length*100):0;

  const historyKeys=useMemo(()=>{
    const ks=[...new Set(mine.filter(g=>g.period_key!==key&&g.status!=='deleted').map(g=>g.period_key))];
    return ks.sort().reverse();
  },[mine,key]);

  async function completePromptTask(){
    const ref=`${type}:${key}`;
    const t=tasks.find(x=>x.system_ref===ref&&x.status==='active');
    if(t) await sb.from('wios_tasks').update({status:'done',completed_at:nowIso(),urgent:false}).eq('id',t.id);
  }
  async function addGoal(){
    const title=text.trim(); if(!title) return;
    setText('');
    await sb.from('wios_goals').insert({owner_id:me.id,period_type:type,period_key:key,title,status:'open'});
    await completePromptTask();
    reload();
  }
  async function toggle(g,e){
    const row=e.currentTarget.closest('.crow');
    if(g.status==='open'){
      burst(row);
      await sb.from('wios_goals').update({status:'completed',completed_at:nowIso()}).eq('id',g.id);
    }else{
      await sb.from('wios_goals').update({status:'open',completed_at:null}).eq('id',g.id);
    }
    reload();
  }
  async function markReviewDone(){
    await sb.from('wios_goal_periods').upsert(
      {user_id:me.id,period_type:type,period_key:prevKey,prompted:true,review_done:true},
      {onConflict:'user_id,period_type,period_key'});
    reload();
  }
  const lastOne = () => prevOpen.length<=1;
  async function reviewComplete(g){
    await sb.from('wios_goals').update({status:'completed',completed_at:nowIso()}).eq('id',g.id);
    if(lastOne()) await markReviewDone(); else reload();
  }
  async function reviewKeep(g){
    await sb.from('wios_goals').update({status:'kept'}).eq('id',g.id);
    await sb.from('wios_goals').insert({owner_id:me.id,period_type:type,period_key:key,
      title:g.title,status:'open',kept_from:prevKey});
    await completePromptTask();
    if(lastOne()) await markReviewDone(); else reload();
  }
  async function reviewDelete(g){
    await sb.from('wios_goals').update({status:'deleted'}).eq('id',g.id);
    if(lastOne()) await markReviewDone(); else reload();
  }
  async function removeGoal(g){
    if(!confirm('Remove this goal?')) return;
    await sb.from('wios_goals').update({status:'deleted'}).eq('id',g.id);
    reload();
  }

  const icon=s=>s==='completed'?'✓':s==='kept'?'→':'○';
  const iconColor=s=>s==='completed'?'var(--green)':s==='kept'?'var(--gold)':'var(--muted2)';

  // finger-following swipe between goal periods (same feel as the tasks tab)
  const gSegs=['overview',...PERIOD_TYPES];
  const [gDir,setGDir]=useState(0);
  const gSwipe=useRef({x:0,y:0,on:false,dragging:false,w:0});
  const gSlideRef=useRef(null);
  function gSetTX(px, anim){
    const el=gSlideRef.current; if(!el) return;
    el.style.transition = anim ? 'transform .2s cubic-bezier(.22,.61,.36,1), opacity .2s' : 'none';
    el.style.transform = `translateX(${px}px)`;
    el.style.opacity = String(Math.max(0.4, 1 - Math.abs(px)/(gSwipe.current.w||360)));
  }
  function gChange(next){
    if(next===goalType) return;
    setGDir(gSegs.indexOf(next)>gSegs.indexOf(goalType)?1:-1);
    setGoalType(next);
  }
  function gTouchStart(e){ const t=e.touches[0]; gSwipe.current={x:t.clientX,y:t.clientY,on:true,dragging:false,w:gSlideRef.current?gSlideRef.current.offsetWidth:360}; }
  function gTouchMove(e){
    const s=gSwipe.current; if(!s.on) return;
    const t=e.touches[0]; const dx=t.clientX-s.x, dy=t.clientY-s.y;
    if(!s.dragging){
      if(Math.abs(dx)<8) return;
      if(Math.abs(dx)<Math.abs(dy)){ s.on=false; return; }
      s.dragging=true;
    }
    const idx=gSegs.indexOf(goalType);
    const atEnd=(dx<0&&idx===gSegs.length-1)||(dx>0&&idx===0);
    gSetTX(atEnd?dx*0.28:dx, false);
  }
  function gTouchEnd(e){
    const s=gSwipe.current; if(!s.on) return; s.on=false;
    if(!s.dragging) return;
    const dx=e.changedTouches[0].clientX-s.x;
    const idx=gSegs.indexOf(goalType);
    const threshold=Math.min(90, s.w*0.28);
    const goNext=dx<-threshold&&idx<gSegs.length-1, goPrev=dx>threshold&&idx>0;
    if(goNext||goPrev){
      gSetTX(dx<0?-s.w:s.w, true);
      setTimeout(()=>gChange(gSegs[goNext?idx+1:idx-1]), 150);
    } else { gSetTX(0, true); }
  }

  return (
    <div>
      <Seg items={[{k:'overview',l:'Overview'},...PERIOD_TYPES.map(t=>({k:t,l:PLABEL[t]}))]} value={goalType} onChange={gChange}/>

      <div className="swipearea" onTouchStart={gTouchStart} onTouchMove={gTouchMove} onTouchEnd={gTouchEnd}>
      <div key={goalType} ref={gSlideRef} className={'slidewrap '+(gDir>0?'fromR':gDir<0?'fromL':'')}>
      {goalType==='overview'&&(
        <GoalOverview me={me} goals={goals} reload={reload} setGoalType={setGoalType}/>
      )}

      {goalType!=='overview'&&<>
      {showReview&&(
        <div className="card" style={{borderColor:'var(--gold-line)'}}>
          <div className="tt" style={{color:'var(--gold)'}}>Close out {periodLabel(type,prevKey)}</div>
          <div className="sub" style={{marginTop:5,marginBottom:6}}>
            Keep moves a goal into this {PWORD[type]}. Then set the new ones below.
          </div>
          {prevOpen.map(g=>(
            <div key={g.id} style={{paddingTop:11,marginTop:5,borderTop:'1px solid var(--border)'}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:9,overflowWrap:'anywhere'}}>{g.title}</div>
              <div className="row" style={{gap:7}}>
                <button className="btn btn-gold btn-sm" style={{flex:1,minWidth:0}} onClick={()=>reviewComplete(g)}>
                  <span className="lbl2">✓ Completed</span>
                </button>
                <button className="btn btn-line btn-sm" style={{flex:1,minWidth:0}} onClick={()=>reviewKeep(g)}>
                  <span className="lbl2">→ Keep</span>
                </button>
                <button className="btn btn-ghost btn-sm" style={{flex:'none',width:44,padding:0}}
                  onClick={()=>reviewDelete(g)} aria-label="Drop this goal">{ICON.trash}</button>
              </div>
            </div>
          ))}
          <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:12}} onClick={markReviewDone}>
            Done reviewing
          </button>
        </div>
      )}

      <div className="sect">This {PWORD[type]}, {periodLabel(type,key)}</div>
      <div className="qadd" style={{marginBottom:12}}>
        <input placeholder={`Add a ${PWORD[type]} goal...`} value={text}
          onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addGoal()}/>
        <button className="btn btn-gold" onClick={addGoal} aria-label="Add goal">+</button>
      </div>
      {cur.length>0&&(
        <div style={{margin:'0 2px 12px'}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>{doneN} of {cur.length} completed</div>
          <div className="pct"><i style={{width:donePct+'%'}}/></div>
        </div>
      )}
      {cur.map(g=>(
        <div key={g.id} className="crow">
          <button className="ctap" onClick={e=>toggle(g,e)} aria-label="Toggle goal">
            <span className={'gcheck'+(g.status==='completed'?' on':'')}>✓</span>
          </button>
          <div className="grow">
            <div className={'tt'+(g.status==='completed'?' done':'')} style={{fontSize:14}}>{g.title}</div>
            {g.kept_from&&<div style={{fontSize:11,color:'var(--muted2)',marginTop:3}}>
              kept from {periodLabel(type,g.kept_from)}</div>}
          </div>
          <button className="xbtn" onClick={()=>removeGoal(g)} aria-label="Remove goal">×</button>
        </div>
      ))}

      {type!=='week'&&prevAll.length>0&&!showReview&&(()=>{
        const hit=prevAll.filter(g=>g.status==='completed');
        const miss=prevAll.filter(g=>g.status!=='completed');
        return (
          <div>
            <div className="sect">Last {PWORD[type]}, {periodLabel(type,prevKey)}</div>
            <div className="card">
              <div style={{fontSize:12,fontWeight:700,color:'var(--green)',marginBottom:2}}>
                Achieved {hit.length}
              </div>
              {hit.length===0&&<div className="mini" style={{color:'var(--muted2)'}}>None</div>}
              {hit.map(g=><div key={g.id} className="mini">{g.title}</div>)}
              {miss.length>0&&<>
                <div style={{fontSize:12,fontWeight:700,color:'var(--red)',margin:'14px 0 2px'}}>
                  Not achieved {miss.length}
                </div>
                {miss.map(g=>(
                  <div key={g.id} className="mini">
                    <span className="grow">{g.title}</span>
                    {g.status==='kept'&&<span className="chip back fx">Kept</span>}
                  </div>
                ))}
              </>}
            </div>
          </div>
        );
      })()}

      {historyKeys.length>0&&<div className="sect">History</div>}
      {historyKeys.map(k=>{
        const items=mine.filter(g=>g.period_key===k&&g.status!=='deleted');
        const done=items.filter(g=>g.status==='completed').length;
        const open=openHist===k;
        return (
          <div key={k} className="card tapme" onClick={()=>setOpenHist(open?null:k)}>
            <div className="row">
              <div className="grow">
                <div className="tt" style={{fontSize:14}}>{periodLabel(type,k)}</div>
                <div className="meta">{done} of {items.length} completed</div>
              </div>
              <span style={{color:'var(--muted2)',flex:'none'}}>{open?'▾':'▸'}</span>
            </div>
            {open&&(
              <div style={{marginTop:8}}>
                {items.map(g=>(
                  <div key={g.id} className="mini">
                    <span className="fx" style={{color:iconColor(g.status),fontWeight:700}}>{icon(g.status)}</span>
                    <span className="grow">{g.title}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
      </>}
      </div>
      </div>
    </div>
  );
}

/* ── daily ───────────────────────────────────────────────── */
function DailyTab({me, recs, reload}){
  const [edit,setEdit]=useState(null);
  const today=new Date(); const todayIso=isoDate(today);
  const due=recs.filter(r=>r.active&&isDueOn(r,today))
    .sort((a,b)=>(a.time_hhmm||'').localeCompare(b.time_hhmm||''));
  const left=due.filter(r=>r.last_done_date!==todayIso).length;
  const timeOpts=useMemo(()=>{ const o=[]; for(let h=0;h<24;h++){o.push(`${pad(h)}:00`);o.push(`${pad(h)}:30`);} return o; },[]);

  async function toggleDone(r,e){
    const row=e.currentTarget.closest('.crow');
    if(r.last_done_date===todayIso){
      await sb.from('wios_recurring_logs').delete().eq('rec_id',r.id).eq('done_date',todayIso);
      await sb.from('wios_recurrings').update({
        streak:Math.max(0,(r.streak||0)-1), last_done_date:prevDueDate(r,today)
      }).eq('id',r.id);
    }else{
      burst(row);
      const prev=prevDueDate(r,today);
      const s=(r.last_done_date&&r.last_done_date===prev)?(r.streak||0)+1:1;
      await sb.from('wios_recurring_logs').upsert({rec_id:r.id,done_date:todayIso},{onConflict:'rec_id,done_date'});
      await sb.from('wios_recurrings').update({
        streak:s, best_streak:Math.max(r.best_streak||0,s), last_done_date:todayIso
      }).eq('id',r.id);
    }
    reload();
  }

  return (
    <div>
      <div className="sect">Today {due.length>0&&<span className="n">{left} left</span>}</div>
      {due.length===0&&<div className="empty" style={{padding:'14px'}}>Nothing recurring is due today.</div>}
      {due.map(r=>{
        const done=r.last_done_date===todayIso;
        return (
          <div key={r.id} className="crow">
            <button className="ctap" onClick={e=>toggleDone(r,e)} aria-label="Toggle reminder">
              <span className={'gcheck'+(done?' on':'')}>✓</span>
            </button>
            <div className="grow">
              <div className={'tt'+(done?' done':'')} style={{fontSize:14}}>{r.title}</div>
              <div className="meta">{timeLabel(r.time_hhmm)}, {freqLabel(r)}</div>
            </div>
            {r.streak>0&&<span className="streak">🔥 {r.streak}</span>}
          </div>
        );
      })}

      <div className="sect">All reminders</div>
      {recs.length===0&&(
        <div className="empty" style={{padding:'14px'}}>
          Set up the things that must not slip, like the morning Instagram post.
        </div>
      )}
      {recs.map(r=>(
        <div key={r.id} className="card tapme" onClick={()=>setEdit(r)}>
          <div className="row">
            <div className="grow">
              <div className="tt" style={{fontSize:14,color:r.active?'var(--text)':'var(--muted2)'}}>{r.title}</div>
              <div className="meta">
                {!r.active&&<span className="chip off">Paused</span>}
                <span>{freqLabel(r)}, {timeLabel(r.time_hhmm)}</span>
                {r.best_streak>0&&<span>best 🔥 {r.best_streak}</span>}
              </div>
            </div>
            {r.streak>0&&r.active&&<span className="streak">🔥 {r.streak}</span>}
          </div>
        </div>
      ))}
      <button className="btn btn-line" style={{width:'100%',marginTop:6}} onClick={()=>setEdit('new')}>
        + New reminder
      </button>
      {edit&&<RecurringEditSheet edit={edit} me={me} timeOpts={timeOpts}
        onClose={()=>setEdit(null)} reload={reload}/>}
    </div>
  );
}

/* Lifted out of DailyTab so it is a stable component identity. When it was
   nested, every poll-driven re-render remounted it and reset the form, which
   made the popup flicker open/closed. */
function RecurringEditSheet({edit, me, timeOpts, onClose, reload}){
  const isNew=edit==='new';
  const [f,setF]=useState(isNew
    ?{title:'',freq:'daily',days:[1,2,3,4,5],day_of_month:1,time_hhmm:'09:00',active:true}
    :{...edit, days:edit.days||[], day_of_month:edit.day_of_month||1});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const bad = !(f.title||'').trim() || (f.freq==='weekly' && !f.days.length);

  async function save(){
    if(bad||saving) return; setSaving(true);
    const row={owner_id:me.id, title:f.title.trim(), freq:f.freq,
      days: f.freq==='weekly'?f.days.slice().sort():null,
      day_of_month: f.freq==='monthly'?Math.min(31,Math.max(1,+f.day_of_month||1)):null,
      time_hhmm:f.time_hhmm, active:f.active};
    try{
      if(isNew) await sb.from('wios_recurrings').insert(row);
      else await sb.from('wios_recurrings').update(row).eq('id',edit.id);
      onClose(); reload();
    }catch(e){ alert(e.message||'Could not save.'); setSaving(false); }
  }
  async function remove(){
    if(!confirm('Delete this reminder? The streak goes with it.')) return;
    await sb.from('wios_recurrings').delete().eq('id',edit.id);
    onClose(); reload();
  }
  return (
    <Sheet onClose={onClose}>
      <h3>{isNew?'New reminder':'Edit reminder'}</h3>
      <div className="sub">A notification arrives at this time on every due day, until you check it off.</div>
      <input placeholder="e.g. Post on Instagram" value={f.title} onChange={e=>set('title',e.target.value)}/>
      <div className="lbl">Repeats</div>
      <div className="seg" style={{marginBottom:0}}>
        {['daily','weekly','monthly'].map(fr=>(
          <button key={fr} className={f.freq===fr?'on':''} onClick={()=>set('freq',fr)}>
            {fr[0].toUpperCase()+fr.slice(1)}
          </button>
        ))}
      </div>
      {f.freq==='weekly'&&<>
        <div className="daychips">
          {DOW.map((d,i)=>(
            <button key={d} className={f.days.includes(i)?'on':''}
              onClick={()=>set('days', f.days.includes(i)?f.days.filter(x=>x!==i):[...f.days,i])}>{d[0]}</button>
          ))}
        </div>
        {!f.days.length&&<div className="err" style={{marginTop:8}}>Pick at least one day.</div>}
      </>}
      {f.freq==='monthly'&&<>
        <div className="row" style={{marginTop:10}}>
          <span className="note" style={{flex:1}}>Day of the month</span>
          <input type="number" min="1" max="31" value={f.day_of_month} style={{width:88,flex:'none'}}
            onChange={e=>set('day_of_month',e.target.value)}/>
        </div>
        <div className="note" style={{marginTop:6}}>
          A day past the end of a short month falls on that month's last day.
        </div>
      </>}
      <div className="lbl">Remind at</div>
      <select value={f.time_hhmm} onChange={e=>set('time_hhmm',e.target.value)}>
        {timeOpts.map(t=><option key={t} value={t}>{timeLabel(t)}</option>)}
      </select>
      {!isNew&&(
        <button className="opt" style={{marginTop:14}} onClick={()=>set('active',!f.active)}>
          <Ic name={f.active?'pause':'play'} className="muted"/>
          <span className="grow">{f.active?'Pause this reminder':'Resume this reminder'}</span>
        </button>
      )}
      <div style={{height:10}}/>
      <button className="btn btn-gold" style={{width:'100%'}} disabled={bad||saving} onClick={save}>
        {saving?'Saving...':'Save'}
      </button>
      {!isNew&&<button className="btn btn-red" style={{width:'100%',marginTop:8}} onClick={remove}>Delete</button>}
    </Sheet>
  );
}

/* ── team (admin) ────────────────────────────────────────── */
function TeamTab({me, people, coops, members}){
  const [data,setData]=useState(null);
  const [open,setOpen]=useState(null);
  const [view,setView]=useState('compare');
  const [gMetric,setGMetric]=useState('doneWeek');
  const [coachView,setCoachView]=useState(null);   // {person} whose coaching we are reading
  const [coachThread,setCoachThread]=useState(null);
  const [coachLoading,setCoachLoading]=useState(false);
  const [coachErr,setCoachErr]=useState('');
  async function openCoaching(p){
    setCoachView(p); setCoachThread(null); setCoachErr(''); setCoachLoading(true);
    try{
      const h=await authHeader();
      if(!h) throw new Error('Sign in again.');
      const res=await fetch('/.netlify/functions/coach',{
        method:'POST', headers:{'Content-Type':'application/json',...h},
        body: JSON.stringify({ action:'read_user', user_id:p.id }),
      });
      const d=await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(d.error||'Could not load coaching.');
      setCoachThread(Array.isArray(d.thread)?d.thread:[]);
    }catch(e){ setCoachErr(e.message); setCoachThread([]); }
    setCoachLoading(false);
  }
  useEffect(()=>{ (async()=>{
    const [t,g,r,rp,rm,ri]=await Promise.all([
      sb.from('wios_tasks').select('*'),
      sb.from('wios_goals').select('*'),
      sb.from('wios_recurrings').select('*'),
      sb.from('wios_role_projects').select('*'),
      sb.from('wios_role_members').select('*'),
      sb.from('wios_role_items').select('*'),
    ]);
    setData({tasks:t.data||[], goals:g.data||[], recs:r.data||[],
      roleProjects:rp.data||[], roleMembers:rm.data||[], roleItems:ri.data||[]});
  })(); },[]);
  if(!data) return <div className="empty">Loading the team...</div>;

  const wk=periodKey('week'), mo=periodKey('month');
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };

  const now=Date.now();
  const weekAgo=now-7*86400000, monthAgo=now-30*86400000;

  function stats(p){
    const t=data.tasks.filter(x=>x.owner_id===p.id);
    const done=t.filter(x=>x.status==='done'&&x.completed_at);
    const doneWeek=done.filter(x=>new Date(x.completed_at).getTime()>=weekAgo).length;
    const doneMonth=done.filter(x=>new Date(x.completed_at).getTime()>=monthAgo).length;

    // 4-week completion trend (oldest -> newest), for a sparkline
    const trend=[3,2,1,0].map(w=>{
      const lo=now-(w+1)*7*86400000, hi=now-w*7*86400000;
      return done.filter(x=>{const ts=new Date(x.completed_at).getTime();return ts>=lo&&ts<hi;}).length;
    });

    const spans=done
      .filter(x=>new Date(x.completed_at).getTime()>=monthAgo)
      .map(x=>(new Date(x.completed_at)-new Date(x.created_at))/86400000)
      .filter(d=>d>=0);
    const avgDays=spans.length?(spans.reduce((a,b)=>a+b,0)/spans.length):null;

    // on-time rate: of tasks that had a due date and are done, how many finished before due
    const withDue=done.filter(x=>x.due_at);
    const onTime=withDue.filter(x=>new Date(x.completed_at)<=new Date(x.due_at)).length;
    const onTimePct=withDue.length?Math.round(onTime/withDue.length*100):null;

    const coopDoneMonth=coops.filter(c=>c.status==='closed'&&c.closed_at&&
      new Date(c.closed_at).getTime()>=monthAgo&&
      (c.holder_id===p.id||c.creator_id===p.id||members.some(m=>m.coop_id===c.id&&m.user_id===p.id&&m.status==='accepted'))).length;

    // role projects the person is on, and how much of their part is done
    const myMems=data.roleMembers.filter(m=>m.user_id===p.id);
    const roleActive=myMems.filter(m=>{const pr=data.roleProjects.find(x=>x.id===m.project_id);return pr&&pr.status!=='done';}).length;
    const roleItemsMine=data.roleItems.filter(it=>it.assignee_id===p.id&&it.approved);
    const roleItemsDone=roleItemsMine.filter(it=>it.done).length;

    const gW=data.goals.filter(x=>x.owner_id===p.id&&x.period_type==='week'&&x.period_key===wk&&x.status!=='deleted'&&x.status!=='kept');
    const gM=data.goals.filter(x=>x.owner_id===p.id&&x.period_type==='month'&&x.period_key===mo&&x.status!=='deleted'&&x.status!=='kept');
    const rec=data.recs.filter(x=>x.owner_id===p.id&&x.active);

    const active=t.filter(x=>x.status==='active').length;
    const waiting=t.filter(x=>x.status==='waiting').length;
    const stale=t.filter(x=>x.status==='active'&&daysAgo(x.created_at)>=7).length;

    const throughput=Math.min(doneWeek*12, 60);
    const goalPart=gW.length?Math.round(gW.filter(x=>x.status==='completed').length/gW.length*20):0;
    const recPart=Math.min(rec.reduce((a,x)=>Math.max(a,x.streak||0),0),20);
    const stalePenalty=Math.min(stale*8,30);
    const score=Math.max(0,Math.min(100, throughput+goalPart+recPart-stalePenalty));
    const level=score>=66?'Active':score>=33?'Steady':'Quiet';

    return {
      active, waiting, stale,
      turn:coops.filter(c=>c.status==='active'&&c.holder_id===p.id).length,
      doneWeek, doneMonth, coopDoneMonth, avgDays, onTimePct, trend,
      roleActive, roleItemsMine:roleItemsMine.length, roleItemsDone,
      wPct:gW.length?Math.round(gW.filter(x=>x.status==='completed').length/gW.length*100):null,
      mPct:gM.length?Math.round(gM.filter(x=>x.status==='completed').length/gM.length*100):null,
      topStreak:rec.reduce((a,x)=>Math.max(a,x.streak||0),0),
      score, level,
      tasks:t, goalsW:gW,
    };
  }

  const rows=people.map(p=>({p, s:stats(p)}));

  const maxOf=(sel)=>Math.max(1,...rows.map(r=>sel(r.s)||0));
  const compareMetrics=[
    {k:'doneWeek', label:'Done this week', sel:s=>s.doneWeek},
    {k:'doneMonth', label:'Done this month', sel:s=>s.doneMonth},
    {k:'active', label:'Active now', sel:s=>s.active},
    {k:'waiting', label:'Waiting', sel:s=>s.waiting},
    {k:'stale', label:'Sitting 7d+', sel:s=>s.stale, bad:true},
    {k:'coopDoneMonth', label:'Coops closed', sel:s=>s.coopDoneMonth},
    {k:'roleActive', label:'Role projects', sel:s=>s.roleActive},
    {k:'topStreak', label:'Best streak', sel:s=>s.topStreak},
  ];
  // metric the graph is showing
  const graphMetrics=[
    {k:'doneWeek', label:'Done this week', sel:s=>s.doneWeek},
    {k:'doneMonth', label:'Done this month', sel:s=>s.doneMonth},
    {k:'score', label:'Activity score', sel:s=>s.score},
    {k:'stale', label:'Sitting 7d+', sel:s=>s.stale},
  ];

  return (
    <div>
      <h3 style={{margin:'2px 2px 2px',fontSize:19}}>Team Performance</h3>
      <div className="note" style={{margin:'0 2px 12px'}}>Admin view, only you can see this. Scores are a signal from recorded work, not a verdict.</div>
      <Seg items={[{k:'compare',l:'Compare'},{k:'detail',l:'One by one'}]} value={view} onChange={setView}/>

      {view==='compare'&&(
        <div>
          {/* Activity leaderboard */}
          <div className="sect">Activity now</div>
          {rows.slice().sort((a,b)=>b.s.score-a.s.score).map(({p,s})=>{
            const lvlColor=s.level==='Active'?'var(--green)':s.level==='Steady'?'var(--gold)':'var(--muted)';
            return (
              <div key={p.id} className="cmprow" onClick={()=>{setView('detail');setOpen(p.id);}}>
                <div className="cmpname">
                  <span className="chip role">{p.role}</span>
                  <span className="grow">{first(p.name)}</span>
                  {s.stale>0&&<span className="chip urgent">{s.stale}</span>}
                  {s.topStreak>0&&<span className="streak">🔥{s.topStreak}</span>}
                </div>
                <div className="cmpbar"><i style={{width:s.score+'%',background:lvlColor}}/></div>
