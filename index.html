        const acts=s.tasks.filter(x=>x.status==='active');
        const waits=s.tasks.filter(x=>x.status==='waiting');
        const cps=coops.filter(c=>c.status==='active'&&(c.holder_id===p.id||c.creator_id===p.id||
          members.some(m=>m.coop_id===c.id&&m.user_id===p.id&&m.status!=='declined')));
        const lvlColor=s.level==='Active'?'var(--green)':s.level==='Steady'?'var(--gold)':'var(--muted)';
        return (
          <div key={p.id} className="card tapme" onClick={()=>setOpen(isOpen?null:p.id)}>
            <div className="row">
              <div className="grow">
                <div className="tt" style={{fontSize:15}}>{p.name}</div>
                <div className="meta">
                  <span className="chip role">{p.role}</span>
                  <span className="lvl" style={{color:lvlColor,boxShadow:`inset 0 0 0 1px ${lvlColor}`}}>{s.level}</span>

/* ── members (admin) ─────────────────────────────────────── */
function MembersSheet({me, people, onClose, reload}){
  const [mode,setMode]=useState('list');   // list | add | edit
  const [target,setTarget]=useState(null);
  const [f,setF]=useState({email:'',name:'',role:'',isAdmin:false});
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(''); const [ok,setOk]=useState('');
  const [newPw,setNewPw]=useState('');

  function startAdd(){ setF({email:'',name:'',role:'',isAdmin:false}); setErr(''); setOk(''); setMode('add'); }
  function startEdit(p){ setTarget(p); setF({email:'',name:p.name,role:p.role,isAdmin:p.is_admin}); setNewPw(''); setErr(''); setOk(''); setMode('edit'); }

  async function setPassword(){
    if(busy) return;
    if(newPw.length<8){ setErr('Password must be at least 8 characters.'); return; }
    setBusy(true); setErr(''); setOk('');
    try{
      await callMembers({action:'setPassword', userId:target.id, password:newPw});
      setOk(`${target.name}'s password is set. Share it with them: ${newPw}`);
      setNewPw('');
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }

  async function add(){
    if(busy) return; setBusy(true); setErr(''); setOk('');
    try{
      const emailFull=toEmail(f.email);
      const r=await callMembers({action:'add', email:emailFull, name:f.name, role:f.role, isAdmin:f.isAdmin});
      const idPart=emailFull.split('@')[0];
      if(r.linked) setOk(`${f.name} is in. Their account already existed, so they sign in with their usual password.`);
      else if(r.emailSent) setOk(`${f.name} is in. A temporary password was emailed to ${emailFull}. Their ID is ${idPart}.`);
      else setOk(`${f.name} is in. ID ${idPart}, temporary password ${r.tempPass}. The email did not go out, so pass these along.`);
      setF({email:'',name:'',role:'',isAdmin:false});
      await reload();
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  async function save(){
    if(busy) return; setBusy(true); setErr(''); setOk('');
    try{
      await callMembers({action:'update', userId:target.id, name:f.name, role:f.role, isAdmin:f.isAdmin});
      setOk('Saved.'); await reload(); setMode('list');
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  async function setActive(p, active){
    if(busy) return;
    if(!active && !confirm(`Turn off WIOS for ${p.name}? Their history stays, and their Franchise Ops account is untouched.`)) return;
    setBusy(true); setErr(''); setOk('');
    try{
      await callMembers({action:'setActive', userId:p.id, active});
      await reload();
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }

  const canSaveAdd = f.email.trim() && f.name.trim() && f.role.trim();

  return (
    <Sheet onClose={onClose}>
      {mode==='list'&&<>
        <h3>Members</h3>
        <div className="sub">Everyone with access to WIOS. Adding someone who already uses Franchise Ops just links their existing account.</div>
        {people.map(p=>(
          <div key={p.id} className="crow" style={{padding:'10px 10px 10px 12px'}}>
            <div className="grow">
              <div className="tt" style={{fontSize:14,color:p.active?'var(--text)':'var(--muted2)'}}>{p.name}</div>
              <div className="meta">
                <span className="chip role">{p.role}</span>
                {p.is_admin&&<span className="chip back">Admin</span>}
                {!p.active&&<span className="chip off">Off</span>}
              </div>
            </div>
            <button className="btn btn-ghost btn-sm" style={{flex:'none',padding:'0 12px'}}
              onClick={()=>startEdit(p)}>Edit</button>
          </div>
        ))}
        {err&&<div className="err" style={{marginTop:8}}>{err}</div>}
        <button className="btn btn-gold" style={{width:'100%',marginTop:12}} onClick={startAdd}>
          + Add a member
        </button>
      </>}

      {mode==='add'&&<>
        <h3>Add a member</h3>
        <div className="sub">Enter the ID, the part before the @. If that account already exists it is linked with no new password. If not, a new account is created and a temporary password is emailed.</div>
        <div className="lbl">ID</div>
        <input type="text" autoCapitalize="none" autoCorrect="off" spellCheck="false"
          placeholder="e.g. jane.park" value={f.email}
          onChange={e=>setF({...f,email:e.target.value})}/>
        <div className="note" style={{marginTop:6}}>Sign-in becomes {f.email.trim()?toEmail(f.email):'id'}.</div>
        <div className="lbl">Full name</div>
        <input placeholder="e.g. Jane Park" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
        <div className="lbl">Role</div>
        <input placeholder="e.g. CFO" maxLength="6" value={f.role}
          onChange={e=>setF({...f,role:e.target.value.toUpperCase()})}/>
        <div className="note" style={{marginTop:6}}>A short label. It shows up next to their name everywhere.</div>
        <button className="opt" style={{marginTop:14}} onClick={()=>setF({...f,isAdmin:!f.isAdmin})}>
          <span className="g" style={{color:f.isAdmin?'var(--gold)':'var(--muted2)'}}>{f.isAdmin?'◉':'○'}</span>
          <span className="grow">Admin: sees the Team tab and manages members</span>
        </button>
        {err&&<div className="err" style={{marginBottom:8}}>{err}</div>}
        {ok&&<div className="note" style={{color:'var(--green)',marginBottom:8}}>{ok}</div>}
        <button className="btn btn-gold" style={{width:'100%'}} disabled={!canSaveAdd||busy} onClick={add}>
          {busy?'Adding...':'Add member'}
        </button>
        <button className="btn btn-ghost" style={{width:'100%',marginTop:8}} onClick={()=>setMode('list')}>Back</button>
      </>}

      {mode==='edit'&&target&&<>
        <h3>{target.name}</h3>
        <div className="sub">Turning someone off keeps every task, goal and coop they were part of. It does not touch their Franchise Ops account.</div>
        <div className="lbl">Full name</div>
        <input value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
        <div className="lbl">Role</div>
        <input maxLength="6" value={f.role} onChange={e=>setF({...f,role:e.target.value.toUpperCase()})}/>
        {target.id!==me.id&&(
          <button className="opt" style={{marginTop:14}} onClick={()=>setF({...f,isAdmin:!f.isAdmin})}>
            <span className="g" style={{color:f.isAdmin?'var(--gold)':'var(--muted2)'}}>{f.isAdmin?'◉':'○'}</span>
            <span className="grow">Admin</span>
          </button>
        )}
        {err&&<div className="err" style={{marginBottom:8}}>{err}</div>}
        {ok&&<div className="note" style={{color:'var(--green)',marginBottom:8}}>{ok}</div>}
        <button className="btn btn-gold" style={{width:'100%'}}
          disabled={busy||!f.name.trim()||!f.role.trim()} onClick={save}>
          {busy?'Saving...':'Save'}
        </button>

        <div className="lbl" style={{marginTop:18}}>Set their password</div>
        <div className="note" style={{marginBottom:8}}>
          Give {first(target.name)} a new password. Tell them what it is, and they can change it later.
        </div>
        <div className="row" style={{gap:8}}>
          <input type="text" placeholder="New password" autoCapitalize="none" autoCorrect="off"
            spellCheck="false" value={newPw} onChange={e=>setNewPw(e.target.value)}/>
          <button className="btn btn-line btn-sm" style={{flex:'none',padding:'0 14px'}}
            disabled={busy||newPw.length<8} onClick={setPassword}>Set</button>
        </div>

        {target.id!==me.id&&(
          target.active
            ? <button className="btn btn-red" style={{width:'100%',marginTop:14}} disabled={busy}
                onClick={()=>setActive(target,false)}>Turn off WIOS access</button>
            : <button className="btn btn-line" style={{width:'100%',marginTop:14}} disabled={busy}
                onClick={()=>setActive(target,true)}>Turn access back on</button>
        )}
        <button className="btn btn-ghost" style={{width:'100%',marginTop:8}} onClick={()=>setMode('list')}>Back</button>
      </>}
    </Sheet>
  );
}

/* ── settings ────────────────────────────────────────────── */
function SettingsSheet({me, onClose, openMembers, goTeam, openGuide, openTour}){
  const [msg,setMsg]=useState(''); const [err,setErr]=useState('');
  const [subOn,setSubOn]=useState(false);
  const [pwMode,setPwMode]=useState(false);
  const [pw1,setPw1]=useState(''); const [pw2,setPw2]=useState('');
  const [busy,setBusy]=useState(false);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  const iosBlocked=isIOS&&!standalone;
  const canPush='Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window;

  useEffect(()=>{ let dead=false; (async()=>{
    if(!canPush) return;
    try{
      const reg=await Promise.race([navigator.serviceWorker.ready,
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),4000))]);
      const s=await reg.pushManager.getSubscription();
      if(!dead) setSubOn(!!s);
    }catch(e){}
  })(); return ()=>{dead=true;}; },[canPush]);

  async function enable(){
    setMsg(''); setErr(''); setBusy(true);
    try{
      const kr=await fetch('/.netlify/functions/notify');
      const {publicKey}=await kr.json();
      if(!publicKey) throw new Error('Push keys are not set on the server yet.');
      const perm=await Notification.requestPermission();
      if(perm!=='granted') throw new Error('Notifications are blocked for WIOS in your phone settings.');
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToU8(publicKey)});
      const j=sub.toJSON();
      const {error}=await sb.from('wios_push_subs').upsert(
        {user_id:me.id, endpoint:j.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth},
        {onConflict:'endpoint'});
      if(error) throw error;
      setSubOn(true); setMsg('Notifications are on for this device.');
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  async function disable(){
    setMsg(''); setErr(''); setBusy(true);
    try{
      const reg=await navigator.serviceWorker.ready;
      const s=await reg.pushManager.getSubscription();
      if(s){ await sb.from('wios_push_subs').delete().eq('endpoint',s.endpoint); await s.unsubscribe(); }
      setSubOn(false); setMsg('Notifications are off for this device.');
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  async function changePw(){
    setMsg(''); setErr('');
    if(pw1.length<8){ setErr('Use at least 8 characters.'); return; }
    if(pw1!==pw2){ setErr('The two passwords do not match.'); return; }
    setBusy(true);
    const {error}=await sb.auth.updateUser({password:pw1});
    if(error) setErr(error.message);
    else { setMsg('Password changed.'); setPw1(''); setPw2(''); setPwMode(false); }
    setBusy(false);
  }

  return (
    <Sheet onClose={onClose}>
      <h3>{me.name}</h3>
      <div className="sub">{me.role}{me.is_admin?', admin':''}</div>

      <div className="lbl">Notifications</div>
      {iosBlocked?(
        <div className="note">
          On iPhone, install WIOS first: tap Share in Safari, then Add to Home Screen. Open it from the
          Home Screen and come back here to switch notifications on.
        </div>
      ):!canPush?(
        <div className="note">This browser cannot do notifications.</div>
      ):subOn?(
        <button className="btn btn-ghost" style={{width:'100%'}} disabled={busy} onClick={disable}>
          Turn off on this device
        </button>
      ):(
        <button className="btn btn-gold" style={{width:'100%'}} disabled={busy} onClick={enable}>
          Turn on for this device
        </button>
      )}

      {me.is_admin&&<>
        <div className="lbl">Team</div>
        <button className="opt" onClick={()=>{ onClose(); goTeam&&goTeam(); }}>
          <Ic name="team" className="gold"/><span className="grow">Team Performance</span><span>›</span>
        </button>
        <button className="opt" onClick={openMembers}>
          <Ic name="members" className="gold"/><span className="grow">Members</span><span>›</span>
        </button>
      </>}

      <div className="lbl">Account</div>
      <button className="opt" onClick={()=>{ onClose(); openTour&&openTour(); }}>
        <Ic name="ask" className="gold"/><span className="grow">Take the tour</span><span>›</span>
      </button>
      <button className="opt" onClick={()=>{ onClose(); openGuide&&openGuide(); }}>
        <Ic name="coach" className="gold"/><span className="grow">How WIOS works</span><span>›</span>
      </button>
      {!pwMode?(
        <button className="opt" onClick={()=>{setPwMode(true);setErr('');setMsg('');}}>
          <Ic name="key" className="muted"/><span className="grow">Change password</span><span>›</span>
        </button>
      ):(
        <div>
          <input type="password" placeholder="New password" autoComplete="new-password"
            value={pw1} onChange={e=>setPw1(e.target.value)}/>
          <div style={{height:8}}/>
          <input type="password" placeholder="New password again" autoComplete="new-password"
            value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==='Enter'&&changePw()}/>
          <div style={{height:10}}/>
          <div className="row" style={{gap:8}}>
            <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>{setPwMode(false);setPw1('');setPw2('');}}>
              Cancel
            </button>
            <button className="btn btn-gold btn-sm" style={{flex:1}} disabled={busy} onClick={changePw}>
              {busy?'Saving...':'Save'}
            </button>
          </div>
        </div>
      )}

      {err&&<div className="err" style={{marginTop:10}}>{err}</div>}
      {msg&&<div className="note" style={{color:'var(--green)',marginTop:10}}>{msg}</div>}

      <button className="btn btn-red" style={{width:'100%',marginTop:16}}
        onClick={async()=>{ await sb.auth.signOut(); location.reload(); }}>
        Sign out
      </button>
    </Sheet>
  );
}

/* First-run guide: explains the four ways to give work, since Task, Coop, Role, and Request
   are easy to confuse at first. */
function GuideSheet({onClose, tourNext}){
  const slides=[
    {kind:'welcome', img:GUIDE_IMG.welcome, title:'Welcome to WIOS',
      desc:'Work In One Space. A quick tour of the ways your team moves work together.'},
    {img:GUIDE_IMG.task, name:'Task',
      desc:'A to-do just for you. Your own work, on your own list.'},
    {img:GUIDE_IMG.coop, name:'Coop',
      desc:'A relay. One person holds the task, does their part, then passes it to whoever is next. Only one holds it at a time.'},
    {img:GUIDE_IMG.role, name:'Role task',
      desc:'One shared project where everyone works at the same time, each owning their own part.'},
    {img:GUIDE_IMG.request, name:'Request',
      desc:'Ask one thing of one or more people. It lands on their list as something to do for you.'},
    {img:GUIDE_IMG.coach, name:'Your coach',
      desc:'Every Monday your coaching bot reviews your week and gives you honest, direct feedback to help you grow. Talk to it anytime.'},
  ];
  const [i,setI]=useState(0);
  const last=i===slides.length-1;
  const s=slides[i];
  const startX=useRef(null);
  function onDown(e){ startX.current=(e.touches?e.touches[0].clientX:e.clientX); }
  function onUp(e){
    if(startX.current==null) return;
    const x=(e.changedTouches?e.changedTouches[0].clientX:e.clientX);
    const dx=x-startX.current; startX.current=null;
    if(dx<-45&&i<slides.length-1) setI(i+1);
    else if(dx>45&&i>0) setI(i-1);
  }
  return (
    <Sheet onClose={onClose}>
      <div className="guideslide" onTouchStart={onDown} onTouchEnd={onUp} onMouseDown={onDown} onMouseUp={onUp}>
        <div className={'guidehero'+(s.kind==='welcome'?' welcome':'')}>
          <img src={s.img} alt="" draggable="false"/>
        </div>
        <div className="guideslidetitle">{s.kind==='welcome'?s.title:s.name}</div>
        <div className="guideslidedesc">{s.desc}</div>
      </div>
      <div className="guidedots">
        {slides.map((_,n)=>(
          <span key={n} className={'guidedot'+(n===i?' on':'')} onClick={()=>setI(n)}/>
        ))}
      </div>
      <div className="row" style={{gap:8,marginTop:8}}>
        {i>0&&<button className="btn btn-ghost btn-sm" style={{flex:'none',padding:'0 16px'}} onClick={()=>setI(i-1)}>Back</button>}
        <button className="btn btn-gold" style={{flex:1}} onClick={()=>last?onClose():setI(i+1)}>{last?(tourNext?'Start the tour':'Start'):'Next'}</button>
      </div>
    </Sheet>
  );
}

/* Renders a bot answer written in a light "## Header" + "- bullet" format into a clean,
   scannable card with coloured section headers and bullet markers, so it is easy to grasp
   at a glance instead of a wall of text. Plain text still renders fine. */
const SECTION_ICON={
  'where you stand':{ic:ICON.goals,c:'#3A6EA5'},
  'what went well':{ic:ICON.tasks,c:'#2E9E68'},
  'what is missing':{ic:ICON.request,c:'#B0863E'},
  'growing as a leader':{ic:ICON.coach,c:'#6E62A0'},
  'franchise readiness':{ic:ICON.roles,c:'#6E62A0'},
  'questions for you':{ic:ICON.coach,c:'#3A6EA5'},
  'focus this week':{ic:ICON.brief,c:'#3A6EA5'},
  'watch this week':{ic:ICON.request,c:'#B0863E'},
};
function RichText({text}){
  const lines=String(text||'').split('\n');
  const blocks=[]; let cur=null;
  const flush=()=>{ if(cur){ blocks.push(cur); cur=null; } };
  const isTableRow=(l)=>/^\s*\|.*\|\s*$/.test(l);
  const isDivider=(l)=>/^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(l)&&/-/.test(l);
  const cells=(l)=>l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
  for(let idx=0; idx<lines.length; idx++){
    let raw=lines[idx];
    const line=raw.replace(/\s+$/,'');
    if(!line.trim()){ flush(); continue; }
    // progress bar:  [[bar label=... value=NN max=NN color=team]]  (max optional -> 100)
    let bar=line.match(/^\s*\[\[\s*bar\s+(.*?)\]\]\s*$/i);
    if(bar){ flush(); const a=parseTag(bar[1]); blocks.push({type:'bar',label:a.label||'',value:+a.value||0,max:+a.max||100,color:a.color}); continue; }
    // trend sparkline: [[trend label=... values=3,5,4,8]]
    let tr=line.match(/^\s*\[\[\s*trend\s+(.*?)\]\]\s*$/i);
    if(tr){ flush(); const a=parseTag(tr[1]); const vals=(a.values||'').split(',').map(v=>parseFloat(v)).filter(v=>!isNaN(v)); blocks.push({type:'trend',label:a.label||'',values:vals}); continue; }
    // markdown table
    if(isTableRow(line)&&idx+1<lines.length&&isDivider(lines[idx+1])){
      flush();
      const head=cells(line); idx++; // skip divider
      const rows=[];
      while(idx+1<lines.length&&isTableRow(lines[idx+1])&&!isDivider(lines[idx+1])){ idx++; rows.push(cells(lines[idx])); }
      blocks.push({type:'table',head,rows}); continue;
    }
    const h=line.match(/^#{1,3}\s+(.*)$/);
    if(h){ flush(); const key=h[1].trim().toLowerCase(); cur={type:'sect',title:h[1].trim(),meta:SECTION_ICON[key],items:[]}; continue; }
    const b=line.match(/^\s*[-*]\s+(.*)$/);
    if(b){ if(!cur||cur.type!=='sect'){ if(cur&&cur.type==='bullets'){} else { flush(); cur={type:'bullets',items:[]}; } } cur.items.push(b[1]); continue; }
    if(!cur||cur.type==='sect'){ if(cur&&cur.type==='sect'){ cur.items.push(line); continue; } }
    if(!cur||cur.type!=='para'){ flush(); cur={type:'para',text:line}; }
    else cur.text+=' '+line;
  }
  flush();
  const renderInline=(s)=>{
    const parts=[]; let str=s;
    const lead=str.match(/^([A-Z][A-Za-z ]{1,24}:)\s*(.*)$/);
    if(lead){ parts.push(<b key="l">{lead[1]} </b>); str=lead[2]; }
    const segs=str.split(/(\*\*[^*]+\*\*)/g).filter(Boolean);
    segs.forEach((seg,i)=>{ const m=seg.match(/^\*\*([^*]+)\*\*$/); parts.push(m?<b key={i}>{m[1]}</b>:<span key={i}>{seg}</span>); });
    return parts;
  };
  const BARCOLOR={team:'#6E62A0',good:'#2E9E68',warn:'#B0863E',me:'#3A6EA5'};
  return (
    <div className="rich">
      {blocks.map((bl,i)=>{
        if(bl.type==='bar'){
          const pct=Math.max(0,Math.min(100,Math.round((bl.value/(bl.max||100))*100)));
          const c=BARCOLOR[bl.color]||'#3A6EA5';
          return (
            <div key={i} className="richbar">
              <div className="richbarrow"><span className="richbarlabel">{renderInline(bl.label)}</span><span className="richbarval" style={{color:c}}>{pct}%</span></div>
              <div className="richbartrack"><span className="richbarfill" style={{width:pct+'%',background:c}}/></div>
            </div>
          );
        }
        if(bl.type==='trend'){
          const vals=bl.values; if(!vals.length) return null;
          const max=Math.max(...vals,1),min=Math.min(...vals,0),rng=(max-min)||1;
          const W=220,H=46,pad=4;
          const pts=vals.map((v,k)=>{ const x=pad+(k*(W-2*pad))/(vals.length-1||1); const y=H-pad-((v-min)/rng)*(H-2*pad); return [x,y]; });
          const d=pts.map((p,k)=>(k?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
          const last=pts[pts.length-1];
          return (
            <div key={i} className="richtrend">
              {bl.label&&<div className="richtrendlabel">{renderInline(bl.label)}</div>}
              <svg viewBox={`0 0 ${W} ${H}`} className="richtrendsvg" preserveAspectRatio="none">
                <path d={d} fill="none" stroke="#3A6EA5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx={last[0]} cy={last[1]} r="3" fill="#3A6EA5"/>
              </svg>
            </div>
          );
        }
        if(bl.type==='table'){
          return (
            <div key={i} className="richtablewrap">
              <table className="richtable">
                <thead><tr>{bl.head.map((c,j)=><th key={j}>{renderInline(c)}</th>)}</tr></thead>
                <tbody>{bl.rows.map((r,j)=><tr key={j}>{r.map((c,k)=><td key={k}>{renderInline(c)}</td>)}</tr>)}</tbody>
              </table>
            </div>
          );
        }
        if(bl.type==='sect'){
          const m=bl.meta;
          return (
            <div key={i} className="richsect">
              <div className="richhd" style={m?{color:m.c}:undefined}>
                {m&&<span className="richic" style={{background:m.c+'1f',color:m.c}}>{m.ic}</span>}
                <span>{bl.title}</span>
              </div>
              {bl.items.map((it,j)=>(
                <div key={j} className="richbullet"><span className="richdot" style={m?{background:m.c}:undefined}/><span className="grow">{renderInline(it)}</span></div>
              ))}
            </div>
          );
        }
        if(bl.type==='bullets'){
          return (
            <div key={i} className="richsect">
              {bl.items.map((it,j)=>(
                <div key={j} className="richbullet"><span className="richdot"/><span className="grow">{renderInline(it)}</span></div>
              ))}
            </div>
          );
        }
        return <div key={i} className="richpara">{renderInline(bl.text)}</div>;
      })}
    </div>
  );
}
/* parse "key=value key2=value2" allowing spaces in values up to the next " key=" */
function parseTag(s){
  const out={}; const re=/(\w+)=([^=]*?)(?=\s+\w+=|$)/g; let m;
  while((m=re.exec(s))){ out[m[1].toLowerCase()]=m[2].trim(); }
  return out;
}

function AskTab({me}){

  const [err,setErr]=useState('');

  const roleFitQ = `Based on my past tasks, am I doing what fits my role as ${me.role}?`;
  const ownerQ = 'I need to get something done. Who should own it, me or someone else?';
  const suggestions = me.is_admin
    ? [roleFitQ, ownerQ, 'What did I do last week?', 'What did the team finish this month?']
    : [roleFitQ, ownerQ, 'What did I do last week?', 'What am I waiting on?'];
  const featuredCount = 2;   // first N chips are highlighted (role coaching)

  useEffect(()=>{ endRef.current&&endRef.current.scrollIntoView({block:'end'}); },[msgs,busy]);

  async function ask(text){
    const question=(text!==undefined?text:q).trim();

      });

      setMsgs([...nextMsgs,{role:'assistant',content:data.answer}]);

   reach for it. Steps can switch tabs via goTab. Blocks all interaction underneath
   until the tour ends or is skipped. Re-runnable from Settings. */

   animation, so first-time users can SEE how coop, role, request, waiting,
   and later behave instead of only reading about them. */

      <path d={'M '+(x-10)+' '+(y+10)+' a 10 7.5 0 0 1 20 0 Z'} fill={c}/>

  const Arrow=({x1,x2,y})=>(
    <g stroke="var(--muted2)" strokeWidth="2" strokeLinecap="round" fill="none">
      <path d={'M '+x1+' '+y+' L '+x2+' '+y}/>
      <path d={'M '+(x2-6)+' '+(y-4)+' L '+x2+' '+y+' L '+(x2-6)+' '+(y+4)}/>
    </g>
  );
  const Check=({x,y,delay})=>(
    <g className="ta-pop" style={{animationDelay:delay}}>
      <circle cx={x} cy={y} r={8} fill="var(--green)"/>
      <path d={'M '+(x-3.5)+' '+y+' l 2.5 3 l 5 -6'} stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    </g>

function TourOverlay({steps, goTab, onDone}){
  const [i,setI]=useState(0);
  const [hole,setHole]=useState(null);
  const [ring,setRing]=useState(null);
  const [cardStyle,setCardStyle]=useState(null);
  const [measured,setMeasured]=useState(-1);
  const s=steps[i];
  useEffect(()=>{
    document.body.classList.add('tour-open');
    return ()=>document.body.classList.remove('tour-open');
  },[]);
  useEffect(()=>{
    let dead=false, tries=0;
    window.scrollTo(0,0);
    if(s.tab) goTab(s.tab);
    function measure(){
      if(dead) return;
      tries++;
      let h=null, rg=null;
      if(s.target==='main'){
        // whole screen between header and tab bar
        const hd=document.querySelector('.hdr'); const tb=document.querySelector('.tabbar');
        const sh=document.querySelector('#shell');
        const top=hd?hd.getBoundingClientRect().bottom+4:64;
        const bot=tb?tb.getBoundingClientRect().top-4:window.innerHeight-72;
        const sr=sh?sh.getBoundingClientRect():{left:0,width:window.innerWidth};
        h={top, left:sr.left+6, w:sr.width-12, h:bot-top, rad:18};
      }else if(s.target){
        const el=document.querySelector('[data-tour="'+s.target+'"]');
        if(!el){ if(tries<24){ setTimeout(measure,60); return; } }
        else{
          const r=el.getBoundingClientRect();
          h={top:r.top-6, left:Math.max(4,r.left-6), w:r.width+12, h:r.height+12, rad:14};
        }
      }
      if(s.ring){
        const el=document.querySelector('[data-tour="'+s.ring+'"]');
        if(el){ const r=el.getBoundingClientRect(); rg={top:r.top-2,left:r.left-2,w:r.width+4,h:r.height+4}; }
      }
      // card placement
      let cs;
      if(!s.target){
        cs={top:'50%', transform:'translateY(-50%)'};
      }else if(s.cardPos==='bottom'&&h){
        cs={bottom:(window.innerHeight-(h.top+h.h))+14};
      }else if(h){
        const mid=h.top+h.h/2;
        if(mid<window.innerHeight*0.45) cs={top:h.top+h.h+14};
        else cs={bottom:(window.innerHeight-h.top)+14};
      }else{
        cs={top:'50%', transform:'translateY(-50%)'};
      }
      setHole(h); setRing(rg); setCardStyle(cs); setMeasured(i);
    }
    setTimeout(measure,90);
    return ()=>{ dead=true; };
  },[i]);
  const last=i===steps.length-1;
  return(
    <>
      <div className="tour-catch" onTouchMove={e=>e.preventDefault()} onClick={e=>e.stopPropagation()}/>
      {hole
        ?<div className="tour-hole" style={{top:hole.top,left:hole.left,width:hole.w,height:hole.h,borderRadius:hole.rad}}/>
        :<div className="tour-dim"/>}
      {ring&&<div className="tour-ring" style={{top:ring.top,left:ring.left,width:ring.w,height:ring.h}}/>}
      {measured===i&&(
        <div className="tour-card" style={cardStyle}>
          <div className="tour-top">
            <span className="tour-count">{(i+1)+' / '+steps.length}</span>
            <button type="button" className="tour-skip" onClick={onDone}>Skip tour</button>
          </div>
          <div className="tour-kicker">{s.icon&&<Ic name={s.icon}/>}<span>{s.title}</span></div>
          {s.art&&<div className="tour-art"><TourArt kind={s.art}/></div>}
          <div className="tour-body">{s.body}</div>
          {s.when&&<div className="tour-when"><b>When to use it:</b> {s.when}</div>}
          <div className="row" style={{gap:8,marginTop:14}}>
            {i>0&&<button type="button" className="btn btn-ghost btn-sm" style={{flex:'none',padding:'0 16px'}} onClick={()=>setI(i-1)}>Back</button>}
            <button type="button" className="btn btn-gold btn-sm" style={{flex:1}} onClick={()=>{ last?onDone():setI(i+1); }}>{last?(s.cta||'Done'):'Next'}</button>
          </div>
          <div className="tour-bar"><div style={{width:(((i+1)/steps.length)*100)+'%'}}/></div>
        </div>
      )}
    </>
  );
}

  // Track the on-screen keyboard height (iOS) so fixed bars sit on top of it.
  useEffect(()=>{
    const vv=window.visualViewport;
    const isField=el=>el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA');
    const fieldFocused=()=>isField(document.activeElement);
    const onResize=()=>{
      if(!vv) return;
      const kb=Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty('--kb', kb+'px');
      // Only let the measured height REMOVE kb-open when no field is focused. While a
      // field has focus we keep the bars hidden even if the measurement lags or reads 0,
      // so the tab bar never floats up onto the keyboard.
      if(kb>80) document.body.classList.add('kb-open');
      else if(!fieldFocused()) document.body.classList.remove('kb-open');
    };
    // Focus is the reliable signal that the keyboard is up (works even when the

    const onFocus=e=>{ if(isField(e.target)){ document.body.classList.add('kb-open'); if(vv) onResize(); } };

    setBusy(true);
    const [pRes,tRes,cRes,mRes,gRes,gpRes,rRes,nRes,reqRes,rtRes,rpRes,rmRes,riRes,svRes,svtRes]=await Promise.all([
      sb.from('wios_profiles').select('*').order('created_at'),
      sb.from('wios_tasks').select('*').eq('owner_id',user.id),
      sb.from('wios_coops').select('*').order('created_at',{ascending:false}),
      sb.from('wios_coop_members').select('*'),
      sb.from('wios_goals').select('*').eq('owner_id',user.id),
      sb.from('wios_goal_periods').select('*').eq('user_id',user.id),
      sb.from('wios_recurrings').select('*').eq('owner_id',user.id).order('time_hhmm'),
      sb.from('wios_notifications').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(50),
      sb.from('wios_requests').select('*').order('created_at',{ascending:false}),
      sb.from('wios_request_targets').select('*'),
      sb.from('wios_role_projects').select('*').order('created_at',{ascending:false}),
      sb.from('wios_role_members').select('*'),
      sb.from('wios_role_items').select('*'),
      sb.from('wios_surveys').select('*').order('created_at',{ascending:false}),
      sb.from('wios_survey_targets').select('*'),
    ]);
    const all=pRes.data||[];
    const mine=all.find(p=>p.id===user.id);
    if(!mine){ setGate('none'); setBusy(false); return; }
    if(!mine.active){ setGate('off'); setMe(mine); setBusy(false); return; }
    setGate(null); setMe(mine);
    setAllPeople(all);
    setPeople(all.filter(p=>p.active));
    setTasks(tRes.data||[]); setCoops(cRes.data||[]); setMembers(mRes.data||[]);
    setGoals(gRes.data||[]); setGps(gpRes.data||[]); setRecs(rRes.data||[]);
    setNotifs(nRes.data||[]);
    setRequests(reqRes.data||[]); setReqTargets(rtRes.data||[]);
    setSurveys(svRes.data||[]); setSvTargets(svtRes.data||[]);
    setRoleProjects(rpRes.data||[]); setRoleMembers(rmRes.data||[]); setRoleItems(riRes.data||[]);
    setBusy(false);

    // safety net so goal prompts exist even before the first cron run.
    // A brand-new member (no period rows yet) gets ONE combined prompt task
    // instead of four separate ones, so their first list is not flooded.
    if(!ensured.current){
      ensured.current=true;
      const have=gpRes.data||[];
      const firstTime=have.length===0;
      let added=false;
      for(const type of PERIOD_TYPES){
        const key=periodKey(type);
        if(have.some(x=>x.period_type===type&&x.period_key===key)) continue;
        await sb.from('wios_goal_periods').upsert(
          {user_id:user.id,period_type:type,period_key:key,prompted:true},
          {onConflict:'user_id,period_type,period_key',ignoreDuplicates:true});
        if(firstTime) continue;   // one combined task below covers all periods
        const ref=`${type}:${key}`;
        if(!(tRes.data||[]).some(x=>x.system_ref===ref)){
          await sb.from('wios_tasks').insert({owner_id:user.id,
            title:`Review last period and set your ${PLABEL[type]} goals`,
            status:'active',urgent:true,is_system:true,system_kind:'goal_prompt',system_ref:ref})
            .then(()=>{added=true;},()=>{});
        }
      }
      if(!firstTime){
        // migration + flood guard: several active per-period prompts collapse into one
        const prompts=(tRes.data||[]).filter(x=>x.is_system&&x.system_kind==='goal_prompt'&&x.status==='active');
        const perPeriod=prompts.filter(x=>String(x.system_ref||'').indexOf('all:')!==0);
        const hasCombined=prompts.some(x=>String(x.system_ref||'').indexOf('all:')===0);
        if(perPeriod.length>1){
          for(const t of perPeriod){ await sb.from('wios_tasks').delete().eq('id',t.id); }
          if(!hasCombined){
            await sb.from('wios_tasks').insert({owner_id:user.id,
              title:'Set your yearly, semester, monthly, and weekly goals',
              status:'active',urgent:true,is_system:true,system_kind:'goal_prompt',
              system_ref:`all:${periodKey('week')}`}).then(()=>{},()=>{});
          }
          added=true;
        }
      }
      if(firstTime){
        const ref=`all:${periodKey('week')}`;
        if(!(tRes.data||[]).some(x=>x.system_ref===ref)){
          await sb.from('wios_tasks').insert({owner_id:user.id,
            title:'Set your yearly, semester, monthly, and weekly goals',
            status:'active',urgent:true,is_system:true,system_kind:'goal_prompt',system_ref:ref})
            .then(()=>{added=true;},()=>{});
        }
      }
      if(added) load();
    }
  },[]);

  useEffect(()=>{ if(session) load(); },[session,load]);
  useEffect(()=>{
    if(!session) return;
    const f=()=>{ if(document.visibilityState==='visible') load(); };
    document.addEventListener('visibilitychange',f); window.addEventListener('focus',f);
    const iv=setInterval(f,15000);
    return ()=>{ document.removeEventListener('visibilitychange',f);
      window.removeEventListener('focus',f); clearInterval(iv); };
  },[session,load]);

  const unreadN=useMemo(()=>notifs.filter(n=>!n.read).length,[notifs]);

  // Coaching / CEO assistant unread badges: compare the newest message time to what the
  // person has already seen (stored locally per bot). A dot shows when there is something new.
  const [coachNew,setCoachNew]=useState(false);
  const [briefNew,setBriefNew]=useState(false);
  const refreshBotBadges=useCallback(async(uid,isAdmin)=>{
    try{
      const {data}=await sb.from('wios_coaching_messages').select('created_at').eq('user_id',uid).eq('role','coach').order('created_at',{ascending:false}).limit(1);
      const latest=data&&data[0]?data[0].created_at:null;
      const seen=localStorage.getItem('wios-coach-seen')||'';
      setCoachNew(!!latest&&latest>seen);
    }catch(e){}
    if(isAdmin){
      try{
        const {data}=await sb.from('wios_ceo_brief_messages').select('created_at').eq('owner_id',uid).eq('role','assistant').order('created_at',{ascending:false}).limit(1);
        const latest=data&&data[0]?data[0].created_at:null;
        const seen=localStorage.getItem('wios-brief-seen')||'';
        setBriefNew(!!latest&&latest>seen);
      }catch(e){}
    }
  },[]);
  useEffect(()=>{ if(me) refreshBotBadges(me.id,me.is_admin); },[me,refreshBotBadges,notifs]);
  function markCoachSeen(){ try{localStorage.setItem('wios-coach-seen',new Date().toISOString());}catch(e){} setCoachNew(false); }
  function markBriefSeen(){ try{localStorage.setItem('wios-brief-seen',new Date().toISOString());}catch(e){} setBriefNew(false); }

  const myTurn=useMemo(()=>me?coops.filter(c=>c.status==='active'&&c.holder_id===me.id).length:0,[coops,me]);
  const coopReqN=useMemo(()=>me?coops.filter(c=>c.status==='active'&&
    members.some(m=>m.coop_id===c.id&&m.user_id===me.id&&m.status==='pending')).length:0,[coops,members,me]);
  const reqIncomingN=useMemo(()=>me?reqTargets.filter(t=>t.user_id===me.id&&t.status==='pending').length
    +reqTargets.filter(t=>t.user_id===me.id&&t.status==='accepted').length:0,[reqTargets,me]);
  const roleIncomingN=useMemo(()=>me?roleItems.filter(it=>it.assignee_id===me.id&&!it.approved).length:0,[roleItems,me]);
  const svIncomingN=useMemo(()=>me?svTargets.filter(t=>t.user_id===me.id&&t.status==='pending'
    &&surveys.some(sv=>sv.id===t.survey_id&&sv.status!=='done')).length:0,[svTargets,surveys,me]);
  const remindedN=useMemo(()=>tasks.filter(t=>t.status==='active'&&t.reminded).length,[tasks]);
  const coopBadge=myTurn+coopReqN+reqIncomingN+roleIncomingN+svIncomingN;

  useEffect(()=>{
    const n=coopBadge+remindedN;
    if('setAppBadge' in navigator){
      if(n>0) navigator.setAppBadge(n).catch(()=>{});
      else if('clearAppBadge' in navigator) navigator.clearAppBadge().catch(()=>{});
    }
  },[coopBadge,remindedN]);

  if(session===undefined) return <Splash/>;
  if(!session) return <Login/>;
  if(gate) return (
    <div className="auth">
      <div className="wordmark" style={{textAlign:'center',fontSize:36}}>WIOS</div>
      <div className="empty">
        {gate==='none'
          ? 'This account is not set up in WIOS yet. Ask John to add you, then sign in again.'
          : 'Your WIOS access is turned off. Ask John to turn it back on.'}
      </div>
      <button className="btn btn-ghost" onClick={async()=>{ await sb.auth.signOut(); location.reload(); }}>
        Sign out
      </button>
    </div>
  );
  if(!me) return <Splash/>;

  const tabs=[
    {k:'tasks', l:'Tasks', badge:coopBadge+remindedN},
    {k:'goals', l:'Goals', badge:goalGaps},
    {k:'daily', l:'Recurring', badge:0},
    {k:'ask',   l:'Ask',   badge:0},
  ];
  if(me.is_admin) tabs.push({k:'team', l:'Team', badge:0});

  return (
    <div>
      <div className="hdr">
        <div className="grow">
          <div className="wordmark">WIOS</div>
          <div className="sub">Work In One Space</div>
        </div>
        <button data-tour="bell" className="iconbtn bell" onClick={()=>setShowNotifs(true)} aria-label="Notifications">
          {ICON.bell}{unreadN>0&&<span className="belldot">{unreadN>9?'9+':unreadN}</span>}
        </button>
        <button data-tour="coach" className="iconbtn coach" onClick={()=>{ markCoachSeen(); setShowCoach(true); }} aria-label="Weekly coaching">{ICON.coach}{coachNew&&<span className="belldot dotonly"/>}</button>
        {me.is_admin&&<button data-tour="brief" className="iconbtn ceobrief" onClick={()=>{ markBriefSeen(); setShowCeoBrief(true); }} aria-label="CEO assistant">{ICON.brief}{briefNew&&<span className="belldot dotonly"/>}</button>}
        <button data-tour="gear" className="iconbtn" onClick={()=>setShowSettings(true)} aria-label="Settings">{ICON.gear}</button>
      </div>

      <div className="main" data-tour="main">
        {tab==='tasks'&&<TasksTab me={me} people={people} tasks={tasks}
          coops={coops} members={members} goals={goals}
          requests={requests} reqTargets={reqTargets}
          surveys={surveys} svTargets={svTargets}
          roleProjects={roleProjects} roleMembers={roleMembers} roleItems={roleItems}
          reload={load} openCoopId={openCoopId} setOpenCoopId={setOpenCoopId}
          gotoGoals={tp=>{ setGoalType(tp); setTab('goals'); }}/>}
        {tab==='goals'&&<GoalsTab me={me} goals={goals} gps={gps} reload={load}
          goalType={goalType} setGoalType={setGoalType} tasks={tasks}/>}
        {tab==='daily'&&<DailyTab me={me} recs={recs} reload={load}/>}
        {tab==='ask'&&<AskTab me={me}/>}
        {tab==='team'&&me.is_admin&&<TeamTab me={me} people={people} coops={coops} members={members}/>}
      </div>

      <div className="tabbar">
        {tabs.map(t=>(
          <button key={t.k} data-tour={'tab-'+t.k} className={tab===t.k?'on':''} onClick={()=>{
            if(tab===t.k){ window.scrollTo({top:0,behavior:'smooth'}); }
            else setTab(t.k);
          }}>
            <span className="gwrap">
              {ICON[t.k]}
              {t.badge>0&&<span className="bdg">{t.badge>9?'9+':t.badge}</span>}
            </span>
            {t.l}
          </button>
        ))}
      </div>

      {pushPrompt&&(
        <div className="overlay" onClick={dismissPush}>
          <div className="sheet" onClick={e=>e.stopPropagation()} style={{textAlign:'center'}}>
            <button className="sheetx" onClick={dismissPush} aria-label="Close">{ICON.x}</button>
            <div style={{color:'var(--gold)',display:'flex',justifyContent:'center',marginBottom:6}}>
              <span className="ic bigbell">{ICON.bell}</span>
            </div>
            <h3 style={{textAlign:'center'}}>Turn on notifications</h3>
            <div className="sub" style={{textAlign:'center'}}>
              Get a push when a teammate passes you a task, a coop needs you, or something is due. You can change this anytime in settings.
            </div>
            <div style={{height:14}}/>
            <button className="btn btn-gold" style={{width:'100%'}} onClick={acceptPush}>Turn on</button>
            <button className="btn btn-ghost" style={{width:'100%',marginTop:8}} onClick={dismissPush}>Not now</button>
          </div>
        </div>
      )}
      {showSettings&&<SettingsSheet me={me} onClose={()=>setShowSettings(false)}
        openMembers={()=>{ setShowSettings(false); setShowMembers(true); }}
        goTeam={()=>setTab('team')} openGuide={()=>setShowGuide(true)}
        openTour={()=>{ setTab('tasks'); setShowTour(true); }}/>}
      {showCoach&&<CoachingSheet me={me} onClose={()=>setShowCoach(false)}/>}
      {showGuide&&<GuideSheet onClose={closeGuide} tourNext={guideThenTour}/>}
      {showTour&&!showGuide&&<TourOverlay steps={tourSteps} goTab={setTab} onDone={endTour}/>}
      {showCeoBrief&&<CeoBriefSheet me={me} onClose={()=>setShowCeoBrief(false)}/>}
      {showMembers&&<MembersSheet me={me} people={allPeople}
        onClose={()=>setShowMembers(false)} reload={load}/>}
      {showNotifs&&<NotifsSheet me={me} notifs={notifs} onClose={()=>setShowNotifs(false)}
        reload={load}
        openCoop={cid=>{ setShowNotifs(false); setTab('tasks'); setOpenCoopId(cid); }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
