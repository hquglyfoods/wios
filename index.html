<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WIOS">
<title>WIOS</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap">
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* Graphite: neutral cool-grey background with a calm graphite-blue accent. bg is a shade
     deeper than panels so white cards and the selected segment lift off it at a glance. */
  --bg:#ECEEF1;--panel:#FFFFFF;--panel2:#E4E7EC;--border:#DCDFE4;--border2:#C6CBD3;
  --text:#202428;--muted:#6C737B;--muted2:#9BA2AA;
  --gold:#3A6EA5;--gold-soft:rgba(58,110,165,.11);--gold-line:rgba(58,110,165,.40);
  --red:#D65C4E;--green:#2E9E68;--blue:#3A6EA5;--purple:#6E62A0;--teal:#2E8F97;
  --amber:#B0863E;--amber-soft:rgba(176,134,62,.13);--amber-line:rgba(176,134,62,.38);
  --card-shadow:0 1px 3px rgba(30,35,40,.08),0 1px 2px rgba(30,35,40,.04);
  --tap:44px;--kb:0px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#E6E8EC;overscroll-behavior-y:none;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;}
#shell{max-width:480px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;}
@media(min-width:520px){#shell{border-left:1px solid #DCE4EE;border-right:1px solid #DCE4EE;}}
input,select,textarea,button{font-family:inherit;font-size:16px;color:var(--text);}
input,select,textarea{background:var(--panel);border:1px solid var(--border2);border-radius:10px;
  padding:12px;width:100%;outline:none;min-height:var(--tap);font-size:16px;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
textarea{resize:none;}
/* date/time inputs have an intrinsic min width on iOS Safari that overflows the
   sheet; force them to stay inside their container */
input[type=datetime-local],input[type=date],input[type=time]{
  width:100%;max-width:100%;min-width:0;-webkit-appearance:none;appearance:none;
  display:block;}
/* when form fields stack directly, keep a comfortable gap so they do not feel cramped */
.sheet input + input, .sheet input + textarea, .sheet textarea + input, .sheet textarea + textarea{margin-top:10px;}
button{cursor:pointer;border:none;background:none;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px;}

/* header */
.hdr{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;box-shadow:0 1px 3px rgba(26,42,58,.04);
  display:flex;align-items:center;gap:6px;}
.hdr .iconbtn{width:40px;height:40px;}
.hdr .iconbtn svg{width:20px;height:20px;}
.wordmark{font-family:'Playfair Display',Georgia,serif;font-size:22px;letter-spacing:.06em;color:var(--gold);
  font-weight:700;line-height:1.1;}
.hdr .sub{font-size:9.5px;color:var(--muted2);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;}
.iconbtn{width:var(--tap);height:var(--tap);border-radius:12px;background:var(--panel);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;position:relative;}
.iconbtn:active{background:var(--panel2);}
.iconbtn svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.iconbtn.bell{color:var(--gold);}
.belldot{position:absolute;top:5px;right:5px;min-width:16px;height:16px;border-radius:8px;background:var(--red);
  color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--panel);}
.belldot.dotonly{min-width:11px;width:11px;height:11px;top:6px;right:6px;padding:0;}
.main{padding:14px 14px 120px;}

/* tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40;
  background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);
  display:flex;padding:7px 4px calc(env(safe-area-inset-bottom) + 7px);box-shadow:0 -1px 8px rgba(26,42,58,.06);}
body.kb-open .tabbar{transform:translateX(-50%) translateY(200%);pointer-events:none;visibility:hidden;opacity:0;}   /* fully out of the way of the keyboard */
.tabbar button{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 1px 4px;color:var(--muted2);font-size:10px;font-weight:600;letter-spacing:.01em;
  border-radius:12px;min-height:var(--tap);}
.tabbar button.on{color:var(--gold);}
.gwrap{position:relative;display:flex;align-items:center;justify-content:center;height:24px;width:24px;}
.gwrap svg{width:23px;height:23px;stroke:currentColor;stroke-width:1.9;fill:none;
  stroke-linecap:round;stroke-linejoin:round;}
.tabbar button.on .gwrap svg{stroke-width:2.2;}
.gwrap .bdg{position:absolute;top:-6px;left:calc(50% + 3px);min-width:17px;height:17px;border-radius:9px;
  background:var(--red);color:#FFFFFF;font-size:10px;font-weight:700;display:flex;align-items:center;
  justify-content:center;padding:0 4px;border:2px solid #FFFFFF;}

/* segmented control */
.seg{display:flex;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:12px;}
.seg button{flex:1;min-width:0;padding:10px 2px;border-radius:9px;color:var(--muted);font-size:11.5px;
  font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:40px;}
.seg button.on{background:var(--panel);color:var(--text);box-shadow:0 1px 3px rgba(30,35,40,.15);font-weight:700;}

/* cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:9px;
  box-shadow:var(--card-shadow);}
.card.turn{border-color:var(--gold-line);background:linear-gradient(180deg,rgba(58,110,165,.07),var(--panel));}
.card.tapme:active{border-color:var(--border2);}
.row{display:flex;align-items:center;gap:10px;}
.grow{flex:1;min-width:0;}
.tt{font-weight:600;font-size:15px;line-height:1.35;overflow-wrap:anywhere;}
.card.task .tt{overflow-wrap:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tt.done{color:var(--muted);text-decoration:line-through;}
.meta{font-size:12px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;line-height:1.4;}
.card.task .meta{flex-wrap:nowrap;overflow:hidden;min-height:19px;}
.chip{font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 7px;border-radius:6px;
  text-transform:uppercase;white-space:nowrap;}
.chip.urgent{background:rgba(224,82,82,.16);color:var(--red);}
.chip.back{background:var(--gold-soft);color:var(--gold);}
.chip.sys{background:rgba(155,120,212,.16);color:var(--purple);}
.chip.role{background:var(--panel2);color:var(--muted);box-shadow:inset 0 0 0 1px var(--border);
  min-width:38px;text-align:center;display:inline-block;}
.chip.ok{background:rgba(95,184,122,.16);color:var(--green);}
.chip.wait{background:rgba(91,143,212,.14);color:var(--blue);}
.chip.off{background:rgba(138,132,128,.14);color:var(--muted);}

/* the ball: whose turn it is */
.ball{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(58,110,165,.6);
  animation:pulse 1.7s ease-in-out infinite;flex:none;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.6}}

.sect{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  margin:20px 2px 9px;display:flex;align-items:center;gap:8px;}
.sect .n{color:var(--gold);}

/* buttons */
.btn{border-radius:11px;padding:12px 14px;font-weight:600;font-size:14px;text-align:center;
  min-height:var(--tap);display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-gold{background:var(--gold);color:#FFFFFF;box-shadow:0 1px 3px rgba(58,110,165,.3);}
.btn-gold:active{background:#2559AE;}
.btn-line{background:var(--panel2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2);}
.btn-ghost{color:var(--muted);background:transparent;box-shadow:inset 0 0 0 1px var(--border);}
.btn-red{background:rgba(224,82,82,.12);color:var(--red);box-shadow:inset 0 0 0 1px rgba(224,82,82,.3);}
.btn-sm{padding:10px 12px;font-size:13px;border-radius:10px;min-height:42px;}
.btn:disabled{opacity:.4;}
.btn .lbl2{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.qadd{display:flex;gap:8px;margin-bottom:14px;}
.qadd .btn{flex:none;width:52px;padding:0;font-size:20px;}

/* sheets */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(26,42,58,.45);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:20px;}
.sheet{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:20px 18px;box-shadow:0 20px 60px rgba(26,42,58,.25);
  animation:pop .2s ease-out;max-height:88dvh;overflow-y:auto;position:relative;}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.sheetx{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:9px;
  background:var(--panel2);color:var(--muted);display:flex;align-items:center;justify-content:center;
  border:none;z-index:2;}
.sheetx:active{background:var(--border);}
.sheetx svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;}
.sheet h3{margin:0 40px 4px 0;font-size:17px;overflow-wrap:anywhere;}
.sheet .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.opt{display:flex;align-items:center;gap:11px;width:100%;padding:13px 12px;border-radius:11px;
  background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);margin-bottom:8px;
  font-weight:600;font-size:14px;text-align:left;color:var(--text);min-height:var(--tap);}
.opt:active{box-shadow:inset 0 0 0 1px var(--border2);}
.opt .g{width:22px;text-align:center;flex:none;font-size:15px;}
.opt .ic{width:22px;flex:none;color:var(--muted);}
.opt.danger{color:var(--red);}
.opt.actionsopen{margin-bottom:0;border-bottom-left-radius:0;border-bottom-right-radius:0;}
.actionsmenu{margin-bottom:8px;padding:6px;border-radius:0 0 11px 11px;background:rgba(0,0,0,.02);
  box-shadow:inset 0 0 0 1px var(--border);border-top:none;animation:actionsIn .16s ease;}
.actionsmenu .opt.sub{background:var(--panel);margin-bottom:6px;}
.actionsmenu .opt.sub:last-child{margin-bottom:0;}
@keyframes actionsIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.opt.danger .ic{color:var(--red);}
.opt .grow{overflow-wrap:anywhere;}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pbtn{padding:12px 8px;border-radius:11px;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);
  font-weight:600;font-size:13.5px;color:var(--text);min-height:var(--tap);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbtn.on{box-shadow:inset 0 0 0 1.5px var(--gold);color:var(--gold);background:var(--gold-soft);}

/* coop detail */
.detail{position:fixed;inset:0;z-index:55;background:var(--bg);max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;}
/* when a chat field in a full-screen sheet is focused, shrink the sheet so its input bar
   sits right on top of the keyboard, and the body scrolls above it */
body.kb-open .detail{bottom:calc(var(--kb, 0px));}
.detail .askbar{position:sticky;bottom:0;}
.dhdr{padding:calc(env(safe-area-inset-top) + 10px) 12px 11px;border-bottom:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-start;}
.thread{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:82%;padding:9px 12px;border-radius:13px;font-size:14px;line-height:1.45;overflow-wrap:anywhere;}
.msg.mine{align-self:flex-end;background:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold-line);border-bottom-right-radius:4px;}
.msg.theirs{align-self:flex-start;background:var(--panel);box-shadow:inset 0 0 0 1px var(--border);border-bottom-left-radius:4px;}
.msg .who{font-size:10.5px;font-weight:700;color:var(--gold);margin-bottom:3px;letter-spacing:.04em;}
.msg .when{font-size:10px;color:var(--muted2);margin-top:4px;text-align:right;}
.passline{align-self:center;text-align:center;font-size:12px;color:var(--muted);background:var(--panel);
  box-shadow:inset 0 0 0 1px var(--border);border-radius:16px;padding:8px 14px;max-width:94%;overflow-wrap:anywhere;}
.passline b{color:var(--gold);font-weight:700;}
.sysline{align-self:center;font-size:11.5px;color:var(--muted2);text-align:center;max-width:94%;overflow-wrap:anywhere;}
.composer{border-top:1px solid var(--border);padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);
  display:flex;gap:8px;background:var(--bg);}
.composer .btn{flex:none;padding:0 16px;}
.holderbar{display:flex;gap:8px;padding:10px 12px 0;background:var(--bg);}
.holderbar .btn{flex:1;min-width:0;}
.court{display:flex;gap:14px;padding:12px 14px;border-bottom:1px solid var(--border);overflow-x:auto;}
.player{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:54px;flex:none;}
.player .av{width:38px;height:38px;border-radius:50%;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--muted);}
.player.acc .av{color:var(--text);box-shadow:inset 0 0 0 1px var(--gold-line);}
.player.pend .av{border-style:dashed;box-shadow:inset 0 0 0 1px var(--border2);opacity:.75;}
.player.pend .nm{color:var(--muted2);}
.pendtag{font-size:8.5px;line-height:1.1;color:var(--muted2);text-align:center;max-width:60px;
  font-weight:600;letter-spacing:.01em;}
.player .nm{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap;}
.player .slot{height:11px;display:flex;align-items:center;}
.playeradd{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:54px;flex:none;background:none;}
.playeradd .av.addplus{width:38px;height:38px;border-radius:50%;border:1.5px dashed var(--gold-line);
  background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:400;}
.playeradd .nm{font-size:10px;color:var(--gold);font-weight:700;}
.playeradd .slot{height:11px;}
.btn-pass{background:#EFEDF3;color:#6E62A0;box-shadow:inset 0 0 0 1.5px #DBD6E6;}
.btn-pass:active{background:#E6E2EF;}
.btn-pass:active{background:#E6DEF6;}

/* checklists: goals + daily */
.crow{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 6px;background:var(--panel);
  box-shadow:inset 0 0 0 1px var(--border);border-radius:13px;margin-bottom:8px;position:relative;min-height:56px;}
.ctap{width:var(--tap);height:var(--tap);flex:none;display:flex;align-items:center;justify-content:center;}
.gcheck{width:27px;height:27px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .18s;}
.gcheck.on{background:var(--gold);box-shadow:inset 0 0 0 2px var(--gold);color:#FFFFFF;}
.xbtn{width:36px;height:36px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:17px;border-radius:9px;}
.xbtn:active{background:var(--panel2);}
.spark{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--gold);pointer-events:none;}

.pct{height:5px;border-radius:3px;background:var(--panel2);overflow:hidden;margin-top:6px;}
.pct i{display:block;height:100%;background:var(--gold);border-radius:3px;transition:width .4s;}

.daychips{display:flex;gap:5px;margin-top:8px;}
.daychips button{flex:1;min-width:0;padding:0;height:42px;border-radius:9px;background:var(--panel2);
  box-shadow:inset 0 0 0 1px var(--border);font-size:12px;font-weight:600;color:var(--muted);}
.daychips button.on{box-shadow:inset 0 0 0 1.5px var(--gold);color:var(--gold);background:var(--gold-soft);}

.streak{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;flex:none;}
.empty{text-align:center;color:var(--muted2);font-size:13.5px;padding:30px 20px;line-height:1.6;}
.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 2px 7px;}
.banner{display:flex;align-items:center;gap:10px;width:100%;background:var(--gold-soft);
  box-shadow:inset 0 0 0 1px var(--gold-line);border-radius:13px;padding:13px 14px;margin-bottom:12px;
  font-weight:600;font-size:13.5px;color:var(--gold);text-align:left;min-height:var(--tap);}
.err{color:var(--red);font-size:13px;line-height:1.5;overflow-wrap:anywhere;}
.note{color:var(--muted);font-size:12.5px;line-height:1.6;overflow-wrap:anywhere;}

.auth{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:32px 26px;gap:10px;}
.spin{animation:rot 1s linear infinite;display:inline-block;}
@keyframes rot{to{transform:rotate(360deg)}}

/* team view */
.kv{display:flex;gap:8px;margin-top:10px;}
.kv div{flex:1;min-width:0;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border);
  border-radius:10px;padding:9px 4px;text-align:center;}
.kv .v{font-size:18px;font-weight:700;line-height:1.1;}
.kv .k{font-size:9px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:3px;white-space:nowrap;}
.mini{font-size:13px;color:var(--muted);padding:8px 2px;border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center;line-height:1.45;overflow-wrap:anywhere;}
.mini:last-child{border-bottom:none;}
.mini .fx{flex:none;}
.bars{margin-top:10px;}
.bars .b{font-size:11px;color:var(--muted);}
.bars .b + .b{margin-top:7px;}

/* ask tab */
.askwrap{position:fixed;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  top:calc(env(safe-area-inset-top) + 60px);
  bottom:calc(env(safe-area-inset-bottom) + 58px + var(--kb, 0px));
  display:flex;flex-direction:column;padding:12px 14px 0;background:var(--bg);z-index:5;
  transition:bottom .18s ease;}
body.kb-open .askwrap{bottom:calc(var(--kb, 0px) + env(safe-area-inset-bottom) + 6px);}   /* input rides on top of the keyboard */
.askscroll{flex:1;overflow-y:auto;padding:4px 2px 8px;display:flex;flex-direction:column;gap:12px;}
.askintro{margin:auto;text-align:center;padding:20px 10px;}
.askglyph{font-size:32px;color:var(--gold);margin-bottom:10px;}
.asktitle{font-size:17px;font-weight:700;margin-bottom:8px;}
.asksugs{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.asksug{text-align:left;padding:12px 14px;border-radius:12px;background:var(--panel);
  box-shadow:inset 0 0 0 1px var(--border);color:var(--text);font-size:13.5px;font-weight:500;min-height:var(--tap);}
.asksug:active{box-shadow:inset 0 0 0 1px var(--border2);}
.asksug.feat{background:var(--gold-soft);box-shadow:inset 0 0 0 1.5px var(--gold-line);color:var(--gold);font-weight:600;
  display:flex;align-items:center;gap:8px;}
.asksug.feat::before{content:'\2726';font-size:13px;flex:none;}
.askmsg{max-width:88%;}
.askmsg.me{align-self:flex-end;background:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold-line);
  border-radius:14px 14px 4px 14px;padding:10px 13px;}
.askmsg.ai{align-self:flex-start;width:100%;max-width:100%;}
.aitag{font-size:10.5px;font-weight:700;color:var(--gold);letter-spacing:.06em;margin-bottom:5px;
  display:inline-flex;align-items:center;gap:5px;}
.rich{display:flex;flex-direction:column;gap:12px;}
.richsect{display:flex;flex-direction:column;gap:6px;}
.richhd{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;letter-spacing:.01em;
  text-transform:uppercase;}
.richic{flex:none;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.richic svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.richbullet{display:flex;gap:8px;align-items:flex-start;font-size:14px;line-height:1.45;}
.richdot{flex:none;width:6px;height:6px;border-radius:50%;background:var(--muted2);margin-top:7px;}
.richpara{font-size:14px;line-height:1.5;}
.rich b{font-weight:800;color:var(--text);}
.richbar{margin:9px 0;}
.richbarrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;font-size:13px;}
.richbarlabel{color:var(--text);font-weight:600;}
.richbarval{font-weight:800;font-size:12.5px;}
.richbartrack{height:8px;border-radius:5px;background:var(--border);overflow:hidden;}
.richbarfill{display:block;height:100%;border-radius:5px;transition:width .5s ease;}
.richtrend{margin:10px 0;}
.richtrendlabel{font-size:12.5px;color:var(--muted);margin-bottom:4px;font-weight:600;}
.richtrendsvg{width:100%;height:46px;display:block;}
.richtablewrap{margin:9px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.richtable{border-collapse:collapse;width:100%;font-size:12.5px;}
.richtable th,.richtable td{border:1px solid var(--border);padding:6px 9px;text-align:left;white-space:nowrap;}
.richtable th{background:var(--panel2);font-weight:700;color:var(--text);}
.richtable td{color:var(--text);}
.richtable tr:nth-child(even) td{background:rgba(0,0,0,.015);}
.botintro{background:var(--gold-soft);border-radius:14px;padding:14px 15px;margin-bottom:6px;
  box-shadow:inset 0 0 0 1px var(--gold-line);}
.botintrohd{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--gold);
  text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
.botintrotext{font-size:13.5px;line-height:1.55;color:var(--text);}
.guiderow{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--border);}
.guiderow:first-of-type{border-top:none;}
.guideic{flex:none;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.guideic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.guidename{font-size:14.5px;font-weight:700;margin-bottom:2px;}
.guidedesc{font-size:13px;color:var(--muted);line-height:1.45;}
.guideslide{user-select:none;text-align:center;padding:4px 2px 2px;}
.guidehero{border-radius:18px;overflow:hidden;margin-bottom:16px;background:#E6ECFA;box-shadow:0 6px 18px rgba(40,60,110,.10);}
.guidehero img{display:block;width:100%;height:auto;aspect-ratio:1/1;object-fit:cover;}
.guidehero.welcome{background:#fff;border:1px solid var(--border);box-shadow:0 4px 14px rgba(40,60,110,.06);}
.guidehero.welcome img{aspect-ratio:auto;width:58%;margin:26px auto;object-fit:contain;border-radius:22px;}
.guideslidetitle{font-size:19px;font-weight:800;margin-bottom:8px;}
.guideslidedesc{font-size:14px;color:var(--muted);line-height:1.55;max-width:330px;margin:0 auto;min-height:66px;}
.guidedots{display:flex;gap:7px;justify-content:center;margin:16px 0 4px;}
.guidedot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .2s;cursor:pointer;}
.guidedot.on{background:var(--gold);width:20px;border-radius:4px;}
.aitag svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.9;fill:none;}
.askglyph svg{width:34px;height:34px;stroke:currentColor;stroke-width:1.7;fill:none;}
.coopmark svg{stroke:currentColor;stroke-width:1.9;fill:none;}
.askbody{font-size:14.5px;line-height:1.55;white-space:pre-wrap;overflow-wrap:anywhere;}
.askmsg.me .askbody{white-space:pre-wrap;}
.askbar{display:flex;gap:8px;padding:10px 0 10px;border-top:1px solid var(--border);align-items:flex-end;background:var(--bg);}
.askbar textarea{flex:1;max-height:120px;min-height:var(--tap);line-height:1.4;padding:11px 12px;}
.dots{display:inline-flex;gap:4px;align-items:center;height:20px;}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.3s infinite;}
.dots i:nth-child(2){animation-delay:.2s;}
.dots i:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

/* task sorting + age */
.sortbar{display:flex;align-items:center;gap:8px;margin:0 2px 10px;}
.movecol{display:flex;flex-direction:column;gap:4px;flex:none;margin-right:2px;}
.movebtn{width:34px;height:26px;border-radius:7px;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border2);
  color:var(--gold);font-size:11px;display:flex;align-items:center;justify-content:center;}
.movebtn:active{background:var(--gold-soft);}
.movebtn:disabled{opacity:.3;color:var(--muted2);}
.age{font-size:11px;color:var(--muted);font-weight:600;}
.age.old{color:var(--red);}

/* notifications */
.notifrow{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;padding:11px 12px;
  border-radius:12px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--border);margin-bottom:8px;color:var(--text);}
.notifrow.unread{box-shadow:inset 0 0 0 1px var(--border);background:var(--panel);}
.notifrow:active{background:var(--panel2);}
.notific{flex:none;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.notific svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.notiftt{font-size:14px;font-weight:700;line-height:1.25;overflow-wrap:anywhere;}
.notifrow.unread .notiftt{font-weight:800;}
.notifbody{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.notiftime{font-size:11px;color:var(--muted2);margin-top:4px;}
.notifdot{flex:none;width:9px;height:9px;border-radius:50%;background:var(--gold);margin-top:6px;}

/* task cards */
.card.task{transition:box-shadow .15s, opacity .15s;}
.card.task.dragging{opacity:.4;}
.card.task.dragover{box-shadow:0 0 0 2px var(--gold);}
.draghandle{flex:none;color:var(--muted2);cursor:grab;padding:2px 6px 2px 0;touch-action:none;
  display:flex;align-items:center;align-self:stretch;margin:-4px 2px -4px -2px;}
.draghandle svg{width:20px;height:20px;fill:currentColor;stroke:none;}
.draghandle:active{cursor:grabbing;color:var(--gold);}
.card.task.dragging{opacity:.9;box-shadow:0 6px 20px rgba(0,0,0,.16);transform:scale(1.015);}
.chip.wait{background:#E4E7EC;color:#6C737B;}
.chip.later{background:#ECF1F7;color:#3A6EA5;}
.swipearea{min-height:40vh;overflow-x:hidden;touch-action:pan-y;}
.slidewrap{will-change:transform,opacity;}
.slidewrap.fromR{animation:slideFromR .2s cubic-bezier(.22,.61,.36,1);}
.slidewrap.fromL{animation:slideFromL .2s cubic-bezier(.22,.61,.36,1);}
@keyframes slideFromR{from{transform:translateX(60px);opacity:.5;}to{transform:translateX(0);opacity:1;}}
@keyframes slideFromL{from{transform:translateX(-60px);opacity:.5;}to{transform:translateX(0);opacity:1;}}
/* card action buttons: mark-done (green) + delete (red), always on the right */
.cardacts{display:flex;align-items:center;gap:6px;flex:none;margin:-2px -4px -2px 6px;}
.actbtn{width:38px;height:38px;flex:none;display:flex;align-items:center;justify-content:center;
  border-radius:10px;background:var(--panel);}
.actbtn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.actbtn.done{color:var(--green);box-shadow:inset 0 0 0 1px rgba(39,165,103,.35);}
.actbtn.done:active{background:var(--green);color:#fff;}
.actbtn.del{color:var(--red);box-shadow:inset 0 0 0 1px rgba(224,87,79,.35);}
.actbtn.del:active{background:#FCEBEA;}
/* generic inline icon */
.ic{display:inline-flex;align-items:center;justify-content:center;}
.ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* mark-done button on cards: a real, tappable green circle */
.quickcheck{width:44px;height:44px;flex:none;display:flex;align-items:center;justify-content:center;margin:-6px 0 -6px -6px;}
.quickcheck .qc{width:26px;height:26px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--border2);
  display:flex;align-items:center;justify-content:center;color:transparent;transition:all .15s;}
.quickcheck .qc svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.quickcheck:active .qc{box-shadow:inset 0 0 0 2px var(--green);background:var(--green);color:#fff;}
/* trash button on cards: visible red-tinted target */
.trash{width:40px;height:40px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--red);border-radius:10px;box-shadow:inset 0 0 0 1px var(--line);margin:-4px -6px -4px 4px;background:var(--panel);}
.trash svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.trash:active{background:#FCEBEA;box-shadow:inset 0 0 0 1px var(--red);}
.notemark{color:var(--muted2);display:inline-flex;}
.notemark svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;}
.chip.sub{background:var(--gold-soft);color:var(--gold);}
.subrow{display:flex;align-items:center;gap:8px;padding:6px 4px;}
.subdone{color:var(--muted);text-decoration:line-through;}
.gcheck.sm{width:22px;height:22px;font-size:12px;}

/* loading splash */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;background:var(--bg);z-index:100;}
.splashmark{font-family:'Playfair Display',Georgia,serif;font-size:44px;font-weight:700;color:var(--gold);
  letter-spacing:.06em;animation:pulse2 1.6s ease-in-out infinite;}
.splashsub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.splashbar{width:120px;height:4px;border-radius:2px;background:var(--panel2);overflow:hidden;margin-top:14px;}
.splashbar i{display:block;height:100%;width:40%;border-radius:2px;background:var(--gold);animation:slide 1.1s ease-in-out infinite;}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}

/* this-week goal strip: an elevated white banner with a coloured accent bar, so it reads
   as information and stays distinct from the flat blue +Task button */
.goalstrip{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:12px 14px;margin-bottom:12px;
  border-radius:14px;background:var(--panel);box-shadow:var(--card-shadow);border:1px solid var(--border);
  border-left:4px solid var(--gold);color:var(--text);}
.goalstrip:active{background:#F7FAFE;}
.gschip{flex:none;width:26px;height:26px;color:var(--gold);display:flex;align-items:center;justify-content:center;}
.gschip svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.9;fill:none;}
.gshead{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.02em;}
.gsbody{font-size:13px;color:var(--text);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* add task / add coop row */
.addrow{display:flex;gap:10px;margin:0 0 14px;}
.addbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:600;
  background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold-line);min-height:48px;}
.addbtn:active{background:rgba(58,110,165,.16);}
.addbtn svg{width:19px;height:19px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.addbtn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
/* four harmonious tints (Graphite theme) so each type is distinct without clashing */
.ab-task{background:#ECF1F7;color:#3A6EA5;box-shadow:inset 0 0 0 1.5px #D0DCEA;}
.ab-task:active{background:#DFE8F2;}
.ab-coop{background:#E7F1EC;color:#2E9E68;box-shadow:inset 0 0 0 1.5px #CDE4D8;}
.ab-coop:active{background:#DAECE1;}
.ab-role{background:#F5EEE2;color:#B0863E;box-shadow:inset 0 0 0 1.5px #E7D9C1;}
.ab-role:active{background:#EFE5D2;}
.ab-request{background:#EFEDF3;color:#6E62A0;box-shadow:inset 0 0 0 1.5px #DBD6E6;}
.ab-request:active{background:#E6E2EF;}
.ab-survey{background:#E4F1F1;color:#2E8F97;box-shadow:inset 0 0 0 1.5px #CBE4E4;}
.ab-survey:active{background:#D7EBEB;}
/* survey answer option */
.svopt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 12px;margin-top:7px;
  border-radius:11px;background:var(--panel2);color:var(--text);font-size:14px;font-weight:600;
  box-shadow:inset 0 0 0 1px var(--border);}
.svopt .svdot{flex:none;width:18px;height:18px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--border2);}
.svopt.on{background:rgba(58,110,165,.08);box-shadow:inset 0 0 0 1.5px var(--gold);}
.svopt.on .svdot{background:var(--gold);box-shadow:inset 0 0 0 2px var(--gold);}
.svq{font-weight:700;font-size:14px;margin-top:16px;}
.svbar{height:7px;border-radius:3.5px;background:var(--border);overflow:hidden;margin-top:4px;}
.svbar>div{height:100%;background:var(--gold);border-radius:3.5px;}

/* coop card inside tasks */
.coopcard .coopmark{flex:none;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--gold);}
.coopcard .coopmark svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* section header */
.sect{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  margin:6px 2px 8px;display:flex;align-items:center;gap:6px;}
.sect .n{background:var(--gold);color:#fff;border-radius:8px;min-width:16px;height:16px;font-size:10px;
  display:inline-flex;align-items:center;justify-content:center;padding:0 4px;}

/* remind pills */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 4px;}
.pbtn{padding:11px 8px;border-radius:11px;background:var(--panel2);box-shadow:inset 0 0 0 1px var(--border2);
  font-size:13px;font-weight:600;color:var(--text);min-height:var(--tap);}
.pbtn.on{background:var(--gold-soft);box-shadow:inset 0 0 0 2px var(--gold);color:var(--gold);}

.lvl{font-size:10.5px;font-weight:700;border-radius:7px;padding:2px 8px;letter-spacing:.02em;}

.ic.gold{color:var(--gold);}
.ic.muted{color:var(--muted2);}
.ic.green{color:var(--green);}
.ic.red{color:var(--red);}
.opt.on{background:var(--gold-soft);box-shadow:inset 0 0 0 1.5px var(--gold);}
.chip.due{background:#EAF1FF;color:var(--gold);}
.chip.due.urgent{background:#FCEBEA;color:var(--red);}

.handoffbar{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;
  background:var(--gold-soft);box-shadow:inset 0 0 0 1px var(--gold-line);margin-bottom:10px;}
.handoffbar .ic{flex:none;}

.ic.bigbell svg{width:38px;height:38px;stroke-width:1.6;}
.pcheck{width:15px;height:15px;display:inline-flex;margin-right:2px;color:var(--gold);}
.pcheck svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}

.addrow3 .addbtn{font-size:13.5px;gap:6px;}
.addrow3 .addbtn svg{width:17px;height:17px;}
.reqcard .coopmark{color:var(--gold);}
.reqmsg{background:var(--panel2);border-radius:12px;padding:12px 14px;font-style:italic;color:var(--text);margin-bottom:14px;font-size:14px;}
.reqrow{display:flex;align-items:center;gap:8px;padding:10px 2px;border-bottom:1px solid var(--border);}
.reqrow:last-child{border-bottom:none;}
.dbody{padding:16px 14px 40px;overflow-y:auto;}
.chip.off{background:var(--panel2);color:var(--muted2);}

.ovsect{margin-bottom:18px;}
.ovhead{display:flex;align-items:baseline;gap:8px;width:100%;padding:8px 2px;border-bottom:1.5px solid var(--gold-line);margin-bottom:8px;}
.ovheadname{font-size:15px;font-weight:700;color:var(--gold);flex:none;}
.ovheadkey{font-size:12px;color:var(--muted);flex:1;text-align:left;}
.ovheadcta{font-size:12px;color:var(--muted2);flex:none;}
.ovrow{display:flex;align-items:center;gap:9px;padding:8px 2px;}
.ovdot{width:20px;height:20px;flex:none;border-radius:50%;box-shadow:inset 0 0 0 2px var(--border2);
  display:flex;align-items:center;justify-content:center;color:transparent;}
.ovdot.done{background:var(--green);box-shadow:none;color:#fff;}
.ovdot svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.ovdone{color:var(--muted);text-decoration:line-through;}
.ovrow .grow{font-size:14px;}
.ovlink{width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;
  color:var(--muted2);border-radius:8px;}
.ovlink svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.9;fill:none;}
.ovlink:active{background:var(--panel2);color:var(--gold);}
.ovpick{background:var(--panel2);border-radius:10px;padding:10px;margin:2px 0 6px 29px;}
.ovopt{display:block;width:100%;text-align:left;padding:9px 10px;border-radius:8px;font-size:13px;
  background:var(--panel);box-shadow:inset 0 0 0 1px var(--border);margin-bottom:6px;color:var(--text);}
.ovopt.on{box-shadow:inset 0 0 0 1.5px var(--gold);color:var(--gold);}

.wiz{background:var(--panel);border-radius:16px;padding:22px 18px;box-shadow:inset 0 0 0 1px var(--border);}
.wizdots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
.wizdot{width:26px;height:4px;border-radius:2px;background:var(--border2);}
.wizdot.on{background:var(--gold);}
.wizdot.done{background:var(--gold-soft);}
.wizstep{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);text-align:center;}
.wizq{font-size:17px;font-weight:600;text-align:center;margin:8px 0 16px;line-height:1.4;color:var(--text);}
.wizhint{font-size:12.5px;color:var(--muted);text-align:center;margin:-8px 0 14px;line-height:1.5;}

.cmprow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--border);}
.cmprow:active{background:var(--panel2);}
.cmpname{display:flex;align-items:center;gap:7px;width:118px;flex:none;font-size:13.5px;font-weight:600;overflow:hidden;}
.cmpname .grow{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmpbar{flex:1;height:8px;border-radius:4px;background:var(--border);overflow:hidden;}
.cmpbar i{display:block;height:100%;border-radius:4px;}
.cmpscore{flex:none;width:48px;text-align:right;font-size:11.5px;font-weight:700;}
.cmpscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;}
.cmptable{border-collapse:collapse;width:100%;font-size:13px;}
.cmptable th,.cmptable td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--border);}
.cmptable th{font-size:11px;font-weight:700;color:var(--muted);position:sticky;top:0;}
.cmpmetric{text-align:left!important;color:var(--muted);font-size:12px;white-space:nowrap;}
.cmpval{font-weight:600;font-variant-numeric:tabular-nums;}
.cmpval.lead{color:var(--green);font-weight:800;}
.cmpval.warn{color:var(--red);font-weight:800;}

.remindbox{background:var(--panel2);border-radius:12px;padding:12px;margin-top:8px;}
.remindrow{display:flex;align-items:center;gap:10px;}
.remindday{flex:none;font-size:14px;font-weight:600;padding:10px 14px;border-radius:10px;background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-line);}
.remindrow input[type=time]{flex:1;}

.chip.alarm{background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-line);display:inline-flex;align-items:center;gap:4px;}
.bellmini{display:inline-flex;width:12px;height:12px;}
.bellmini svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;}

.wizadded{display:flex;align-items:center;gap:8px;background:var(--gold-soft);color:var(--text);
  border-radius:10px;padding:9px 12px;margin-bottom:8px;font-size:14px;font-weight:500;}
.wizcheck{display:inline-flex;width:16px;height:16px;color:var(--gold);flex:none;}
.wizcheck svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}

.addrow4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.addrow4 .addbtn{font-size:12.5px;gap:5px;padding:12px 4px;flex-direction:column;}
.addrow4 .addbtn svg{width:18px;height:18px;}
.addrow5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.addrow5 .addbtn{font-size:11.5px;gap:4px;padding:11px 2px;flex-direction:column;}
.addrow5 .addbtn svg{width:17px;height:17px;}
.rolecard .coopmark{color:var(--gold);}
.roletabs{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.roletab{flex:1;min-width:64px;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:10px 8px;border-radius:11px;background:var(--panel2);color:var(--muted);font-weight:700;font-size:12.5px;
  box-shadow:inset 0 0 0 1px var(--border);}
.roletab.on{background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold-line);}
.rtrole{letter-spacing:.03em;}
.rtdot{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#FFFFFF;flex:none;}
.rtdot.ok{background:var(--green);}
.rtdot.new{background:var(--amber);}
.rolecol{background:var(--panel2);border-radius:12px;padding:12px;margin-bottom:12px;}
.rolehd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.roleitem{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--border);}
.roleitem:first-of-type{border-top:none;}
.roleitem .gcheck{flex:none;}
.roleitem .meta{margin-top:3px;}
.miniapprove{flex:none;font-size:12.5px;font-weight:700;color:#FFFFFF;padding:8px 14px;border-radius:9px;
  background:var(--gold);box-shadow:0 1px 3px rgba(58,110,165,.3);}
.miniapprove:active{filter:brightness(.94);}
.roleaddbtn{display:block;width:100%;text-align:left;font-size:13px;color:var(--gold);font-weight:600;
  padding:9px 2px 2px;}
.rolebanner{background:var(--gold-soft);color:var(--text);border-radius:12px;padding:12px 14px;
  font-size:13.5px;margin-bottom:14px;box-shadow:inset 0 0 0 1px var(--gold-line);}
.roleadd{padding-top:8px;}

.gmetricrow{display:flex;gap:6px;margin-bottom:12px;align-items:stretch;}
.gmetric{flex:1;min-width:0;font-size:11px;line-height:1.2;padding:8px 6px;border-radius:12px;
  background:var(--panel2);color:var(--muted2);font-weight:600;text-align:center;
  display:flex;align-items:center;justify-content:center;overflow:hidden;overflow-wrap:anywhere;
  hyphens:auto;min-height:42px;}
.gmetric.on{background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-line);}
.gbars{display:flex;flex-direction:column;gap:9px;}
.gbarrow{display:flex;align-items:center;gap:10px;}
.gbarname{width:70px;flex:none;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gbartrack{flex:1;height:20px;border-radius:6px;background:var(--border);overflow:hidden;}
.gbartrack i{display:block;height:100%;border-radius:6px;background:var(--gold);transition:width .3s;}
.gbarval{flex:none;width:28px;text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.trendgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.trendcard{background:var(--panel2);border-radius:12px;padding:11px;overflow:hidden;}
.trendname{font-size:12.5px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;min-width:0;}
.trendname>span:last-child,.trendname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tspark{display:flex;align-items:flex-end;gap:4px;height:40px;width:100%;}
.tsparkbar{flex:1;background:var(--gold-line);border-radius:3px 3px 0 0;min-height:4px;opacity:.55;}
.tsparkbar.hasval{background:var(--gold);opacity:.9;}
.tsparkbar.last{opacity:1;}
.trendfoot{font-size:11px;color:var(--muted);margin-top:7px;font-weight:600;}

@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}

/* ── First-run interactive tour ─────────────────────────── */
body.tour-open{overflow:hidden;}
.tour-catch{position:fixed;inset:0;z-index:80;}
.tour-dim{position:fixed;inset:0;z-index:81;background:rgba(20,26,34,.34);pointer-events:none;}
.tour-hole{position:fixed;z-index:81;pointer-events:none;
  box-shadow:0 0 0 200vmax rgba(20,26,34,.34);
  transition:top .32s cubic-bezier(.22,.61,.36,1),left .32s cubic-bezier(.22,.61,.36,1),
    width .32s cubic-bezier(.22,.61,.36,1),height .32s cubic-bezier(.22,.61,.36,1),border-radius .32s;}
.tour-ring{position:fixed;z-index:82;pointer-events:none;border:2px solid var(--gold);border-radius:12px;
  animation:tourpulse 1.7s ease-in-out infinite;
  transition:top .32s,left .32s,width .32s,height .32s;}
@keyframes tourpulse{0%,100%{box-shadow:0 0 0 0 rgba(58,110,165,.5);}55%{box-shadow:0 0 0 9px rgba(58,110,165,0);}}
.tour-card{position:fixed;z-index:83;left:16px;right:16px;max-width:420px;margin:0 auto;
  background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:16px 16px 14px;
  box-shadow:0 18px 50px rgba(20,26,34,.35);}
.tour-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tour-count{font-size:11px;color:var(--muted2);font-weight:600;letter-spacing:.04em;}
.tour-skip{background:none;border:none;color:var(--muted2);font-size:12px;font-weight:600;padding:4px 2px;}
.tour-kicker{display:flex;align-items:center;gap:8px;color:var(--gold);font-weight:700;font-size:15.5px;margin-bottom:6px;}
.tour-kicker .ic{display:inline-flex;}
.tour-kicker .ic svg{width:19px;height:19px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.tour-body{font-size:13.5px;line-height:1.6;color:var(--text);}
.tour-when{margin-top:9px;font-size:12.5px;line-height:1.55;color:var(--muted);
  background:var(--gold-soft);border-radius:10px;padding:8px 10px;}
.tour-when b{color:var(--gold);font-weight:700;}
.tour-bar{height:3px;background:var(--panel2);border-radius:2px;margin-top:14px;overflow:hidden;}
.tour-bar>div{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;}
.tour-art{margin:2px 0 10px;display:flex;justify-content:center;background:var(--panel2);
  border:1px solid var(--border);border-radius:12px;padding:8px 4px 4px;}
.tour-art svg{display:block;max-width:100%;}
.tour-art g,.tour-art rect,.tour-art circle{transform-box:fill-box;}
.ta-baton{animation:taBaton 4.5s ease-in-out infinite;}
@keyframes taBaton{0%,14%{transform:translateX(0);}32%,48%{transform:translateX(96px);}
  66%,84%{transform:translateX(192px);}98%,100%{transform:translateX(0);}}
.ta-pop{opacity:0;transform:scale(.4);transform-origin:center;animation:taPop 3.6s ease-in-out infinite;}
@keyframes taPop{0%,8%{opacity:0;transform:scale(.4);}16%,86%{opacity:1;transform:scale(1);}94%,100%{opacity:0;transform:scale(.4);}}
.ta-fill{width:0;animation:taFill 3.4s ease-in-out infinite;}
@keyframes taFill{0%,10%{width:0;}55%,92%{width:48px;}100%{width:0;}}
.ta-pulse{animation:taPulse 1.8s ease-in-out infinite;}
@keyframes taPulse{0%,100%{opacity:.35;}50%{opacity:1;}}
</style>
</head>

/* ── helpers ─────────────────────────────────────────────── */
const pad = n => String(n).padStart(2,'0');
const nowIso = () => new Date().toISOString();
const isoDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const first = s => String(s||'').trim().split(/\s+/)[0] || '?';

function mondayOf(d){ const x=new Date(d); const s=(x.getDay()+6)%7; x.setDate(x.getDate()-s); x.setHours(0,0,0,0); return x; }
function periodKey(type,d){ d=d||new Date();
  if(type==='week') return isoDate(mondayOf(d));
  if(type==='month') return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
  if(type==='semester') return `${d.getFullYear()}-H${d.getMonth()<6?1:2}`;
  return String(d.getFullYear());
}
function prevPeriodKey(type,d){ d=d||new Date();
  if(type==='week'){ const m=mondayOf(d); m.setDate(m.getDate()-7); return isoDate(m); }
  if(type==='month') return periodKey('month', new Date(d.getFullYear(), d.getMonth()-1, 1));
  if(type==='semester') return periodKey('semester', new Date(d.getFullYear(), d.getMonth()-6, 1));
  return String(d.getFullYear()-1);
}
function periodLabel(type,key){
  if(!key) return '';
  if(type==='week'){ const s=new Date(key+'T12:00:00'); if(isNaN(s)) return key;
    const e=new Date(s); e.setDate(e.getDate()+6);
    return `${MON[s.getMonth()]} ${s.getDate()} - ${MON[e.getMonth()]} ${e.getDate()}`; }
  if(type==='month'){ const [y,m]=key.split('-'); return `${MON[+m-1]} ${y}`; }
  if(type==='semester'){ const [y,h]=key.split('-'); return h==='H1'?`${y} Jan - Jun`:`${y} Jul - Dec`; }
  return key;
}
function fmtShort(ts){ if(!ts)return''; const d=new Date(ts);
  return `${MON[d.getMonth()]} ${d.getDate()}, ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`; }
function fmtDay(ts){ if(!ts)return''; const d=new Date(ts); return `${MON[d.getMonth()]} ${d.getDate()}`; }
function daysAgo(ts){ if(!ts)return 0; return Math.max(0, Math.floor((Date.now()-new Date(ts))/86400000)); }
function dueSoon(ts){ if(!ts) return false; const ms=new Date(ts)-Date.now(); return ms<=86400000; } // within 24h or overdue
function ageLabel(ts){ const d=daysAgo(ts);
  if(d===0) return 'added today';
  if(d===1) return 'day 2';           // on its 2nd day
  return `day ${d+1}`;                // day 3, day 4, ... shows how long it has been carried
}
function inWords(ts){ if(!ts) return ''; const ms=new Date(ts)-Date.now(); if(ms<=0) return 'any moment';
  const h=Math.round(ms/3600000); if(h<24) return `in ${h||1}h`; return `in ${Math.round(h/24)}d`; }
function lastDayOfMonth(y,m){ return new Date(y,m,0).getDate(); }
function isDueOn(rec,d){
  if(rec.freq==='daily') return true;
  if(rec.freq==='weekly') return (rec.days||[]).includes(d.getDay());
  if(rec.freq==='monthly'){ const dom=Math.min(rec.day_of_month||1, lastDayOfMonth(d.getFullYear(), d.getMonth()+1));
    return d.getDate()===dom; }
  return false;
}
function prevDueDate(rec, from){ const d=new Date(from);
  for(let i=0;i<400;i++){ d.setDate(d.getDate()-1); if(isDueOn(rec,d)) return isoDate(d); } return null; }
function freqLabel(rec){
  if(rec.freq==='daily') return 'Every day';
  if(rec.freq==='weekly'){ const ds=(rec.days||[]).slice().sort();
    if(!ds.length) return 'No days picked';
    return ds.length===7?'Every day':ds.map(x=>DOW[x]).join(' '); }
  return `Day ${rec.day_of_month||1} of each month`;
}
function timeLabel(hhmm){ const [h,m]=(hhmm||'09:00').split(':').map(Number);
  const ap=h<12?'AM':'PM'; const hh=h%12===0?12:h%12; return `${hh}:${pad(m)} ${ap}`; }
const urlB64ToU8 = s => { const p='='.repeat((4-s.length%4)%4); const b=(s+p).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const a=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++)a[i]=raw.charCodeAt(i); return a; };

async function authHeader(){
  const {data:{session}} = await sb.auth.getSession();
  return session ? {'Authorization':'Bearer '+session.access_token} : null;
}
async function notifyUsers(to, title, body, coopId){
  try{
    const h=await authHeader();
    if(!h || !to || !to.length) return;
    await fetch('/.netlify/functions/notify',{
      method:'POST', headers:{'Content-Type':'application/json',...h},
      body: JSON.stringify({to:[...new Set(to.filter(Boolean))], title, body: body||'', coopId: coopId||null}),
    });
  }catch(e){ console.error('notify', e); }
}
async function callMembers(payload){
  const h=await authHeader();
  if(!h) throw new Error('Sign in again.');
  const res=await fetch('/.netlify/functions/wios-members',{
    method:'POST', headers:{'Content-Type':'application/json',...h}, body: JSON.stringify(payload),
  });
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'Request failed.');
  return data;
}

function burst(el){
  if(!el || !el.animate) return;
  for(let i=0;i<9;i++){
    const s=document.createElement('span'); s.className='spark';
    s.style.left='26px'; s.style.top='50%';
    el.appendChild(s);
    const a=(Math.PI*2*i)/9, dist=26+Math.random()*20;
    s.animate([{transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px) scale(.3)`,opacity:0}],
      {duration:520,easing:'ease-out'}).onfinish=()=>s.remove();
  }
}

/* ── login ───────────────────────────────────────────────── */
const LOGIN_DOMAIN = 'uglydonutsncorndogs.com';
function toEmail(idOrEmail){
  const v=String(idOrEmail||'').trim().toLowerCase();
  if(!v) return '';
  return v.includes('@') ? v : `${v}@${LOGIN_DOMAIN}`;
}
function Login(){
  const [uid,setUid]=useState(''); const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const [mode,setMode]=useState('in');   // 'in' | 'forgot'
  const [sent,setSent]=useState(false);
  async function go(){
    if(busy||!uid.trim()||!pw) return;
    setBusy(true); setErr('');
    const {error}=await sb.auth.signInWithPassword({email:toEmail(uid), password:pw});
    if(error){
      const m=(error.message||'').toLowerCase();
      if(m.includes('invalid login')||m.includes('credentials'))
        setErr('That ID or password did not work. Check and try again.');
      else
        setErr(error.message||'Could not sign in.');   // show the real reason for anything else
    }
    setBusy(false);
  }
  async function recover(){
    if(busy||!uid.trim()) return;
    setBusy(true); setErr(''); setSent(false);
    const {error}=await sb.auth.resetPasswordForEmail(toEmail(uid), {redirectTo: window.location.origin});
    if(error) setErr(error.message);
    else setSent(true);
    setBusy(false);
  }
  return (
    <div className="auth">
      <div style={{textAlign:'center',marginBottom:22}}>
        <div className="wordmark" style={{fontSize:40}}>WIOS</div>
        <div style={{fontSize:10.5,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted)',marginTop:8}}>
          Work In One Space
        </div>
      </div>
      {mode==='in'?(
        <>
          <input placeholder="ID (e.g. john.kim)" type="text" autoCapitalize="none" autoCorrect="off"
            spellCheck="false" autoComplete="username" value={uid}
            onChange={e=>setUid(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
          <input placeholder="Password" type="password" autoComplete="current-password" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
          {err&&<div className="err">{err}</div>}
          <button className="btn btn-gold" disabled={busy||!uid.trim()||!pw} onClick={go}>
            {busy?'Signing in...':'Sign in'}
          </button>
          <button className="btn btn-ghost" onClick={()=>{setMode('forgot');setErr('');setSent(false);}}>
            Forgot password
          </button>
          <div className="note" style={{textAlign:'center',marginTop:6}}>
            Your ID is the part before the @ in your email.
          </div>
        </>
      ):(
        <>
          <div className="note" style={{marginBottom:4}}>
            Enter your ID and we will email you a reset link.
          </div>
          <input placeholder="ID (e.g. john.kim)" type="text" autoCapitalize="none" autoCorrect="off"
            spellCheck="false" value={uid} onChange={e=>setUid(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&recover()}/>
          {err&&<div className="err">{err}</div>}
          {sent&&<div className="note" style={{color:'var(--green)'}}>
            If that account exists, a reset link is on its way to {toEmail(uid)}. Check your email.
          </div>}
          <button className="btn btn-gold" disabled={busy||!uid.trim()} onClick={recover}>
            {busy?'Sending...':'Send reset link'}
          </button>
          <button className="btn btn-ghost" onClick={()=>{setMode('in');setErr('');}}>
            Back to sign in
          </button>
        </>
      )}
    </div>
  );
}

function TasksTab({me, people, tasks, coops, members, goals, requests, reqTargets, surveys, svTargets, roleProjects, roleMembers, roleItems, reload, openCoopId, setOpenCoopId, gotoGoals}){
  const [seg,setSeg]=useState('active');
  const [slideDir,setSlideDir]=useState(0);   // -1 slide from left, 1 from right, for the swipe feel
  const [quick,setQuick]=useState('');
  const [sel,setSel]=useState(null);
  const [mode,setMode]=useState('main');
  const [customN,setCustomN]=useState(2); const [customU,setCustomU]=useState('days');
  const [schedAt,setSchedAt]=useState('');
  const [sendTo,setSendTo]=useState([]); const [sendMsg,setSendMsg]=useState('');
  const [busy,setBusy]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [order,setOrder]=useState(null);
  const dragRef=useRef({id:null,ids:null});
  const [dNotes,setDNotes]=useState('');
  const [dSubs,setDSubs]=useState([]);
  const [newSub,setNewSub]=useState('');
  const [showAdd,setShowAdd]=useState(false);        // legacy chooser (unused now)
  const [showNewCoop,setShowNewCoop]=useState(false);
  const [showNewTask,setShowNewTask]=useState(false);
  const [newTaskTitle,setNewTaskTitle]=useState('');
  const [newTaskUrgent,setNewTaskUrgent]=useState(false);
  const [newTaskDue,setNewTaskDue]=useState('');
  const [newTaskLater,setNewTaskLater]=useState(false);
  const [newTaskLaterAt,setNewTaskLaterAt]=useState('');
  // reminder / alarm: on -> a push at a chosen time. Default today, pick a time;
  // "another day" reveals a date picker.
  const [newTaskRemind,setNewTaskRemind]=useState(false);
  const [newTaskRemindTime,setNewTaskRemindTime]=useState('09:00');
  const [newTaskRemindDate,setNewTaskRemindDate]=useState('');
  const [newTaskOtherDay,setNewTaskOtherDay]=useState(false);
  const [alarmEdit,setAlarmEdit]=useState('');   // datetime-local value when editing a task's alarm
  const [actionsOpen,setActionsOpen]=useState(false);  // task detail: expandable "Actions" menu
  const [declining,setDeclining]=useState(null); const [declineMsg,setDeclineMsg]=useState('');
  // Optimistic removal: hide a task the instant it is deleted or marked done,
  // so the list updates even before the server round-trip / reload completes.
  const [hiddenIds,setHiddenIds]=useState(()=>new Set());
  const hide=id=>setHiddenIds(s=>{ const n=new Set(s); n.add(id); return n; });

  const cLabel=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  const myM=id=>members.find(m=>m.coop_id===id&&m.user_id===me.id);

  // Coops I'm part of, split by whose turn it is.
  const coopGroups=useMemo(()=>{
    const req=[], mine=[], theirs=[], closed=[];
    (coops||[]).forEach(c=>{
      if(hiddenIds.has(c.id)) return;
      const m=members.find(x=>x.coop_id===c.id&&x.user_id===me.id);
      const involved=!!m||c.creator_id===me.id;
      if(!involved) return;
      if(c.status==='closed'){ closed.push(c); return; }
      if(m&&m.status==='pending'){ req.push(c); return; }   // a request waiting on my answer
      if(c.holder_id===me.id){ mine.push(c); return; }      // my turn -> Active
      theirs.push(c);                                        // waiting on someone else -> Waiting
    });
    return {req,mine,theirs,closed};
  },[coops,members,me.id,hiddenIds]);

  const [showNewRequest,setShowNewRequest]=useState(false);
  const [openReqId,setOpenReqId]=useState(null);
  // Requests split into: incoming (someone asked me, I have not accepted),
  // mine-to-do (I accepted, not yet completed) -> Active,
  // sent-by-me (I am the asker) -> tracked as a card, and done.
  const reqGroups=useMemo(()=>{
    const incoming=[], todo=[], sent=[], done=[];
    (requests||[]).forEach(r=>{
      if(hiddenIds.has(r.id)) return;
      const myT=reqTargets.find(t=>t.request_id===r.id&&t.user_id===me.id);
      const iSent=r.creator_id===me.id;
      if(iSent){
        (r.status==='done'?done:sent).push(r);
      } else if(myT){
        if(r.status==='done'){
          // closed by the asker: keep a record in Done for anyone who took part
          if(myT.status==='completed'||myT.status==='accepted') done.push(r);
        } else if(myT.status==='pending') incoming.push(r);
        else if(myT.status==='accepted') todo.push(r);
        // myT.status==='completed' && open: waiting on others, hidden from my Active
      }
    });
    return {incoming,todo,sent,done};

    by.active.sort((a,b)=>{

  // Reorder the Active list by dragging a task's handle (works on touch and mouse).
  // We track the drag on a ref, reorder a live copy of the id list as the finger moves
  // over other cards, then write sort_order once on release.
  function activeIds(){ return lists.active.map(t=>t.id); }
  function startDrag(id, e){
    e.preventDefault(); e.stopPropagation();
    dragRef.current={id, ids:activeIds()};
    setDragId(id); setOrder(activeIds());
    window.addEventListener('pointermove', onDragMove);
    window.addEventListener('pointerup', endDrag, {once:true});
  }
  function onDragMove(e){
    const d=dragRef.current; if(!d.id) return;
    const el=document.elementFromPoint(e.clientX, e.clientY);
    const card=el&&el.closest&&el.closest('.card.task');
    if(!card||!card.dataset.tid) return;
    const overId=card.dataset.tid;
    if(overId===d.id) return;
    const ids=d.ids.slice();
    const fi=ids.indexOf(d.id), oi=ids.indexOf(overId);
    if(fi<0||oi<0) return;
    ids.splice(fi,1); ids.splice(oi,0,d.id);
    d.ids=ids; setOrder(ids);
  }
  async function endDrag(){
    window.removeEventListener('pointermove', onDragMove);
    const d=dragRef.current; const ids=d.ids; dragRef.current={id:null,ids:null};
    setDragId(null); setOrder(null);
    if(!ids) return;
    // only write if order actually changed
    const before=activeIds();
    if(ids.join()===before.join()) return;
    await Promise.all(ids.map((id,idx)=>
      sb.from('wios_tasks').update({sort_order:idx}).eq('id',id)));
    reload();
  }

    if(myItems.some(it=>!it.done)){ alert('Check off all your tasks before marking your role complete.'); return; }
    if(busy) return; setBusy(true);
    try{
      await sb.from('wios_role_members').update({status:'completed',completed_at:nowIso()})
        .eq('project_id',p.id).eq('user_id',me.id);
      // if everyone is now complete, bring the project back to Active for all and push
      const mems=roleMembers.filter(m=>m.project_id===p.id);
      const others=mems.filter(m=>m.user_id!==me.id);
      const allDone=others.every(m=>m.status==='completed'||m.status==='acknowledged');
      if(allDone && mems.length>0){
        notifyUsers(mems.map(m=>m.user_id).filter(x=>x!==me.id), `Everyone finished: ${p.title}`, 'Check it and mark Done', null);
      } else {
        notifyUsers([p.creator_id].filter(x=>x!==me.id), `${cLabel(me.id)} finished their part`, p.title, null);
      }
      reload();
    }catch(e){ alert(e.message||'Could not update.'); }
    setBusy(false);
  }
  async function reopenRoleMine(p){
    if(busy) return; setBusy(true);
    try{ await sb.from('wios_role_members').update({status:'working',completed_at:null})
      .eq('project_id',p.id).eq('user_id',me.id); reload(); }
    catch(e){ alert(e.message||'Could not reopen.'); }
    setBusy(false);
  }
  async function acknowledgeRole(p){
    // I press Done: my card moves to Done. Others stay Active until each acknowledges.
    if(busy) return; setBusy(true);
    try{
      await sb.from('wios_role_members').update({status:'acknowledged',acknowledged_at:nowIso()})
        .eq('project_id',p.id).eq('user_id',me.id);
      // when everyone has acknowledged, mark the project itself done (for records)
      const mems=roleMembers.filter(m=>m.project_id===p.id);
      const others=mems.filter(m=>m.user_id!==me.id);
      if(others.every(m=>m.status==='acknowledged')){
        await sb.from('wios_role_projects').update({status:'done',closed_at:nowIso()}).eq('id',p.id);
      }
      reload();
    }catch(e){ alert(e.message||'Could not update.'); }
    setBusy(false);
  }

    if(busy) return;

    try{

  const segItems=[
    {k:'all',l:`All (7d)${allCount?` ${allCount}`:''}`, w:1.5},
    {k:'active',l:`Active${(lists.active.length+coopGroups.mine.length+reqGroups.todo.length)?` ${lists.active.length+coopGroups.mine.length+reqGroups.todo.length}`:''}`, w:1.2},
    {k:'waiting',l:`Waiting${(lists.waiting.length+coopGroups.theirs.length)?` ${lists.waiting.length+coopGroups.theirs.length}`:''}`, w:1.2},

  // finger (with edge resistance); on release it either springs back or slides the rest of
  // the way out and switches tab, so it reads like scrolling across pages, not a hard cut.
  const swipe=useRef({x:0,y:0,on:false,dragging:false,w:0});
  const slideRef=useRef(null);
  function segIndex(){ return segItems.findIndex(s=>s.k===seg); }
  function setTX(px, anim){
    const el=slideRef.current; if(!el) return;
    el.style.transition = anim ? 'transform .2s cubic-bezier(.22,.61,.36,1), opacity .2s' : 'none';
    el.style.transform = `translateX(${px}px)`;
    el.style.opacity = String(Math.max(0.4, 1 - Math.abs(px)/ (swipe.current.w||360) ));
  }
  function changeSeg(nextKey){
    if(nextKey===seg) return;
    const from=segItems.findIndex(s=>s.k===seg), to=segItems.findIndex(s=>s.k===nextKey);
    setSlideDir(to>from?1:-1);
    setSeg(nextKey);
  }
  function onTouchStart(e){
    if(dragId) return;                              // a reorder drag is in progress
    if(e.target.closest && e.target.closest('.draghandle')) return;
    const t=e.touches[0];
    swipe.current={x:t.clientX,y:t.clientY,on:true,dragging:false,w:slideRef.current?slideRef.current.offsetWidth:360};
  }
  function onTouchMove(e){
    const s=swipe.current; if(!s.on) return;
    const t=e.touches[0];
    const dx=t.clientX-s.x, dy=t.clientY-s.y;
    if(!s.dragging){
      if(Math.abs(dx)<8) return;                    // wait until intent is clear
      if(Math.abs(dx)<Math.abs(dy)){ s.on=false; return; }   // vertical -> let it scroll
      s.dragging=true;
    }
    const idx=segIndex();
    // resistance at the ends (nothing to reveal past the first/last tab)
    const atEnd = (dx<0 && idx===segItems.length-1) || (dx>0 && idx===0);
    setTX(atEnd ? dx*0.28 : dx, false);
  }
  function onTouchEnd(e){
    const s=swipe.current; if(!s.on){ return; } s.on=false;
    if(!s.dragging){ return; }
    const t=e.changedTouches[0];
    const dx=t.clientX-s.x;
    const idx=segIndex();
    const threshold=Math.min(90, s.w*0.28);
    const goNext = dx<-threshold && idx<segItems.length-1;
    const goPrev = dx>threshold && idx>0;
    if(goNext||goPrev){
      // slide the current panel the rest of the way out, then swap (new one animates in)
      setTX(dx<0 ? -s.w : s.w, true);
      setTimeout(()=>changeSeg(segItems[goNext?idx+1:idx-1].k), 150);
    } else {
      setTX(0, true);                               // spring back
    }

      {(seg==='waiting'||seg==='all')&&coopGroups.theirs.map(c=><CoopCard key={c.id} c={c}/>)}

              <div className="lbl">Subtasks {dSubs.length>0&&<span style={{color:'var(--gold)'}}>{dSubs.filter(s=>s.done).length}/{dSubs.length}</span>}</div>

                  }}>
                    <Ic name="bell" className="muted"/>
                    <span className="grow">{sel.alarm_at&&!sel.alarm_fired?`Reminder ${fmtShort(sel.alarm_at)}`:'Set a reminder alarm'}</span>
                  </button>
                  {!sel.is_system&&<>
                    <button className="opt sub" onClick={()=>setMode('waiting')}>
                      <Ic name="clock" className="muted"/><span className="grow">Waiting on someone, remind me later</span>
                    </button>
                    <button className="opt sub" onClick={()=>setMode('schedule')}>
                      <Ic name="calendar" className="muted"/><span className="grow">Set it for later, hide until a date</span>
                    </button>
                    <button className="opt sub" onClick={()=>setMode('send')}>
                      <Ic name="handoff" className="gold"/><span className="grow">Bring in a teammate, turn into a coop</span>
                    </button>
                  </>}
                </div>
              )}
              <button className="opt danger"
                onClick={async()=>{ if(!confirm('Delete this task?'))return;
                  await sb.from('wios_tasks').delete().eq('id',sel.id); setSel(null); reload(); }}>
                <Ic name="trash" className="red"/><span className="grow">Delete</span>
              </button>
            </div>
          )}

          {mode==='waiting'&&(
            <div>
              <div className="lbl">Bring it back in</div>
              <div className="pgrid">
                {[['3 hours',3],['6 hours',6],['1 day',24],['2 days',48],['3 days',72],['1 week',168]].map(([l,h])=>(
                  <button key={l} className="pbtn" onClick={()=>toWaiting(sel,h)}>{l}</button>
                ))}
              </div>
              <div className="lbl">Or pick your own</div>
              <div className="row">
                <input type="number" min="1" value={customN} onChange={e=>setCustomN(+e.target.value||1)}
                  style={{width:84,flex:'none'}}/>
                <select value={customU} onChange={e=>setCustomU(e.target.value)} style={{flex:1}}>
                  <option value="hours">hours</option><option value="days">days</option>
                </select>
                <button className="btn btn-gold btn-sm" style={{flex:'none',padding:'0 18px'}}
                  onClick={()=>toWaiting(sel, customU==='hours'?customN:customN*24)}>Set</button>
              </div>
              <div className="note" style={{marginTop:12}}>
                It moves to Waiting and counts the days. When the time is up it comes back to Active with a notification.
              </div>
            </div>
          )}

          {mode==='schedule'&&(
            <div>
              <div className="lbl">Bring it back on</div>
              <input type="datetime-local" value={schedAt} onChange={e=>setSchedAt(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} onClick={()=>toScheduled(sel)}>Set aside</button>
            </div>
          )}

          {mode==='alarm'&&(
            <div>
              <div className="lbl">Remind me at</div>
              <input type="datetime-local" value={alarmEdit} onChange={e=>setAlarmEdit(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} disabled={busy}
                onClick={()=>setAlarm(sel, alarmEdit)}>{sel.alarm_at&&!sel.alarm_fired?'Update reminder':'Set reminder'}</button>
              {sel.alarm_at&&!sel.alarm_fired&&(
                <button className="btn btn-line btn-sm" style={{width:'100%',marginTop:8}} disabled={busy}
                  onClick={()=>clearAlarm(sel)}>Turn off reminder</button>
              )}
              <div className="note" style={{marginTop:12}}>
                You get a push at that time. You can come back here any time to change it or turn it off.
              </div>
            </div>
          )}

          {mode==='send'&&(
            <div>
              <div className="lbl">Add teammates {sendTo.length>0&&<span style={{color:'var(--gold)'}}>{sendTo.length} selected</span>}</div>
              <PersonGrid people={people} value={sendTo} exclude={me.id} multi
                onChange={id=>setSendTo(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id])}/>
              <textarea rows="2" placeholder="What do you need from them?" value={sendMsg}
                onChange={e=>setSendMsg(e.target.value)}/>
              <div style={{height:12}}/>
              <button className="btn btn-gold" style={{width:'100%'}} disabled={!sendTo.length} onClick={()=>setMode('main')}>
                Add {sendTo.length>1?`${sendTo.length} teammates`:'teammate'}
              </button>
              <div className="note" style={{marginTop:10}}>
                You keep the task first. Confirm on the next screen, then pass it when it is their turn.
              </div>
            </div>
          )}
        </Sheet>
      )}

      {showNewTask&&(
        <Sheet onClose={()=>setShowNewTask(false)}>
          <h3>New task</h3>
          <div className="sub">Something for you to do. It goes in your Active list.</div>
          <input placeholder="What needs doing?" value={newTaskTitle}
            onChange={e=>setNewTaskTitle(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!newTaskDue) createTask(); }}/>
          <button className={'opt'+(newTaskUrgent?' on':'')} style={{marginTop:10}} onClick={()=>setNewTaskUrgent(!newTaskUrgent)}>
            <Ic name={newTaskUrgent?'starFill':'star'} className={newTaskUrgent?'gold':'muted'}/>
            <span className="grow">{newTaskUrgent?'Urgent, pinned to top':'Mark urgent'}</span>
          </button>
          <button className={'opt'+(newTaskLater?' on':'')} style={{marginTop:8}} onClick={()=>setNewTaskLater(!newTaskLater)}>
            <Ic name="calendar" className={newTaskLater?'gold':'muted'}/>
            <span className="grow">{newTaskLater?'Set it for later':'Set it for later (hide until a date)'}</span>
          </button>
          {newTaskLater&&<>
            <div className="lbl">Comes back to Active on</div>
            <input type="datetime-local" value={newTaskLaterAt} onChange={e=>setNewTaskLaterAt(e.target.value)}/>
          </>}
          <button className={'opt'+(newTaskRemind?' on':'')} style={{marginTop:8}} onClick={()=>setNewTaskRemind(!newTaskRemind)}>
            <Ic name="bell" className={newTaskRemind?'gold':'muted'}/>
            <span className="grow">{newTaskRemind?'Remind me':'Remind me'}</span>
          </button>
          {newTaskRemind&&<div className="remindbox">
            {!newTaskOtherDay&&(
              <div className="remindrow">
                <span className="remindday">Today</span>
                <input type="time" value={newTaskRemindTime} onChange={e=>setNewTaskRemindTime(e.target.value)}/>
              </div>
            )}
            {newTaskOtherDay&&<>
              <div className="lbl">Pick a day</div>
              <input type="date" value={newTaskRemindDate} min={isoDate(new Date())}
                onChange={e=>setNewTaskRemindDate(e.target.value)}/>
              <div className="lbl">At what time</div>
              <input type="time" value={newTaskRemindTime} onChange={e=>setNewTaskRemindTime(e.target.value)}/>
            </>}
            <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:8}}
              onClick={()=>{ setNewTaskOtherDay(!newTaskOtherDay); if(newTaskOtherDay) setNewTaskRemindDate(''); }}>
              {newTaskOtherDay?'Use today instead':'Pick another day'}
            </button>
          </div>}
          <div className="lbl">Finish before (optional)</div>
          <input type="datetime-local" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)}/>
          {newTaskDue&&<div className="note" style={{marginTop:6}}>A reminder is pushed 24 hours before this time.</div>}
          <div style={{height:12}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={!newTaskTitle.trim()||busy} onClick={createTask}>
            {busy?'Adding...':(newTaskLater?'Set for later':'Add task')}
          </button>
        </Sheet>
      )}

      {showNewCoop&&(
        <NewCoopSheet me={me} people={people} onClose={()=>setShowNewCoop(false)} reload={reload}/>
      )}

      {showNewRequest&&(
        <NewRequestSheet me={me} people={people} onClose={()=>setShowNewRequest(false)} reload={reload}/>
      )}

      {showNewSurvey&&(
        <NewSurveySheet me={me} people={people} onClose={()=>setShowNewSurvey(false)} reload={reload}/>
      )}
      {openSurveyId&&(()=>{
        const sv=(surveys||[]).find(x=>x.id===openSurveyId);
        if(!sv) return null;
        return <SurveyDetail me={me} people={people} sv={sv} targets={svTargetsOf(sv.id)}
          onClose={()=>setOpenSurveyId(null)}
          onSubmit={ans=>submitSurveyAnswers(sv,ans)}
          onCloseSurvey={()=>{closeSurvey(sv);setOpenSurveyId(null);}}
          onDelete={()=>{deleteSurvey(sv);setOpenSurveyId(null);}} busy={busy}/>;
      })()}
      {openReqId&&(()=>{
        const r=(requests||[]).find(x=>x.id===openReqId);
        if(!r){ return null; }
        return <RequestDetail me={me} people={people} r={r} targets={reqTargetsOf(r.id)}
          onClose={()=>setOpenReqId(null)}
          onAccept={()=>acceptRequest(r)} onDecline={()=>declineRequest(r)}
          onComplete={()=>completeRequest(r)} onClose2={()=>{closeRequest(r);setOpenReqId(null);}}
          onDelete={()=>{deleteRequest(r);setOpenReqId(null);}} busy={busy}/>;
      })()}

      {showNewRole&&(
        <NewRoleSheet me={me} people={people} onClose={()=>setShowNewRole(false)} reload={reload}/>
      )}

      {openRoleId&&(()=>{
        const p=(roleProjects||[]).find(x=>x.id===openRoleId);
        if(!p){ return null; }
        return <RoleDetail me={me} people={people} p={p}
          mems={roleMembersOf(p.id)} items={roleItemsOf(p.id)} busy={busy}
          onClose={()=>setOpenRoleId(null)}
          onToggle={toggleRoleItem} onAdd={addRoleItem} onApprove={approveRoleItem}
          onDeleteItem={deleteRoleItem} onMarkMine={()=>markRoleMine(p)}
          onReopenMine={()=>reopenRoleMine(p)}
          onAck={()=>{acknowledgeRole(p);setOpenRoleId(null);}}
          onDelete={()=>{deleteRole(p);setOpenRoleId(null);}}/>;
      })()}

      {declining&&(
        <Sheet onClose={()=>setDeclining(null)}>
          <h3>Respond</h3>
          <div className="sub">Tell them why this is not needed, or suggest another way. It goes back to whoever sent it.</div>
          <textarea rows="3" placeholder="Your message" value={declineMsg} onChange={e=>setDeclineMsg(e.target.value)}/>
          <div style={{height:12}}/>
          <button className="btn btn-gold" style={{width:'100%'}} disabled={busy} onClick={sendDecline}>
            {busy?'Sending...':'Send response'}
          </button>
        </Sheet>
      )}

      {openCoopId&&<CoopDetail me={me} people={people}
        coop={coops.find(c=>c.id===openCoopId)} members={members.filter(m=>m.coop_id===openCoopId)}
        onClose={()=>setOpenCoopId(null)} reload={reload}/>}
    </div>
  );
}

/* ── new coop sheet (shared by tasks view) ───────────────── */
function NewCoopSheet({me, people, onClose, reload}){
  const [nTitle,setNTitle]=useState(''); const [nTo,setNTo]=useState([]);
  const [nMsg,setNMsg]=useState(''); const [nUrgent,setNUrgent]=useState(false);
  const [busy,setBusy]=useState(false);
  const label=id=>{ const p=people.find(x=>x.id===id); return p?`${p.role} ${first(p.name)}`:'someone'; };
  const toggle=id=>setNTo(a=>a.includes(id)?a.filter(x=>x!==id):[...a,id]);
  async function createCoop(){
    const title=nTitle.trim(); if(!title||!nTo.length||busy) return;
    setBusy(true);
    try{
